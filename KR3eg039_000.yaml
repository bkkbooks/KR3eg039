body:
  text: 敘諺曰不為良相則為良醫明乎良醫之燮理陰陽胥一世而登諸仁壽與良相之贊元調鼐者侔也余自幼好讀岐黃書壯而遠遊四方欲求所謂良醫者領其所謂卓識偉論以正所學歷四十年所郁乎吾懷迄無所遇而四方之志終未少頽弛也夙聞東武山川奇秀不減雁宕每神遊馬耳常山間如東坡所謂隱君子者庶欣然遇之嗣聞邑紳士顯緒王君輩談次間曾於諸城劉相國處遇其胞侄松峰溫文爾雅善古文詩詞更精岐黃術余耳其名而未獲一共談論蓄懷時悵悵也因策蹇走七百餘里訪松峰於東武之槎河山莊一見相滂如平生歡其子濯西克紹家學精核醫理出所著説疫一書屬余辨言余受而讀之見其三才融貫而包括殆盡古今畢舉而搜羅無遺真足解千百年之疑團開瘟疫門之覺路其尤妙者析瘟疫之名義分疫證為各種皆發前人所未發如所載瓜瓤軟腳赤膈黃耳痧瘴諸掙等疫癘怪疾各有簡便良方針灸奇術皆能回春於瞬息奏效於目前真可以參變陰陽起回生死則是有傷寒論於前不可無説疫書於後直與金匱名編表裡相成參互盡變將胥天下後世而仁壽之即云與良相之業並垂千古亦奚不可之有是為序時乾隆丁未清和月福山年眷世弟劉嗣宗撰
