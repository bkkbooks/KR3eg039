front:
  text: 序憶余自幼時耳目之所睹記鮮見醫而儒者也乃轉而思焉其凌替當不至是使得克自振拔者出而一起其衰應必有可觀者焉故余極欲留心醫學每為孰師所迫俾專工舉子業而未遑及之第其所授之文寓目即昏昏睡去總不記憶間嘗取唐宋八家以及諸名公真稿讀之一見輒能成誦第期負過高自維取法乎上者僅得乎中以此所為文詞往往不能趨時後松峰山人為人言余所為帖括乃傳世之作似非利試之器當變格以相從庶幾其有合乎或有告豫者豫聞其言而是之乃改弦易轍始克幸博一第第以揣摹入彀終覺違心隨仍浸淫於古日取諸子百家縱觀之又念人有七尺之軀而不解岐黃術終屬憾事遂將靈樞素難以及歷代各家醫書羅列案頭日日展玩第醫理玄杳又系中年學步卒未能深造其室唯論其文章好醜除經論外惟李士材汪訒菴等筆墨稍覺可觀余者字句尚多有未能通順者遑論其他乎乙巳夏山人出所著説疫一書屬余辨言余非知醫者固不敢強作解事第觀其全部文章理法俱從左國史漢得來神而明之又自成一子真乃才人之筆而詎可僅以醫書目之乎能文之士取而讀之始信吾言之不謬也是醫也而進於儒矣是為序時乾隆五十年乙巳榴月眷姻弟春圃王樹孝書自序傷寒之不明也以中寒亂之瘟疫之不明也以傷寒亂之能於其中劃然分析則其於治傷寒瘟疫也思過半矣傷寒自仲景而下承承繼繼各有專家著書立説者無慮數十種獨至瘟疫則略而不講焉間有談及者不過寥寥數語核焉而不精語焉而不詳遂至瘟疫一症靡所指歸往往以治傷寒法治之非大用溫散即過投苦寒欲病之愈也難矣先大人引嵐公一生精於醫理南北宦遊雖簿書鞅掌間聞人疾苦莫不竭力拯救余公聆庭訓非伊朝夕且齠年善病因得於暇日取家藏岐黃書縱觀之故頗有會心處因念瘟疫一門非他症可比不能遲之歲月緩為調理其見效在一二劑之內其痊愈在三五日之間不可不亟為講究以共登寶筏昔吳又可瘟疫論一書較之諸傢俱見卓識獨闢蠶業業已盛行海內故其方論茲集一概不録第就自所經歷者聊紓管見以羽翼又可當亦談疫者之所不斥也夫疫病所包甚廣而瘟疫特其一耳又添雜疫寒疫各著方論而症治始備隨編輯酌定分為六卷曰述古曰論治曰雜疫曰辨疑曰諸方曰運氣亦庶幾成一家言焉第是書之成錦兒之力居多其曰松峰説疫者明乎其不敢擅為己有以成善則歸親之意云爾其中分傷寒與瘟疫皎若列眉而理路治法亦頗審慎不敢掩古人所長而襲為己有亦不敢震前賢名望而為其所愚第疫症千變萬化治之不可膠執亦不可師心所顧同志君子神明而變通之是則余之厚望也夫是為序
