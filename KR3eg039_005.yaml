body:
  text: 卷之五諸方避瘟方雄黃丸治瘟不相染明雄一兩研丹參赤小豆炒熟鬼箭羽各二兩共為末蜜丸梧子大每日空心溫水下五丸避瘟丹燒之能避一切穢惡邪氣蒼朮乳香甘松細辛芸香降真香等分糊為丸豆大每用一丸焚之良久又焚一丸略有香氣即妙福建香茶餅能避一切瘴氣瘟疫傷寒穢氣不時噙化沉香白檀各一兩兒茶二兩粉草五錢麝香五分冰片三分共為細末糯米湯調丸黍米大噙化透頂清涼散凡遇時令不正瘟疫流行人各帶之或嗅鼻可免侵染白芷細辛當歸明雄牙皂等分共為細末瓷瓶貯勿泄氣用時令病者噙水口內將藥㗜鼻吐水取嚏不嚏再吹嚏方止已患未患者皆宜用神聖避瘟丹蒼朮君倍香附羌活獨活甘松山奈白芷赤箭大黃雄黃各等分共為末糊丸彈子大黃丹為衣曬乾正月初一平旦焚一炷避除一歲瘟疫邪氣老君神明散避瘟疫蒼朮一錢桔梗二錢五分細辛附子炮去黑皮各一兩烏頭四兩去皮尖共為細末帶於身邊可免瘟疫不可服藜蘆散一名赤散避瘟疫藜蘆躑躅乾薑各一兩丹皮皂角各一兩六錢細辛十八銖桂枝一作桂心附子硃砂一作真珠另研各六兩共為粗末絳囊係臂上男左女右覺病作取藥末少許納鼻中嫌分量多和時四分之一亦可後皆仿此務成子螢火丸主避瘟疾惡氣百鬼虎狼蛇虺蜂蠆諸毒五兵白刃盜賊凶害皆避之螢火蟲鬼箭羽去皮蒺藜礬石各一兩煅枯雄黃雌黃各二兩羚羊角鍛灶灰錘柄入斧頭木燒焦各兩半共為粗末以雞子黃雄雞冠一具和之如杏仁大紅綢縫三角囊盛五丸帶左臂上仍可掛於門戶屠蘇酒大黃十五銖白朮十銖桔梗十五銖川椒十五銖炒出汗防風六銖烏頭六銖炒桂枝十五銖薐葜六銖乃今之二錢半廿四銖為一兩入紅囊中於臘月晦日懸井中毋著水元旦出藥入酒中煎數沸於東向戶中飲之先自小者飲起飲三朝若每年飲可代代無病內外井中宜悉著藥忌豬羊牛肉生蔥桃李雀肉避瘟丹蒼朮紅棗和丸燒之又方時瘟疫流行水缸內每早投黑豆一握全家無恙五更潛投黑豆大握於井中勿令人見飲水傢俱無恙入病家不染方香油和雄黃蒼朮末塗鼻孔既出紙條探嚏如無黃術即香油亦可飲雄黃酒一杯或止抹雄黃於鼻孔即妙瘟病不染五月五日午時多采蒼耳嫩葉陰乾收之遇疫時為末冷水服二錢或水煎舉家皆飲能避邪惡避瘟良方瘟疫盛行車前子隔紙焙為末服即不染瘟疫不染方將初病人貼身衣服甑上蒸過閤家不染又避瘟方入瘟家以麻油塗鼻孔出再取嚏則不染避瘟方以桃葉上蟲搗爛涼水調服瘟疫不染一方止用桃蟲蠹尿又方以赤小豆糯米浸水缸中每日取水用又方以貫眾浸水用之或蒼朮浸水用斷瘟法密以艾灸病人床四角各一壯勿令人知不染凡入瘟家常以雞鳴時默唸四海神名三七遍百邪不犯東海神呵明西海神巨乘南海神祝融北海神禺強每入病室存心念三遍勿出口雄狐屎在山中石上或竹木上尖頭者燒之避惡去瘟疫茵陳烏梅湯治瘟疫九九盡日茵陳連根採陰乾遇瘟疫起每一人用茵陳五分烏梅二個打碎水二盅煎八分熱服汗出即愈赤豆避瘟法正月七日用新布囊盛赤小豆置井中三日取出舉家皆服男十粒女廿粒瘟則遠避姜酒避瘟法凡遇瘟疫行時出門須先飲燒酒一杯回家時仍再飲一杯然後食別物但勿至醉不能飲者出入可食姜蒜或以塞鼻神砂避瘟丸神砂一兩研細白蜜和丸麻子大以太歲日或平旦一家皆向東方用井花冷水各吞廿一丸永無疫患忌葷一日一方元日五更以紅棗祭五瘟畢閤家食之吉一方正月上寅日取女菁草末三合絳袋盛掛帳中能避瘟避瘟殺鬼丸如要少做或四分之一或改兩作錢皆可一方有空心青鱉甲作龜甲雄黃雌黃各三兩山甲龍骨鱉甲蝟皮各二兩川芎二兩禹餘糧二兩真珠酌加羚羊角七兩虎頭骨七兩樗雞十五枚如無以芫青十五枚代東門上雄雞頭一枚共為末蠟溶為丸彈子大每正旦病家門口燒一兩丸並每人帶一丸男左女右避疫殺鬼並弔喪問疾皆吉太蒼公避瘟丹凡官舍旅館久無人到積濕積邪容易侵人焚之可以遠此五六月終日焚之可以避瘟蒼朮一斤臺芎黃連白朮羌活各八兩川芎草烏細辛柴胡防風獨活甘草藁本白芷香附當歸荊芥天麻官桂甘松乾薑山奈麻黃牙皂白芍各四兩麝香三分共為細末點之一方除夜將家中所餘雜藥調和成一處者焚之並焚蒼朮可避瘟疫一方除夜有行瘟疫使者降於人間以黃紙朱書天行已過四字貼於門額吉一方懸掛馬尾松枝可免瘟疫一方天行時氣宅舍怪異並燒降真香有驗一方兜木香燒之去惡氣除病瘟產兜渠國一方燒青木香薰陸安息膠香可避瘟疫燒香避瘟樞密王博文每於正旦四更燒丁香避瘟入病家不染用舌頂上額努力閉氣一口使氣充滿毛竅則不染避瘟丹燒之避瘟邪氣乳香蒼朮細辛生草川芎降真白檀棗肉丸焚燒不染瘟方雄黃五錢赤小豆一兩蒼朮一兩泔浸去皮壁土炒共為細末水調每服一錢又方姜豉和白朮浸酒舉家常服一方無術又方初伏採黃花蒿陰乾冬至日研末收存至元旦蜜調服又方六月六日採馬齒莧曬乾元旦煮熟鹽醋調食之又方元日用麻子三七粒赤豆七粒共撒井中避瘟又方元日吞赤小豆七粒服椒酒一杯卻病避瘟又方立春後庚子日溫蔓菁汁閤家並服不拘多少可避瘟蘿蔔汁亦可蔓菁亦云蕪菁麻豆投井方除夜四更時取麻子赤小豆各廿七粒並佳人發少許同投井中終歲無傷寒瘟疫發泥投井除夜以閤家頭髮燒灰同腳底泥包投井中咒曰我家眷屬不害傷寒瘟魔遠遁四季平安急急如九天金輪王敕令避瘟方於病人出汗時身下舒一挑擔則不傳染須舒於褥底下不得近身恐挑擔涼冰汗不出殺鬼丹虎頭骨真者酥炙桃梟系桃之干在樹上者斧頭木系斧柄入斧頭中之木雄黃明亮者另研桃仁去皮尖麩炒黃硃砂光明者另研各一錢五分犀角屑木香白朮鬼箭羽各一錢麝香七分五釐共為粗末帶之可避瘟疫一方於春分日用遠志去心水煎日未出時東面飲二盅探吐則疾疫不生一方於穀雨以後用川芎蒼朮白芷藁本零陵香各等分煎水沐浴三次以泄其汗汗出臭者無病吐免疫桃湯元日服桃湯壓邪氣制百鬼納椒井中臘日之夜令人持椒臥井旁無與人言納椒井中可除瘟病一方除夜取椒廿粒行之又方元日飲蒼朮湯並用湯沐浴及焚燒可避終歲疫逐蠅祛疫法憶昔年入夏瘟疫大行有紅頭青蠅千百為群凡入人家必有患瘟疫而亡者後傳一法用鐵盆不拘大小納白礬四兩用滾水傾入盆內令滿將礬化開次以口含火酒連噴三口於盆內又取桃核一枚割兩頭令通去仁用紙包槍藥少許塞桃核空殼內用紅線繩一根穿入核內將紅線為弦取桃枝縛作一弓安於鐵盆中凡水內弓背在下弓弦向上再用桃木作箭三枝插於盆外青蠅自當遠避舉家即免瘟病其盆隨便安於宅之僻處經歲莫動相傳極效松峰記避瘟方新布盛大豆納井中一宿取出每服七粒避疫椒柏酒除日用椒三七粒東向側柏七枝浸酒一瓶元日飲之通治疫癘方常以東行桃枝煎湯浴之未病已病皆治避瘟方以絳囊盛馬蹄屑佩之男左女右預防熱病兼治急黃賊風葛粉二升生地一升豉半升食後米飲服三錢日三服已病則日五服避瘟不染穄米為末頓服之又方三月三日取黍面和菜作羹食預解瘡疹茜根煎汁入少酒服時行疹子正發時服此則可無患李子建殺鬼丸避瘟疫殺一切魑魅魍魎藜蘆三兩虎骨頭兩半雄黃鬼臼天雄皂莢蕪荑各五錢共為末揉入艾絨中用壯紙二層卷作筒遇瘟疫時點著薰病人房中七物虎頭丸避瘟殺鬼虎頭硃砂雄黃各兩半鬼臼皂莢蕪荑雄黃各一兩為末熔蠟丸彈子大紅絹袋盛一丸系男左女右臂上又懸屋四角晦望夜半各當戶燒一丸晨起各人吞小豆大一丸則不傳染太乙流金散大避瘟疫雄黃兩半羚羊角一兩雌黃白礬鬼箭羽各七錢半共粗末三角絳囊盛一兩帶心前並掛戶上又青布包少許中庭燒之臘月鼠燒之避瘟氣又於正旦所居處埋之避瘟疫氣除瘟方松峰審定五瘟丹一名涼水金丹一名代天宣化丹專治時症瘟疫發熱頭身腹痛譫語無汗日久不愈或發黃斑疹與痧或二便五六日不行等症並暑月一切熱症又解痘疹毒甘草制甲己年為君黃芩乙庚年為君黃柏丙辛年為君梔子丁壬年為君黃連戊癸年為君香附去淨細毛蘇葉鳳頭者蒼朮米泔浸陳皮以上四味為臣明雄另研細硃砂另研細制甘草法立冬日取大青竹竿一頭截去節一頭留節納生甘草末於內蠟封緊口浸糞坑中頭冬至取出曬乾聽用前甘草等五味當以某年為君者多臣數之半如甘草用二兩則香附等四味止用一兩也雄朱又減臣數之半止用五錢矣於冬至日將甘草等九味共為末雄朱另研以一半入甘草等藥末中為丸留一半為衣再用飛金為衣大人服者丸如梧子小兒服者丸如黍米雪水生蜜為丸面東服五十丸病輕日淺者一服而愈病深日久者三四服而痊忌腥辛辣油膩煎炒一切厚味其分兩如君用一兩臣則五錢多寡不論總臣減君一半雄朱又減臣一半也松峰曰此方見萬氏家傳瘟疫門中與馬氏瘟疫發源書內所載互有異同萬氏有蒼陳而馬則無之萬氏香附制炒而馬氏言俱不見火萬氏用雪為丸而馬氏用大黃膏子萬氏不貼金而馬氏則貼金萬氏服用滾白水而馬氏則用涼水萬氏甘草法制而馬氏不法制其餘俱各相同愚意甘草制之則成人中黃大能祛疫蒼朮香附吾用其生者蓋炒之則未免有火氣飛金重貼亦妙以其鎮靜也至於用大黃膏為丸於初感瘟疫邪尚在經者大不相宜當仍以雪水為丸如恐不黏酌加生蜜則易丸初感瘟疫者用滾白水送大熱時冷水送不大便時方用大黃水送取二方而斟酌盡善此為近之柴胡白虎煎治陽明溫熱表邪不解等症柴胡黃芩麥冬各二錢石膏三錢甘草七分引用竹葉柴葛煎治瘟毒表裡俱熱能散毒養陰並治痘疹柴胡乾葛黃芩連翹去隔白芍酒炒甘草水煎服歸柴飲治營虛不能作汗及真陰不足外感寒邪難解者此神方也大便多溏者以冬朮代當歸亦佳當歸一兩柴胡五錢炙草八分流水煎或加姜三五片或加陳皮一錢或加參人馬平安散治一切時症風寒暑濕內傷生冷飲食頭風頭痛心痛絞腸痧悶氣小腸疝氣牙痛豬羊瘋症用簪腳點兩眼角或吹鼻孔男左女右焰硝二錢硃砂明雄各一錢冰片五分麝香一錢共為細末端陽午時修合瓷瓶收貯勿出氣神仙祛瘟方服後已病者即痊未病者不染撫芎八錢五分蒼朮三錢三分三釐米泔浸炒甘草一錢六分六釐乾葛一錢三分六釐生薑三片蔥三棵連根水二碗煎八分空心服病急者即當急服勿拘空心之說撫芎用一錢亦效已試葛根淡豉湯治四時感冒葛根五錢淡豉三錢煎服入薑汁少許人中黃丸一味不拘多少飯為丸綠豆大下十五丸炒麩熨法熱邪傳裡服藥後將鹽炒麩一升絹包於病人腹上熨之藥氣得熱則行大便易通松毛酒可避五年瘟松毛細切末酒下二錢日三服薑糖引治瘟疫兼治傷寒白糖一兩生薑五錢搗爛滾水和服不應再服頭痛如破連須蔥半斤生薑二兩水煮溫服姜熨法治胸膈不寬一切寒結熱結水結痰結痞氣結生薑搗如泥將汁擰出存用取渣炒熱絹包揉熨心胸脅下渣冷入汁炒再熨仙傳吐法治一切瘟疫傷寒傷風傷酒傷食病初得用之更宜飲百沸湯半碗以手揉肚再飲再揉直至腹無所容用雞翎探吐吐後煎蔥醋湯飲之覆衣取汗甚捷諸葛行軍散綠豆粉一兩麻黃末八錢共研爛和勻每服一錢用無根水調服汗出即愈靈寶避瘟丹蒼朮一斤降香四兩雄黃二兩硫黃一兩硝石一兩柏葉半斤丹參二兩桂皮二兩藿香二兩白芷四兩桃頭四兩五月五日午時收雄狐糞二兩尖頭者是菖蒲根四兩升麻一兩商陸根二兩大黃二兩羌活二兩獨活二兩雌黃一兩唵叭香如無可減赤小豆二兩仙茅二兩硃砂二兩鬼箭羽二兩以上共二十四味按二十四氣為末米糊為丸如彈子大焚一丸松峰按桃頭不知何物豈桃樹尖耶唵叭香出唵叭國色黑有紅潤者佳以軟靜色明者為上燒之能避邪魅逐瘟方地黃八兩巨勝子一升研再同地黃搗爛牛膝四兩五加皮四兩地骨皮四兩官桂防風各二兩仙靈皮三兩用牛乳五兩同甘草湯浸三日以半升同乳拌仙靈皮放瓷瓶內飯鍋中蒸之待牛乳盡出出字存疑方以溫水淘切同前藥剉細袋裝浸於二斗酒中數日藥味全下後去渣十月朔飲至冬至一方雪水能解瘟疫當收貯聽用單飲煎藥俱可一方臘月取皂角燒為末收貯遇時疫早起井華水調服一錢或加薑汁蜜少許井華水清晨第一次汲者干艾煎治瘟疫頭痛壯熱脈盛干艾葉三升水一斗煮一升頓服取汗松峰按水酒以升斗計不行於今久矣況艾葉乎用時艾葉計以錢水計以盅可耳椿皮煎治瘟疫頭痛壯熱初得二三日者生椿皮一升切水二升半煎每服八合松峰云椿系香椿今之臭椿乃樗耳蒿柳汁治瘟疫傷寒不論日之多少黃蒿心七個柳條心七個入碗內搗爛或少加水亦可濾去渣用雞子一個飛金三帖和汁攪勻令病人一口吸盡隨即炒鹽半碗研細羅下用手蘸鹽將病人胸腹並前後心遍擦再速用黃蒿柳條熬滾水將病人周身蕩之照方如是者三次立時發汗而痊呂祖塞鼻丹歌曰沉香木香皆末共乳香硼砂皂角共良薑細辛當歸各等分巴豆川椒及麝香又加硃砂雄黃等血蠍硇砂熟棗穰搗爛每粒丸成桐子大呼吸補瀉便離床口含冷水面朝上仰臥不問輕重一炷香祖師留下靈丹藥諸病聞之自安康用此藥治瘟疫亦可故選入治瘟疫應去巴豆人馬平安行軍散明雄硃砂火硝枯礬乳香去油兒茶冰片麝香硼砂沒藥去油各等分共為細末點大眼角男左女右冰麝少加亦可一點絞腸痧二點氣腰痛三點重傷風四點蟲蠍傷五點火眼發六點走風痛七點急心痛八點急頭痛九點火牙痛十點牛馬驢神柏散治瘟疫用廟社中西南柏樹東南枝疑用嫩枝帶葉者曬乾研末新汲水下二錢日三次六合定中丸蘇葉二兩炒宣木瓜二兩微炒真藿香二兩帶梗子丁香一兩研毋見火白檀一兩香薷一兩曬不見火木香一兩不見火甘草一兩微炒共為細末滴水為丸如椒大每服二錢一治胸膈飽悶用生薑二片煎水服一嘔吐用滾水半盅對薑汁少許服一霍亂用生薑二片煎水加炒鹽五分服一不服水土煨姜三片煎水服一絞腸痧炒鹽水煎服一泄瀉生薑煎水服藕蜜漿治時氣瘟症生藕搗取汁一盅入蜜一合和勻分作兩服生薑益元煎益元散三錢生薑三錢搗黃酒水各半盅煎三滾溫服即愈除瘟解毒松峰云方書每言一滾者蓋言煎滾取下落滾再煎再落如是者三天行病心悶用水中苔搗取汁治瘟方用紅糖入罐內封固蠟塞口臘月浸糞坑中二月取出遇瘟疫用水調服患疫忌葷一日牛桑飲治餘熱不退煩渴四肢無力不能飲食牛蒡根生搗汁約五六合空腹分二服服訖取桑葉一大把炙黃水一升煮五六合服暖覆取汗無葉用枝白藥散治瘟疫白藥子出江西葉似烏舊子如綠豆末空腹水頓服即仰臥一食時候心頭悶亂或噁心腹內如車鳴刺痛良久或吐利數次皆勿怪服冷粥一碗止之神麯煎此方治瘟疫初起自直隸傳來試之亦不甚效意或瘟疫由食積而發者服之始效耶神麯五錢炒青皮一錢葛根一錢枳實錢五紅曲錢五芫荽根七條鮮者更妙栝蔞湯大栝蔞一個取瓤剉置碗中熱湯一碗沃之蓋良久去渣不拘時服治熱病頭痛發熱一方船底苔療天行時疫伏熱溫毒治瘟疫秘方麥冬三錢去心燈心三十寸芫荽梗三十寸棗三枚劈竹葉三十片流水煎熱服治瘟疫並大頭方大力子防風各等分共為末每用五錢黃酒一盅水一大盅同煎空腹溫服蓋被出汗六一泥飲治瘟疫八九日已經汗下不退口渴咽乾欲飲水者六一泥即蚯蚓糞不拘多少新汲水調服雞子拖法治同上用雞子打一孔留黃將青傾在病者腹上用手在腹上圓轉攤搓久則漸成白沫用手抹棄再敲開一雞子依樣搓之止用四五枚腹內便覺清涼觀音救苦散專治傷風傷寒並疫氣所侵稍覺頭昏腦悶項背拘急吹鼻取嚏毒氣隨散永不染著仙方也川芎藿香黎蘆各三錢丹皮去心元胡索硃砂各二錢雄黃白芷牙皂各四錢七味草藥共為細末朱雄另研調入收貯用時先噙水在口內次以藥吸入兩鼻孔吐水取嚏未病者吹之不染牛馬等受瘟者吹之亦效治鬼魅魘人法降香末一錢皂角末一錢硃砂雄黃各三分研麝香三分與上同研艾葉五錢揉爛將藥末揉入艾中草紙裹為長筒點放床底則不魘兼祛百怪惡邪之氣太乙紫金錠一名紫金丹一名玉樞丹瘟疫煩亂髮狂喉閉喉風以及陰陽二毒傷寒心悶狂言胸膈滯寒邪毒未出俱薄荷湯下凡遇天行時疫沿街闔戶傳染者用桃根湯磨濃滴鼻孔再服少許任入病家不染兼治數十種雜症用引各殊俱載醫宗金鑑外科脾發疽門中茲不錄雄黃三錢取明紅大塊研硃砂三錢大而有神氣者研麝香三錢真者揀淨皮毛研川五倍子二兩一名文蛤捶破去蟲屎研紅芽大戟一兩五錢去蘆根洗淨焙乾為末杭州紫色者為上江南土大戟次之北方綿大戟色白性烈害人勿用千金子仁一兩白者去油一名續隨子上藥各擇精品於淨室中制畢候端午七夕重陽或天月德天醫黃道上吉之辰合藥前三日齋戒至期更衣洗手薰香設藥王牌位焚香拜禱畢將前藥逐味稱准入大乳缽內再研數百轉入細石臼內漸加糯米濃汁調和軟硬得中用杵搗千餘下至極光潤為度每錠一錢修合時除使令之人余皆忌見做此藥唯在潔誠方效病人每服一錠勢重者再服一錠以通利為度利後溫粥補之通治瘟病初得頭痛脈大壯熱小蒜汁少加水頓服再服即痊嵐瘴大蒜生熟各七片共食少頃腹鳴或吐血泄瀉即愈治時氣豬脂如彈丸溫水化服日三次苦參酒治瘟疫欲死並治熱毒氣欲死苦參一兩黃酒一壺煮半壺飲盡當吐則愈諸毒病服之覆取汗皆愈此方三見各有不同故並錄之梓皮飲生梓白皮切水煎服治時氣瘟病頭痛壯熱初得一二日者瘟病復感寒邪變為胃啘治同蘘荷汁治傷寒瘟病初得頭痛壯熱脈盛者蘘荷連根葉搗絞汁服治瘟疫虎耳草擂酒服治瘟疫時行風熱菾菜音甜一名莙薘齊魯名為滾當搗汁飲之梨甘飲通治瘟疫梨樹皮大粉草各一兩黃秫谷一合為末百草霜一錢共為細末每服三錢白湯日二服時氣頭痛煩熱皂角燒研入薑汁蜜各少許水和二錢服之先以熱水淋浴後服藥取汗即愈時疾煩悶瀉痢大渴孕婦心熱等症蘆根一兩煎濃湯服天行熱疾煩渴發狂及服金石心熱發渴並煮苧汁服瘟毒大熱壯豬干糞水漬取清飲
