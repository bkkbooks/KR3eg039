body:
  text: 卷之四辨疑辨溫病陰暑此事難知云冬行秋令當寒而溫火盛水虧云云推作瘟病之原固為近理乃又云火土合德濕熱相助故為溫病是溫病必原於濕熱將濕熱一門並可以不立矣須知濕熱乃夏時之正氣瘟疫乃天地之雜氣二者迥乎不同謂瘟病而兼濕熱則有之未聞濕熱而為溫病者也又云惟房室勞傷辛苦之人得之是省房室就安逸之人必無瘟病矣有是理乎每見瘟疫盛行之年節欲安逸之輩往往有無端而感者又何以稱焉又云多欲辛苦之人腎水內竭陽氣外泄生化之源既絶身之所存獨熱云云謂瘟病中有此一種則可耳若云瘟病盡由乎此則萬無是理也至於暑字字彙解為夏天氣熱則人之受是氣者斷無尚有屬陰之理其曰陰暑者只因人畏暑納涼外受寒邪所致仍是感冒乃拋卻現在之受寒而止泥前此之受暑故以陰暑名之亦猶之曰陰熱也有是理乎知陰熱二字之不通則知暑之不可以陰言也明矣辨夏涼冬暖不足致疾吳又可瘟疫論中駁冬溫之說曰夏涼冬暖轉得春秋之和氣豈有因其和而反致疾者四時之序應寒則寒應暖則暖所以人得天地之正氣不能為病若夏宜熱而反涼冬宜寒而反暖未有不致疾者但夏過於涼其為病也即時而見惟冬令天氣過於和煦往往當時不能為害至來歲春夏之間方大發瘟疫此余屢經而屢驗者實非臆說也第夏應熱而反涼人感寒邪而閉塞腠理不能疏泄其為病也固無足異唯冬時有非節之暖當時不即病必至來歲春夏間始作此誠不可解也人動曰冬傷於寒至春夏變為溫暑病余則曰冬過於溫至春夏多發瘟疫病彼吳又可謂冬暖夏涼不足以致疾也吾棄不以為然蓋以暖屬於春涼屬於秋暖與涼為春秋之正氣謂之和也始宜若見於冬夏之令夏涼冬暖此為非其時有其氣則不得謂之和矣不和即為反常之戾氣此夏涼冬暖之多致疾也又烏得言溫暖清涼之未必為病也哉辨吳又可偏用大黃瘟疫一症感邪癘之毒十之六感溫熱之毒十之四故用黃連解毒等湯不唯在表時服之寒凝血滯厥疾不瘳即邪熱內傳應服涼藥余往往不用黃連不過生地丹皮二冬元參銀花童便極數用石膏梔子黃芩而止無不奏效故吳又可戒用寒劑而專用大黃亦未可為非蓋大黃雖寒其性走而不守當瘟疫膠固之時得此一番推蕩邪便解散較純用寒涼者固勝一籌但邪未入腑而輒用之既不能解在經之邪徒受寒中破腹之患其害有不可勝言者又可之用大黃雖不孟浪至是但宜下諸症未免偏於攻擊全忘下不厭遲之說若不善師又可而舉手即用大黃反引又可為證則又為又可之罪人矣辨用老君神明散東坡聖散子活人云一歲之中病無長幼率相似此則時行之氣俗謂之天行是也老君神明散務成子螢火丸聖散子敗毒散不拘日數淺深吐下隨症施行所以聖散子不問陰陽表裡也語云用古方治今病譬如拆舊料蓋新房不再經匠氏之手豈可用乎旨哉斯言洵堪為醫學用藥之准矣夫古今之元氣不同觀漢人之處方動以兩計宋元而降不過錢計而已以漢人之方治今人之病吾知其過於峻重以今人之方治漢人之病吾知其不及病情此處方分兩之未可泥也至於用藥之權衡則又不得以漫投者蓋四方之風土不齊群倫之老少各異天道之寒暄無定南北之燥濕頓殊人在氣交之中或偏於陽或偏於陰或有時而壯旺或有時而虛怯即一人之身一日之際內傷七情外感六氣其病情之出沒隱現真有若雲龍之不可方物者若必執一方以應無窮之變也有是理乎活人以老君神明散東坡聖散子為治疫癘之的方不拘日數之淺深病症之吐下亦不問陰陽表裡便率爾妄投其不殺人如麻者鮮矣蓋二方中用烏附吳萸毒熱之品陰寒直中者服之庶或無過若傷寒傳經熱症以及瘟疫瘟毒正宜用芩連大黃之時若投此湯入口必斃神明散用絹袋盛帶以此外治不服食尚不能為害至於聖散子則煎服之藥是斷斷乎不可用者此方藥味亂雜即真陰寒症用之亦恐未能獲效也後世因過信蘇長公隨奉為良劑甘就死地噫抑何其為東坡之名之所震以至於此哉以及神明散不過平人所制假以李蘇之名以眩人之耳目好異者遂深信而不疑者若必謂是方出自李蘇則張景嶽新方八陳中王母桃一品豈真瑤池仙府之所垂乎吾願世之業醫者不可拘於一定之方亦不可執其一偏之見變動不拘權衡有準則於岐黃一道思過半矣辨賠賑散等方二分晰義書中載賠賑散一方用大黃為君而以殭蠶蟬蛻薑黃佐之共為末蜜酒調服用治三十六般熱疫夫一方而治多病者唯萬應膏為然除此則廣東蠟丸亦有此說然彼必有一單某症用某引和服是丸雖一方而引因病異則引之所關最大視無引而一方兼治者不侔矣且瘟疫更與雜症不同有表裡分傳之異經腑臟胃之殊老少強弱之分天人風土之別焉能以一方而治三十六症乎余始得此書值瘟疫盛行之年曾修和一料備用後偶出門一女孫患瘟疫家中人因取與服服之返泄瀉昏睡增劇筠谷兄修合此藥云乳蛾等疾服之甚效余細維其故孫女服之增劇者以邪尚在表方內有大黃宜乎不受至於云治咽喉或於熱毒相宜豈三十六症中詎無一應者乎中又有大小復蘇飲子大小清涼滌疫散靖疫飲驅疫飲等方總以黃連為君更雜録諸寒苦藥以佐之有至二十味之多者更斷斷不敢用也辨張景嶽言瘟疫景嶽全書各門中講解俱極精詳透闢唯瘟疫然緣其將傷寒瘟疫二症攪作一團未曾分晰也其論瘟疫曰瘟疫本即傷寒無非外邪之病但染時氣而病無少長率相似者是即瘟疫之謂云云第傷寒為寒所傷或涼雨所逼或風雪所激或失足落水或猝然脫衣或當風而寢以致頭痛憎寒皮膚壯熱脊強無汗方謂之傷寒此係自取之病病只一人而止而衆人不然也至於瘟疫絶無諸項感觸而抖然患病且非一人鄉邑閭里動皆相似其症雖有頭痛身熱脊強而多汗始終一於為熱與傷寒迥乎不同治法亦異如何曰瘟疫本即傷寒乎夫既曰本即傷寒再立瘟疫一門豈非贅瘤乎且既曰本即傷寒而又曰染時氣而病吾不知先傷於寒而後為時氣所染乎抑染於時氣而後為寒所傷乎抑二者並集於一人之身乎總緣傷寒瘟疫原未看清猶做帖括者認題不真下筆便錯雖詞藻絢爛而不中肯綮總屬陳飯土羹其何以言文哉最不敢從者發汗峻補二條抑知瘟疫豈強汗之所能解者乎而峻補豈可施於熱毒之人乎唯汗下後或顯虛症或虛極久病之人而感瘟者用補法亦自不可少也辨嘔吐噦厄逆咳逆噫氣丹溪書嘔吐門曰有聲有物謂之嘔吐是混嘔吐為一張景嶽亦不以為然而未嘗深辨及觀李東垣則以嘔為有聲有物孫真人則以吐為有物無聲詳嘔吐字意當以孫李為是字彙嘔亦同謳夫嘔必有聲而訒菴謂氣逆則嘔蓋氣一逆必作聲隨擁所食之物而俱出矣吐則較嘔所出更易開口便漾出又豈有聲哉至於噦之一症經中雜病篇直作厄逆而河間海藏則以噦為乾嘔張景嶽謂厄逆古無是名其在內經即謂之噦是特古今之稱名不同而噦與厄逆斷不可混為一症也噦雖以河間海藏說為是而東垣十書溯洄集中則謂噦之聲濁惡長而有力直至氣盡而後止非如干嘔之輕而不甚也是較之劉王所說則更明白曉暢矣至於厄逆即東垣所謂吃忒者是此症稱名不一隨其方言而呼之有曰格得者有曰打厄者有曰打歌得者總與噦為二症明系今之所謂打厄是也靈樞則謂之䭇音噎所謂䭇不得息者是也觀金鑑中以為格格連聲氣從臍下來自衝脈出口作聲豈非善於形容者乎至於咳逆與厄逆則又不可相混有以咳逆為厄逆者有以咳逆為噦者是皆未詳味經文耳經本以咳嗽氣逆為言如氣交變大論曰歲金太過甚則喘咳逆氣又曰咳逆甚而血溢蓋以咳嗽不止而血隨氣上耳未聞打厄而見血者也此咳逆之非厄逆亦甚明矣而咳逆之非噦又何待辨乎至噫氣之說靈樞云寒氣客於胃厥逆從下上散復出於胃故為噫仲景謂上焦受中焦氣未和不能消是故能噫據此則噫者即噯氣也即俗之所謂拔氣也此理甚明人所易曉總之有聲有物曰嘔有物無聲曰吐有聲無物曰噦厄逆者即打厄之謂咳逆者咳嗽之甚以致氣逆上衝也噫者字彙解作飽食氣滿而有聲豈非所謂拔氣者乎症各不同斷難相混至於得病之由與其治法各有虛實寒熱之異散見諸門茲不贅辨五疫治法龐氏云春三月行青筋牽病夏三月行赤脈㩌病秋三月行白氣貍病冬三月行黑骨瘟病四季月各餘十八日土王用事行黃肉隨病後人又以木火金水土五疫配之治各有定法其中止有所謂五疫乃天地之癘氣人中之則各隨其臟氣以為病之說尚屬近理如所謂青筋牽等名色矜奇立異無益症治其用方如春三月用羌活湯夏三月用雙解散等法亦見沾滯至秋三月天漸涼冷反用三黃石膏殊不近理至其所用藥俱系發散等劑亦非治瘟疫的方也辨吳又可疫有九傳治法中先里後表吳又可九傳治法有先里而後表者始則發熱漸加里症下之裡症除二三日內又發熱反加頭痛身痛脈浮者宜白虎湯按其瘟疫初起治法云脈長洪而數大汗多渴此白虎湯症又云白虎治瘟疫脈長洪而數又云脈長洪而數白虎清涼解散服之或戰汗自汗而解是凡三言白虎症而絶無脈浮之說也至於發熱頭痛雖列於白虎湯之下而又無身痛前後多所滲漏不符看來頭身痛脈浮三症似宜小柴胡加羌防始與症對而乃用白虎何也辨瘟邪止在三陽經吳又可之瘟疫論世所盛行其中達原飲固為治瘟疫之良方第言瘟邪浮越於某經者即加某經之藥止有三陽在表治法至於邪之傳裡者僅有入陽明胃腑一條傳三陰則略而不及夫云邪伏膜原自內達外不似傷寒之按次傳經則可若云邪總不入三陰是將臟腑經絡劃然中斷而人身之營衛總扞格而不通矣此豈理也哉即傷寒傳足不傳手之說識者猶或非之至於瘟疫之傳變且並將三陰而遺之何也每見患瘟疫者腹脹滿大便實或自利發黃以及四肢諸症非傳入足太陰經乎舌乾口燥咽痛但欲寐非傳入足少陰經乎煩滿囊縮以及善怒號呼沖逆動搖並脅肋諸症非傳入足厥陰經乎且不特此也患在皮毛氣分而哮喘咳嗽者知邪之入肺患在神志昏冒而面赤喜笑者知邪之入心是則五臟六腑瘟邪之傳變無所不到謂臟腑諸症不能一時皆現則可謂瘟邪止在三陽經必無是理也辨內傷寒認作瘟疫內傷寒之症初起無熱不渴止有胸膈䐜脹滿悶面唇皆無光澤或嘔而胸腹急痛手足冷自覺不舒快少情緒其脈沉細此症總由過食生冷傷於脾胃所致故方書名之為內傷寒而以治中湯溫散之此症多感於夏月而瘟疫盛行之時與瘟疫甫愈之後或感此症昧者誤認為瘟疫而以疫法治之鮮有不敗事者其弊必至於卒不能食泄瀉不止而釀成大患唯用治中湯加減出入寒甚則加熟附食積則加麥芽神麯肉積則加山楂嘔惡則加藿香製半夏鮮薑砂仁兼濕則加茯苓蒼朮胸脅痛悶則加枳殼白芍柴胡若內既傷生冷而外復感風寒則用藿香正氣散或五積散平胃散等加減治之治中湯即理中湯加陳皮青皮藿香正氣散治外感風寒內傷飲食憎寒壯熱頭痛嘔胸膈滿悶咳嗽氣喘及傷冷傷濕瘧暑霍亂吐瀉凡感嵐瘴不正之氣者並增減用之錦按疫初起用達原飲等不效者用此方加減治之藿香蘇葉白芷陳皮半夏制茯苓甘草厚朴薑汁炒桔梗白朮泔浸土炒大腹皮洗極淨鴆鳥好集其樹毛落皮上洗不淨殺人蒼朮泔浸炒原方無今加入無汗者更宜又一方加木瓜傷食加消導藥薑棗煎五積散治外感風寒內傷生冷其曰五積者能散寒積食積氣積血積痰積凡身熱無汗頭身項背疼痛拘急胸滿惡食嘔吐腹痛寒熱往來並治蒼朮泔浸炒厚朴薑汁炒陳皮甘草半夏制當歸酒洗川芎酒洗白芍酒炒茯苓枳殼麩炒桔梗白芷蘇葉改代麻黃乾薑表重用鮮肉桂表重者用枝生蔥姜煎平胃散治脾濕痰痞宿食滿悶嘔瀉及嵐瘴不服水土蒼朮泔浸炒厚朴姜炒陳皮炙草薑棗煎如傷食加神麯麥芽或枳實濕勝加五苓散痰多加製半夏脾倦不思食加參術痞悶加枳殼木香香附大便結閉加熟軍小便赤澀加芩澤風寒加蔥豉蘇芷防風內傷寒發斑患內傷寒後又兼之寒熱間作鼻中微出血兩手脈沉澀皮膚按之殊無大熱身上有斑三五點此內傷寒斑也調中湯主之夾暑加香薷扁豆調中湯陳皮半夏制甘草桔梗蒼朮泔浸炒川芎酒洗白芍酒炒砂仁炒研藿香羌活白芷麻黃或代蘇葉桂枝枳殼生薑煎內傷寒發黃內傷寒發黃者其人脾胃素虛或食寒涼生冷之物以致寒實結搏停滯不散中州變寒而發黃色或嘔吐或腹滿自利小便短少者宜調中湯見前加茵陳或理中湯加茵陳枳實草果手足逆冷脈沉者加附子按內傷寒為病本系雜症而採入瘟疫門中者因瘟疫愈後不戒生冷每患此症或再微發熱惡寒昧者不察往往誤認為瘟病之復而以疫法治之寒涼清解害人不淺故特為拈出再者瘟疫之復不能吃煙內傷寒始終能吃煙以此為辨錦志辨汗無太早下無太晚此事難知云汗無太早非預早之早乃早晚之早謂當日午以前謂陽之分當發其汗午後陰之分不當發汗下無太晚非待久之晚乃當日巳後為陰之分也下之謂當巳前為陽之分也凡人初感寒邪一覺憎寒頭痛身痛身熱脊強便宜用溫散之劑速發其汗斷無不愈之理雖年老及平素虛怯之人不易作汗者覺病即服汗劑其邪亦無不即當時解散者此余屢用而屢效者也遲則寒邪稽留傳變百出而斑黃狂躁等症作矣所以一覺感寒便宜速治若必如難知所說或日午以後感寒必遲至明朝午前服汗劑不亦晚乎假如午後感寒此時雖屬陰分亦宜速服散劑且服之多未有當時即汗者必俟次早藥力既行又逢陽分出汗更易易耳所謂汗無太早者明系預早之早豈早晚之早乎傷寒如此瘟疫亦然瘟病之所謂不宜發汗者指麻桂紫蘇而言至於元霜紫雪等丹豈非涼散之劑乎瘟疫初起當即服藥亦不必拘以時日也至所謂太晚之說分明解作遲下非早晨夜晚第此言為庸醫不應下而妄下之者說法耳然其言不能無弊也若遇宜急下之症而必執下無太晚之說則陽明胃腑勢必被邪火燒至燥裂而不可救矣下劑若必拘以時不亦謬哉早晚二字當易以遲速云汗無太速下無太遲則不煩言而解矣辨鄭聲論曰實則譫語虛則鄭聲重平聲語也夫聲必有語語必有聲蓋言聲則鄭而語則重也人虛而精神衰乏不能自主語言重復絮聒而聲則有類於鄭耳鄭聲淫是狀其聲之哼哼唧唧頗似淫聲惟馮氏謂聲戰無力不能接續造字出於喉中為得解成氏亦謂鄭衛之聲而王氏駁之則非矣又有解鄭聲為鄭重者夫曰鄭重其事則有矣曰鄭重分明則有矣以此解病人之聲得乎要之指鄭之淫聲取譬無疑也凡患此症其聲必低氣必短脈必無力色必萎悴其兼證則目無赤色舌無苔刺身無大熱口無煩渴小便清長大便滑潤或泄瀉凡自言自語喃喃不全者皆是也瘟疫始終一於為熱罕見此症或汗多亡陽下多亡陰者有之若果虛最忌攻伐少有差謬無不即死速宜察其精神辨其陰陽斟酌溫補以救其根本為要若昏沉上氣喘促發厄不止不省人事者危辨褚氏春瘟夏疫瘟疫之說前諸論中已詳哉其言之矣茲讀褚氏遺書審微篇有云春瘟夏疫內症先出是將瘟疫二字拆開分配春夏總緣平看瘟疫二字且未悉其理解須知諸凡雜症苟一時所患皆同者皆有疫氣以行乎其間如徭役之役故悉得以役名之而所該之病甚廣瘟疫不過疫中之一症耳乃串講之辭若曰瘟病之為癘疫如是也若必如褚氏春瘟夏疫之說是將瘟疫二字拆開對待言之矣由此以推則世之稱傷寒者獨不可云秋為傷而冬為寒乎知分作傷病寒病之不通則知言春瘟夏疫者之未妥也明矣至於褚氏言男女異脈云女子陰逆自上生下故右寸為受命之根萬物從土而出故左關為脾生左尺肺肺生右寸腎腎生右關肝肝生右尺心等說戴起宗曾非之今不必再辨
