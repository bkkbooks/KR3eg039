body:
  text: 卷之三雜疫葡萄疫小兒多患此症以受四時不正之氣鬱於皮膚結成大小青紫斑點色若葡萄發在遍體頭面乃為腑症邪毒傳胃牙根出血久則必至虧損初起宜服羚羊角散清熱涼血久則胃脾湯滋益其內又有牙根腐爛者人中白散加減羚羊角散此方銀花羌活殭蠶生地等皆可酌入羚羊角末防風麥冬去心元參知母酒炒黃芩牛蒡子研炒甘草節金銀花淡竹葉十餘片煎服胃脾湯此湯必實有不足之症方可用初起切勿輕投白朮土炒茯神陳皮遠志去心麥冬去心沙參五味子研甘草節虛弱自汗者去沙參加參耆人中白散治小兒走馬牙疳牙齦腐爛黑臭人中白尿壺中白鹼煅一兩兒茶五錢黃柏薄荷青黛各三錢冰片二分五釐共為細末先用溫湯漱淨吹藥於疳上日六七次吹藥涎從外流者吉內收者凶捻頸瘟其症喉痹失音頸大腹脹如蝦蟆者是也宜荊防敗毒散荊防敗毒散荊芥防風羌活獨活柴胡前胡桔梗枳殼麩炒川芎酒洗茯苓人參甘草薑蔥煎食遠服發冷倍用蔥蝦蟆瘟其症咽喉腫痛涕唾稠黏甚則往來寒熱身痛拘急大便秘結有類傷寒亦與捻頸瘟相似但以不腹脹為異治法涼散和解攻下敗毒隨症施治無不獲愈方俱散見各醫書本門不多贅其治療捷法於初起時用手在病人兩臂自肩項極力將其中凝滯癘氣惡血趕至手腕數次用帶子將手腕扎住不令惡血走散用針刺少商穴並十指近甲蓋薄肉正中處捻出惡血則愈少商穴在大指外邊仄面靠甲角處摸有穴者便是又法將脖項患處口銜鹽水用力吮咂俟其皮色紅紫成片則愈或用針將項下一挑手捻針孔出血密密挑捻愈大頭瘟外科門亦名時毒此症有陰陽有可汗不可汗者其症發於頭上並腦後項腮頰與目赤腫而痛發熱症似傷寒治療散見各醫書本門茲不多贅用前刺法亦妙大力子丸兼治啞瘴元參連翹去隔甘草桔梗川大黃生熟酌用石膏煅研川連酒炒黃芩酒炒荊芥防風羌活大力子炒研為末作丸或姜煎服亦可又方殭蠶二兩浸大黃二兩薑汁丸彈子大蜜水和服一丸又方普濟消毒飲見醫方集解專治大頭瘟初起又方大頭瘟生疙瘩及喉閉並將疙瘩刺出血即愈瓜瓤瘟其症胸高脅起嘔汁如血宜生犀飲生犀飲黃土五錢犀角二錢鎊蒼朮泔浸油炒川連岕山茶一撮流水煎入金汁和服日三夜二虛加人參鹽水炒大便結加大黃渴加花粉表熱去蒼朮黃土加桂枝性熱似不宜當酌加別解表藥便膿血去蒼朮倍黃土加黃柏使便滑人中黃代金汁楊梅瘟形似楊梅其症遍身紫塊忽發出黴瘡者是也用清熱解毒湯下人中黃丸並刺塊出血黴音枚物著濕變色清熱解毒湯川連酒洗黃芩酒洗生地白芍酒炒石膏煅研知母鹽酒炒人參甘草升麻葛根羌活日三服夜二服姜煎人中黃丸大黃三兩尿浸蒼朮油炒桔梗滑石各二兩人參川連酒洗防風各五錢香附兩半薑汁浸生用人中黃二兩如無坑垢代之神麯糊為丸清熱解毒湯送如氣虛用四君子湯送如血虛四物湯送痰甚二陳湯送熱甚童便送錦按二方用參非取其補取其鼓舞之以祛邪也疙瘩瘟其症發磈如瘤遍身流走旦發夕死三稜針刺入委中三分出血並服人中黃散委中穴在兩腿屈盤當中前對膝蓋人中黃散人中黃一兩明雄硃砂各一兩共為末薄荷桔梗湯下二錢日三夜二消毒丸治時疫疙瘩惡症大黃牡蠣煅殭蠶泡去涎炒各一兩共為末煉蜜丸彈子大新汲水化下一丸無時軟腳瘟其症便清泄白足瘇難移即濕瘟宜蒼朮白虎湯即白虎湯加蒼朮絞腸瘟一名痧其症腸鳴乾嘔或水瀉氣不通則探吐之宜雙解散有陰陽二症陰痧腹痛手足冷身上有紅點用燈草蘸油點著將紅點淬之陽痧腸痛手足暖以針刺少商穴並十指尖近甲處刺法見前此刺法治諸中霍亂咽喉等病俱效陰陽水方滾水一盅冷水一盅對服立愈或加炒鹽少許妙觀音救苦丹磨點眼角二三次兼治咽喉諸症含麥大一塊化咽一切腫毒惡瘡蛇蠍傷津研擦患處火硝一兩白礬四兩黃丹二兩硃砂明雄各五分以上二方兼治陰陽二痧共細研勺化開候稍冷搓成小錠瓷器收貯聽用毋出氣地漿於南牆背陰處掘一坑入涼水一罐繳之再候澄清取飲又方生明礬末二錢冷水滾水各半盅調服又方綠豆一二升水二三桶熬湯以甕貯之令病人澆洗稍冷全身入甕中泡透或稍愈且毋遽出效雙解散即防風通聖散泄瀉去硝黃自汗去麻黃加桂枝涎嗽加薑製半夏防風荊芥薄荷麻黃白朮土炒泔浸川芎酒洗當歸酒洗白芍酒炒連翹去隔山梔炒黃芩石膏煅桔梗甘草滑石末芒硝大黃生熟酌用醫方集解之雙解散減去硝黃引用生薑蔥煎以上四方專治陽痧鸕鷀瘟其症兩腮腫脹憎寒惡熱外用赤小豆柏葉共搗爛水醋調敷內服薄荷濃煎湯服之龍鬚瘟其症喉硬舌強並牽耳中急以針刺喉上橫七針豎七針硃砂不拘多少研蜜一匙入燒酒和勻灌之芋頭瘟其症昏沉不食用芋頭燒灰存性研黃酒送下蟹子瘟其症喉痛發熱噁心痛連腮頰頭亦痛喉旁有疙瘩四散紅絲如蟹爪壓舌針挑之要挑爪不可挑頂每爪上挑一針令血出旋以硃砂末搽之再含咽醋少許即愈如刺當中頂即為傷蟹蓋必出膿不食而危版腸瘟刮出紫疙瘩六個即難治其症初發如傷寒熱病三四日小腹脹滿不治數日即死用麻一縷如指粗先自兩肩頭刮至手腕刮出紫疙瘩針刺破擠去惡血又自兩大腿跟刮至兩足跟有紫疙瘩刺破去惡血俱男先左女先右又自咽窩刮至臍下刺法如前即時汗愈脅痛瘟一名結肋瘟甚惡不治數日即斃其症但脅肋痛蘿白切片蘸燒酒刮痛處出痧即愈未愈用豆油一大盅銅勺熬三分之一服之愈又法青布包黑礬蘸燒酒刮痧又法烙香油厚餅碗口大乘熱熨痛處冷即易可用三四餅餅棄勿食忌生冷刺蝥瘟痧其症壯熱煩悶遍身痛如蝥刺所傷俗名蝥刺瘟以痧治之林月溪患時疫壯熱口渴胸腹迷悶手摩之如蝥刺傷痛遍體皆然因放腿灣痧廿余針毒血成流用山甲天蟲角刺加活血順氣藥稍飲之而痊地葡瘟痧暑熱時疫惡毒之氣攻於裡則為痰喘為血瘀昏迷沉重不省人事若元氣壯實內不受邪不入於裡即散其毒於肌膚血肉之表為腫為脹忌飲熱湯熱酒刺腿灣痧筋並十指尖出毒血內服寶花散治痧仙劑鬱金一錢細辛三錢降香三錢荊芥四錢共為細末清茶調三匙冷服桃仁紅花湯治血凝結桃仁去皮尖紅花蘇木各一錢青皮八分烏藥四分獨活六分白蒺藜去刺搗末一錢二分水煎服紫樸湯治痧有食氣壅盛者厚朴薑汁炒山楂葡子研三稜莪朮枳實麩炒連翹去隔青皮陳皮細辛等分水煎冷服手足麻瘟其症先少腹痛作羊毛疔挑之無血隨作紫疙瘩手足麻麻至不知人而死急令人以足蹅病者手之三關脈上男蹅左手女蹅右手用力蹅勿放直待四肢不麻病人自覺心頭髮火方放之自愈若放之早雖愈後亦纏滯三關脈即兩手寸口診脈處扣頸瘟此症仕宦幕友不可不知倘遇患此死者而顧執言為人所逼勒可乎可補洗冤錄一則聞之老醫臧枚吉云余髫時聞先祖言凡人無故自縊者為扣頸瘟伊時未解詳問及後遍閱方書並無此說辛巳年一人來言其鄉有一婦人平日家道充裕子女成立夫婦和偕忽一日無故自縊幾死救之始免詢之毫無所為惟日鬱鬱不樂藏繩袖中無人處即自縊羅守月餘飲食言動如常述此求治余因憶少時所聞細繹其或是血弱氣盡腠理開邪氣因入與正氣相搏不結於脅下而結於手足厥陰及手太陰之三臟合病者內經曰膻中者臣使之官喜樂出焉今病則憂戚可知刺瘧論曰厥陰之瘧意恐懼腹中悒悒又肝瘧者善太息其狀若死又肺瘧者善驚如有所見瘧如此疫可類推因處一方用香附鬱金雄黃為九氣湯開膻中之郁再加二陳以開膈中之痰更加羌活細辛溫肝逐風鬼箭羽丹參赤小豆以通心包兼泄火邪生薑煎服服後竟頭痛發熱身痛瘟疫症悉具自出其袖中之繩云誰納我乎告以自縊茫不記憶寢疾七日又服發汗藥而解始知此症亦系疫癘或百合病之類乎按既云疫癘之疾何不投火赴水刎頸而必欲自縊乎意或太陰邪氣傳厥陰而風木太過者故不思金火水而獨喜木也緣肺金藏魄肝木藏魂脾土藏意智而心君藏神為一身之主包絡實為臣使代心君行令而主喜樂今手厥陰包絡先病臣使失其喜樂之職以擾心君之神明君火不生土傳足太陰脾而意智不清土不生金因傳手太陰肺而悲憂金不平木因傳足厥陰肝而鬱怒肺金承所不勝而木寡於畏故風木太過且肝之魂挾肺之魄不安其舍出而為祟故喜木而自縊也非有祟憑之乃魂魄意智作癘也或蘇合丸牛黃清心丸當亦可用惜未診其脈色何如也此症原名扣頸傷寒然與寒疾太無涉故改名瘟疫而名實俱當也狼掐翻有兩種其初喉痛旋氣不通殺人甚速對直虎耳尖照耳輪邊用瓷鋒刺出血即愈徐樂然傳又一種心中不安旋不能言牙關緊閉不醒人事身冷出涼汗以手試其兩頰下有斜出一硬物礙手便是竹箸搖開口入指探喉兩旁有物如麥大有單有雙並掐破出血初病血鮮久病血紫立愈指頂先用鹽擦蚰蜒翻小兒多患此兩目紅腫鼻流涕日夜啼號以針密刺太陽穴兩眉尖後如指甲大一塊立愈刺後以芋頭搗爛敷印堂至山根椅子翻不語不食形如呆癡用椅子圈手拿處削下木片煎服愈扁擔翻發即兩肋撐脹難忍用扁擔肩挑處削下木片煎服愈王瓜翻兩脅形如王瓜脹痛用針自咽喉挑起從上而下密挑至臍上橫挑兩肋挑至腰脊骨而止隨挑隨愈初挑無血漸挑即有血挑至腰脊對頭即愈不然再發不救馬道人傳白眼翻其症唯翻白眼頂門灸三艾如不愈再灸三艾即愈繞臍翻一名痧莒父岳廷臣傳其症先繞臍痛漸痛至滿腹旋氣塞胸脅兩肋脹滿沖咽喉氣不通不省人事不急治即死先以針挑兩耳尖次挑結喉下咽窩兩骨尖次挑背後肩胛骨下兩骨尖並令出血立愈疙瘩翻其症先寒後熱渾身發疙瘩赤紫黑色漸至大惡寒發熱不治即死宜參連散參連散人參黃連共為細末等分麝香冰片各少許四味再共研黃酒調服外以透骨草黃龍尾俗名黃連一草煎水洗之松峰日一名紫疙瘩與前疙瘩瘟症治迥異麻雀掙其症胸背腫痛小腹脹滿見食即嘔心中跳躍挑兩大腿腋見血即愈鴉子掙其症眼腫渾身青紫兩脅攻心句似有落字大小便不通男挑龜頭女挑雞冠陰戶之心出血即愈烏沙掙其症兩脅脹胃口痛甚隨將病者手腕趕捻視有紫疙瘩者即此症也治用大針將手腕重刺一針起針時若見紫血噴出痧脹隨消忌冷白飯綠豆黃鷹掙其症肚腹攪痛翻上翻下治法從胳膊上趕下內中氣血用帶子將兩手腕扎住各指稍抱甲肉上當中刺一針捻出惡血即愈羊毛掙一法用青布蘸燒酒遍身擦黃蒿水薰洗亦可汗又法用手推背上二筋撮起掐緊時許其症發熱無汗心內發燒口乾嘔吐前後心毛孔周圍高阜句疑有錯誤字紫色三四處即此症也治用針挑前後心挑患處將羊毛剔淨蒙被出汗即愈如不應再用砂糖少許生薑三片武夷茶一撮同煎服忌腥冷月餘無不效鵓鴿掙其症渾身發燒解裡衣體熱不可當心口一塊滾上滾下挑肚臍並兩乳即愈烏鴉掙狗掙同此治法其症頭痛頭沉頭揚噁心眼黑髮搐指甲先青然後遍體皆青上吐下瀉不能言小腹痛甚至無脈身涼如不急治傾刻殞命牙關如閉速用箸搖開口令病人捲舌視之根下如有青紅紫泡急用針刺泡見血用雄黃末點之滾水和雄黃末飲之或炮藥點之亦好被蓋頭出汗即愈忌風三日兔兒掙其症直走曠野趨跳不寧急用涼水和炮藥灌之只許走治不許坐治或有用濕土埋其頭使聞土氣即愈者長蛇掙其症腹痛打滾先挑肚腹三針次頭頂一針腳心三針即愈纏絲掙其症腹脹痛頭痛心翻一作煩前後心或有紫黃眼子針破以醋擦之如遍體麻木無此痕者亦是此症將胳膊腕腿腕青筋針出紫血用炒鹽調滾水灌之即愈水入姜三片亦可啞叭掙其症不能言用鞋底蘸涼水打頭頂門如孕婦患此將頂門發分開以手蘸涼水輕輕拍之即愈母豬掙其症以頭拱地打滾先針舌根次將兩手除大指不針其餘八指將包甲薄肉每刺一針捻出惡血再用豬槽水洗手腕即愈老鼠掙其症唇黑紫腫咽喉腫痛或胸膈膨脹挑眉須角須疑作鬢見血即愈或再挑兩肩中心句疑有錯誤蝦蟆掙其症腹脹滿或疼痛將肚臍周圍挑之又挑小腹三四針即愈海青掙其症頭痛掤頭打滾用帶子扎住頭然後將眉際眼根咽窩頂心各處挑之即愈忌風三日眼根即大眼角眠羊掙其症似睡眉眼不開轉身疼痛發脹喝氣疼痛治法挑尾巴骨根出血即愈野雀掙其症渾身發紅或前後心有紅黑紫眼頭痛脅脹挑腋下六針發一針而愈發字上下疑有落字用莧菜種煮水洗浴甚良狐貍掙其症頭痛或乾噦發嘔不思飲食頭仰渾身出汗張口亂呼譫語用針挑咽窩並前後心則愈猿猴掙其症坐臥不寧心窩脹滿口舌發青指甲青小腹疼挑陰囊線即愈莽牛掙其症肚脅脹痛心痛翻起唇來挑裡邊挑唇上牙花即愈鷹嘴掙其症肚脹疼頭暈眼黑心內脹用白礬水灌之再挑後心及耳稍即愈又方胡椒七粒生薑七片陳麥糠一撮同研爛酒煎去渣調四錢服松峰按諸掙挑刺隨即將惡血捻出為妙有病深重者挑刺無血必用手極力捻之見血即愈諸掙遇有口噤不開者用烏梅揩擦牙齦涎出即開蓋酸先入筋木能剋土使牙關痠軟則開矣若用鐵器等攪之恐傷其齒上諸掙症治余得之岱宗石壁間錄而藏諸篋笥遇患是疾者如法施治歷有奇效後余遊秦晉於太行道中亦見黏一紙於壁前所見者大同小異俱變掙為翻蓋因其方言各異耳而症治則無殊也因取而對較增訂之以廣為流布至其命名亦各有義意甚毋以其涉俗而忽之松峰再志赤膈類傷寒松峰曰是皆疫症實非傷寒也凡胸膈赤腫疼痛頭痛身痛發熱惡寒名赤膈傷寒宜荊防敗毒散見捻頸瘟加蔞仁去油黃連黃芩紫金皮元參赤芍升麻白芷如症有表復有里而胸膈赤腫疼痛者雙解散見絞腸瘟加蔞仁黃連紫金皮如表症已退大便燥實胸膈腫痛者涼膈解毒加蔞仁枳殼桔梗紫金皮赤芍又宜稜針刺腫處出血如半表半裡胸膈腫痛者小柴胡湯加桔梗蔞仁紫金皮赤芍涼膈散連翹去隔大黃酒浸甘草梔子炒黑黃芩酒炒薄荷加竹葉生蜜煎黃耳類傷寒凡耳中策策痛者是風入腎經也久則變惡寒發熱脊強背直如痙之狀曰黃耳傷寒宜小續命湯加殭蠶泡焙天麻酒焙羌獨次用荊防敗毒散加細辛白芷蟬蛻去足翅黃芩赤芍紫金皮小續命湯防風桂枝麻黃杏仁泡去皮尖研川芎酒洗白芍酒炒人參甘草黃芩酒炒防己附子制防己附子少用解㑊類傷寒按素問尺脈緩澀謂解㑊音亦與此處所講不同解者肌肉解散㑊者筋不束骨其症似寒非寒似熱非熱四體骨節解散懈墮倦怠煩痛飲食不美食不知味俗呼為痧病內經名為解㑊其原因或傷酒中濕感冒風寒房事過多婦人或經水不調氣血不和皆能為此似痧病實非痧病也治宜先蘸熱水打其臂膊裡面或以麻蘸水刮之刮打必皆令其皮紅紫為度更宜針刺十宣委中二穴出血當服蘇合香丸蘇合香丸麝香沉香丁香檀香白者香附蓽茇白朮訶子煨去皮硃砂青木香烏犀角各二錢薰陸香龍腦各一錢安息香二錢為末用無灰酒熬膏蘇合油入息香內二錢共為細末用安息膏並煉蜜丸如彈子蠟包用時溫水化服一丸丸用蠟包不出氣為妙痧病類傷寒嶺南閩廣間溪毒沙蝨水弩射工蟈短狐蝦鬚之類俱能含沙射人被其毒則憎寒壯熱百體分解似傷寒初發土人治法以手摩痛處用角筒入肉以口吸出其痧毒外用大蒜煨搗膏封貼瘡口即愈諸蟲唯蝦鬚最毒其毒深入於骨若蝦鬚之狀其瘡類疔腫不治必死彼地有鸂鶒鸀𪄕等鳥專食以上諸蟲故以此鳥毛糞服之及籠此鳥於身畔吸之其痧聞氣自出而愈喉管傷寒其症喉中作癢難過吃茶酒湯水便不可救薄荷二分麝香一分為細末吹喉待氣通吐涎碗許然後吃陳米湯半碗即愈松峰按此雖名傷寒實疫癘之類夫曰喉癢似病之輕者曰難過則癢不可當矣雖然何至吃茶水便不可救乎觀其待氣通三字則癢時其氣已有大不通者在矣味其言吐涎碗許則氣之所以不通涎為之也此症甚惡亦世之所不輕見者油痧瘴其症兩脅脹滿築心疼痛或腹內攪腸作痛頭暈眼黑或大小便閉塞氣不通暢命在旦夕將綿花子油與吃試之食之香甜不油氣者即是此症速將綿子油令病人吃足或用之四五兩半斤一斤立愈仍將油吐出不少奇方也烏痧瘴其症初中頭疼噁心兩脅脹痛攻心不能坐臥得此症吃黃豆不腥氣者便是用車頭油十二兩黃連三錢乳香三錢二味為末用車頭油共搗勻丸梧子大百草霜為衣用無根水送七丸立效愈後一日無食忌腥冷氣惱數日車頭油即車轂中所積油垢或用六兩三兩兩半皆可啞瘴乃山嵐谿溪鬱蒸之毒其症血乘上焦令人昏迷甚則發躁狂妄亦有啞而不能言者皆由敗血瘀心毒涎聚胃所致用柴胡二錢黃芩錢五半夏一錢制人參一錢枳殼一錢麩炒大黃二錢黃連六分甘草七分姜三片棗一枚煎服效鎖喉黃其症面黑目黃舌白語澀牙關緊閉胸痛緩不過二三日即死人皆錯以烏痧瘴治之多致誤命如遇此症將牙關攪開用藍布擦去舌白次以錢蘸鹽水刮兩太陽穴穴在眉稍眼角之際試有坑窠便是出紫點泡針刺出血見黃水為度脖項兩側亦如此治後用生大黃三錢硫黃一錢共搗粗末水二盅煎一盅溫服立愈虎手脖子猴虎手恝平聲即用手虎手物虎手字其症咽喉暴腫而痛痰涎壅盛水漿難入甚則脖項亦腫寒熱交作頭面烘熱或四肢厥逆氣息不順用真阿魏三分麝香三分巴豆一個去油杏仁一個去皮尖紅棗一枚去核共搗爛丸梧子大銀硃為衣綿紙包一層用時將紙撕去按男左女右塞鼻孔汗出即愈避風忌口二三日所忌不言何物止食粥飯小菜便無不是松峰按此係熱毒而用巴豆者亦熱因熱用以毒攻毒之意此與前症雖俱系咽喉之病而症治各有不同谷眼谷亦作骨其病初覺時頭暈心亂煩躁不寧漸而心腹疼痛即是此症有緊慢之分緊者立刻殞命急以銀針針大眼角內白皮如無銀針想鐵針亦可及兩耳稍鼻尖囟門太陽穴見前見血即愈皆針挑破皮捻血非直刺凡有心腹痛兼吐瀉俱是此症俱宜挑初起先挑鼻尖後挑別處挑後用陳醋半碗無陳用新入銀子少許共入砂鍋熬三四滾臨服時再用銀子入醋內研攪溫服立刻回生若治遲危急看舌根下有紫泡挑破鹽擦即愈天行虜瘡建武中南陽擊虜所得故名其症發斑疹頭面及身須臾周匝狀如火瘡或戴白漿隨決隨上下此句費解此毒惡之極急治取好蜜通摩瘡上以蜜煎升麻數匕拭之疫厥亦名瘟疫暴亡凡人感瘟疫視其症脈尚不至殞命不救而突然無氣身直甚至無脈且不可驚慌視為告終此疫厥也急用臘月雄狐膽溫水研灌即活若牙關已緊即攪開灌之雄狐膽必臘月預為構收為妙松峰曰如得此症不論有無狐膽總宜先針少商穴並十指甲上薄肉穴道針法見前攝出惡血並用好豬牙皂末吹鼻或用京中靈寶如意丹十餘粒吹鼻可活羊毛疔與前瘟疫兼痧並羊毛掙大同小異三症治各不同故並存之萬曆間金臺有婦人以羊毛遍鬻於市忽不見繼而都人身生泡瘤漸大痛死者甚眾瘤內唯有羊毛有道人傳一方以黑豆荍麥末塗之毛落而愈荍音喬疑即北方之蕎麥纏喉風其症咽塞水穀不下牙關緊急不省人事楊氏一字散雄黃水洗蠍稍枯礬藜蘆牙皂炙焦各等分上共為細末用一豆大納鼻中搐之立效赤瞎其症兩目突然紅腫疼痛此亦時疫也救苦湯治之桂枝連翹去隔紅花細辛歸尾甘草各一錢五蒼朮泔浸焙膽草各七分羌活黃芩麻黃柴胡防風藁本黃柏各一錢黃連五分生地知母炒各一錢白芍二錢食遠服神鬼箭打其症身痛有青筋以亂髮擦痛處髮捲成團而硬者方是此症用金銀花濃煎湯飲之不愈再加甘草發不卷不硬者非此症不必服另察脈與兼症治之霧氣其症心煩少氣頭痛項急起則目眩欲倒身微熱戰掉不自安時復憎寒心中欲吐吐時無物新豬糞不拘多少入上好黃酒中攪開用細白絹濾出青汁頓熱服之盡劑鋪厚上蓋暖覆臥取汗天寒房內生炭常令暖毋寒寒則不汗如汗出候乾乃起慎風冷兼治瘧及風勞蟲毒化金疫其症初覺即昏不知人不治即死急以生豆令嚼甘美不腥即是以幕上有河字錢一文放入喉中即化有化至三四枚而愈者抱心疔其症肚痛連心兩脅脹滿脊背痛上連頭痛痛極渾身強直昏暈欲死視其臍上必有紅絲一條照心口蔽骨下二指挑斷其絲又於兩肋骨端亦挑兩處如前法又於脊上對臍腎俞穴上下各指半再挑二處如前法皆將盤絲挑盡斷皆以皂礬末納挑眼內令滿以手揉之即愈忌腥冷豆腐諸豆並一切蔓生之物三日後食發物發所挑瘡口瘟痧其症惡寒發熱或腹痛似瘧非瘧氣急喘逆頭面腫脹胸腹飽悶脹滿或泄瀉下痢膿血輕者牽連彌月重者危急一時治宜放痧消食積為主俟痧毒已泄然後和解清理除其寒熱健脾養血補其中虛宜識痧筋凡痧有青筋紫筋或現於數處或現於一處必用針去其毒血然後據症用藥按輕者針即見效不用服藥放痧十則一在頭頂心百會穴一在兩眉中間印堂一在兩眉稍窪陷處太陽穴一在結喉兩旁一在舌底下筋之兩旁一在雙乳以上俱斜挑一在兩手背十指尖當中近甲薄肉一在兩臂灣一在兩足背十指尖當中近甲薄肉一在兩腿灣以上但直刺放痧法原作刺痧今改作放字兼挑與刺二字言之腿灣上下有細筋深青色或紫色或深紅色者便是皮白嫩者方顯紫紅色刺之則有紫黑毒血腿上大筋不可刺刺亦無毒血反令人心煩兩腿邊硬筋上筋不可刺硬筋腿之大粗筋其上筋乃指靠皮之小筋言刺之恐令人筋吊縮也手臂筋色亦如此辨之至於宜針挑者唯取挑破皮略見血如無血手擠之至於指尖刺之太近指甲令人頭眩凡刺不可太深銀針方佳鐵性有毒錦按兩腿灣兩臂灣止此二處宜尋痧筋刺之余處亦不言痧筋是無痧筋也只按穴放之可耳法有直刺斜挑之異故以放字該之至於挑法亦當有隨症施治者如頭痛則挑印堂及太陽穴胃痛則挑心窩腹痛則繞臍挑之脅痛則密挑兩肋以及挑肩井穴挑背挑項挑耳尖耳輪挑腰挑軟肋數處皆諸痧必挑之穴俱用針斜挑皮擠血至於少商穴及兩手足指尖乃系直刺如無血亦須擠之刮痧法背脊頸骨上下及胸脅兩肩背臂之痧用錢蘸香油刮之頭額腿上痧用棉紗線或䔉麻蘸香油刮之大小腹軟肉內痧用食鹽以手擦之新定刮痧法脖項後當中窪處刮一道脖項後兩旁左右大筋上各刮一道前身兩肩下脅上軟肉縫中各斜刮一道兩脅肋軟縫中左右各刮三道左右肩靠著肩井軟肉處各刮一道背脊骨兩旁豎刮自項下至腰各刮一道背後脅肋軟縫中左右各刮三道以上皆用錢蘸鹽水刮之兩臂內用䔉麻一縷捻松繩蘸水刮之但要出痧紅紫為度諸穴並治一切痧症唯䔉麻刮臂灣專治眩暈噁心痧若非病症刮之亦不紅紫松峰曰前刮痧法出痧脹玉衡書新定刮痧法乃屢用而屢效者並錄之以備擇用治痧三法肌膚痧用油鹽水刮之則毒不內攻血肉痧看青紫筋刺之則毒有所泄內形痧須辨經絡臟腑在氣在血則可消散而絕其根此段言當用藥治痧分經絡症候足太陽膀胱痧腰背巔頂連風府脹痛難忍足陽明胃經痧兩目紅赤如桃唇乾鼻燥腹中絞痛足少陽膽經痧脅肋腫脹痛連兩耳足太陰脾經痧腹脹版痛且不能屈伸四肢無力瀉不止足厥陰肝經痧心胃吊痛身重難移作腫身上作脹腹內足少陰腎經痧痛連腰腎小腹脹硬手太陽小腸經痧半身疼痛麻木不仁左足不能屈伸手陽明大腸經痧半身脹痛俯仰俱廢右足不能屈伸手少陽三焦經痧胸腹熱脹揭去衣被乾燥無極手太陰肺經痧咳嗽聲啞氣逆發嗆手厥陰心包絡痧或醒或寐或獨語一二句手少陰心經痧病重沉沉昏迷不醒或狂言亂語用藥大法痧症藥宜冷服蓋昏迷不醒乃痧之熱毒攻心故心不能自主而昏迷冷藥入口從膈間順流而下則熱毒在胸臆者隨藥而消故旋清醒即尚昏迷必有食積血痰阻塞再按脈症用藥開導攻下未有不醒者茲特舉用藥之一隅以俟神而明之者用荊防之類從表而散用青陳二皮從中而消用枳實大黃之類從大便而下用木通澤瀉之類從小便而行用楂芽卜子之類所以治其食之阻用銀花紅花之類所以治其血之壅銀花治血未解用檳榔蓬朮之類所以治其積之滯痧前禁忌忌熱湯熱酒粥湯米食諸物犯之輕者必重重者立斃痧後禁忌痧後略鬆覺餓驟進飲食即復忍耐一二日乃可萬全痧脹玉衡書言治痧甚精詳第其中盡有過拘泥之處即如風勞臌隔等雜症皆以痧論則所見無非痧者有是理乎茲特擇其中大綱緊要數條詮次而註釋之而治痧之大法亦盡於此矣錦再志撲鵝痧其症痰涎壅盛氣急發喘喉聲如鋸痛似喉鵝但喉鵝喉內腫脹此則無之又形似急喉風但喉風痛而不移此則痛無定處且喉鵝無痧筋解見前此有痧筋依前刺法刺之服吹方開後擇用之冰硼散治痧症咽喉腫痛天竺黃硼砂各二錢硃砂冰片各二分元明粉八釐共為細末瓷瓶貯蠟封口出氣難用患者吹喉中救苦丹治痧氣鬱悶之劑枳實蘿蔔子各一兩烏藥連翹各八錢鬱金二錢共末清茶稍冷下荊芥銀花湯此治血滯之劑荊芥銀花紅花茜草丹皮赤芍各一錢白蒺藜去刺研末八分烏藥五分香附三分搗水二盅煎七分微溫服附治諸痧痛方井水河水各半和服泥漿水澄清服白糖和梅水服晚蠶沙末白滾湯候冷調服以上治痧症無食積阻滯者吐法治新食阻住痧毒明礬四分白湯一碗候冷化服又方食鹽一撮白湯一碗候冷和服二方必多飲方吐少則不效按白礬稍多些亦可青筋此症因氣逆而血不行並惡血上攻於心也多由怒氣相沖或憂鬱氣結不散或惱怒復傷生冷或房勞後受寒濕以致精神恍惚心慌氣喘噎塞上壅嘔噦噁心頭目昏眩胸膈痞滿心腹刺痛脅肋腰背痛頭痛腦痛口苦舌乾面青唇黑四肢沉困百節痠痛或憎寒壯熱遍身麻痹手足厥冷顫掉默默不語不思飲食等症皆惡血攻心所致古無治法惟刺兩手曲池上青筋出瘀血可愈或屢患屢刺莫之能除夫人以氣血為主故丹溪曰氣血和百疾不生此病先傷於外而復損其血茲制一方名白虎丸白虎西方肺金之謂青筋乃東方肝木之象以白虎而治青筋金能平木有至理存焉能代針砭之苦且免後之復發兼治男子久痢便血婦人崩漏帶下並一切打撲內損血不能散心腹痛欲死者服之神效白虎丸千年石灰不拘多少刮外雜色泥土研細水飛糊丸如梧子大每用燒酒送五十丸看輕重加減初覺一劑取效過三五日病已老宜多服松峰按原方下注云此藥能順氣散血化痰消滯則凡霍亂痧掙皆可以通融治之惟燒酒送獨於青筋為宜蓋青筋多生冷寒濕所致至熱症或用冷水冷茶送氣滯用陳皮食積用麥芽水送隨症變通可耳痰疫患此病者初得之亦並不顯尋常瘟疫應有等症不過頭微痛身微覺拘急寒熱心腹微覺疼痛脹滿三兩日內抖然妄見鬼神狂言直視口吐涎沫鼻中流涕手足躁擾奔走狂叫脈沉緊而數身體不熱亦有熱者卻與邪入陽明胃腑發狂迥異此感疫癘之氣風火痰三者合而成病不急治三二日即斃宜先針少商穴並十指刺法見前急服竹瀝解疫煎一二劑神效此亦世所罕有之症曾有患此者余深覺詑異因思暴病皆屬於火怪病皆屬於痰以意為之先用刺法後用藥餌輒效一時患者數人方知其為疫也治之應手而愈遂定其名曰痰疫筆之以備採擇焉竹瀝解疫煎自定新方黃連黃芩梔子膽草殭蠶泡焙膽星蔞仁去油研川貝去心研橘紅半夏制流水煎熟用竹瀝薑汁兌服總以竹瀝為君多則一盅少亦半盅上七十二疫症或謂命名多不雅馴言之不文似未足以行遠也余應之曰此真所謂少所見則多所怪也余周行海內越歷已深其症大概北省恆多而南國恆少饑饉之歲常多而豐樂之年頗少且其命名也皆出自經史子集名山石室並良醫口授試之而歷有奇效方敢筆之於書洵非無稽之談索隱鄙倍者之可同日而語也試觀古今來醫書中字句之欠通歌辭之鄙俚平仄乖違而讀不上口者未可更僕以視余之說疫中而敢有是乎以上不過數症命名仍其方言土語耳而說者輒目之為涉俗獨不聞古聖人於邇言猶必察焉耶吾願世之大方家閱是書者不鄙薄焉而以為芻蕘之尚堪詢也則厚幸矣松峰再志
