body:
  text: 卷之六運氣五運詳註陰陽化生五行木火土金水流為十干甲乙丙丁戊己庚辛壬癸天干運化於五方位甲乙東方木丙丁南方火壬癸北方水戊己中央土庚辛西方金分為五運木為初運火為二運土為三運金為四運水為五運此乃主運年年不移天干陰陽配合化為五運甲與己合化土之歲土運統之乙與庚合化金之歲金運統之丙與辛合化水之歲水運統之丁與壬合化木之歲木運統之戊與癸合化火之歲火運統之此乃客運每歲迭遷六氣詳註陰陽化生地支十二子寅辰午申戌六陽年醜卯巳未酉亥六陰年陰陽配合五行運化五方位寅卯屬春東方木也巳午屬夏南方火也申酉屬秋西方金也亥子屬冬北方水也辰戌丑未四季中央土也陰陽剛柔對衝化為六氣風火暑濕燥寒也子午之歲少陰君火司天陽卯酉陽明燥金在泉陰丑未之歲太陰濕土司天陰辰戌太陽寒水在泉陽寅申之歲少陽相火司天陽巳亥厥陰風木在泉陰卯酉之歲陽明燥金司天陰子午少陰君火在泉陽辰戌之歲太陽寒水司天陽丑未太陰濕土在泉陰巳亥之歲厥陰風木司天陰寅申少陽相火在泉陽六氣分主客主氣以其年年不移故謂之主厥陰風木為初之氣主大寒至春分少陰君火為二之氣主春分至小滿少陽相火為三之氣主小滿至大暑太陰濕土為四之氣主大暑至秋分陽明燥金為五之氣主秋分至小雪太陽寒水為六之氣主小雪至大寒客氣加於主氣之上以其年年遷轉故謂之客子午之歲少陰君火司天卯酉陽明燥金在泉初之客氣太陽加厥陰之上二之客氣厥陰加少陰之上三之客氣少陰加少陽之上四之客氣太陰加太陰之上五之客氣少陽加陽明之上六之客氣陽明加太陽之上丑未之歲太陰濕土司天辰戌太陽寒水在泉初之客氣厥陰加厥陰之上二之客氣少陰加少陰之上三之客氣太陰加少陽之上四之客氣少陽加太陰之上五之客氣陽明加陽明之上六之客氣太陽加太陽之上寅申之歲少陽相火司天巳亥厥陰風木在泉初之客氣少陰加厥陰之上二之客氣太陰加少陰之上三之客氣少陽加少陽之上四之客氣陽明加太陰之上五之客氣太陽加陽明之上六之客氣厥陰加太陽之上卯酉之歲陽明燥金司天子午少陰君火在泉初之客氣太陰加厥陰之上二之客氣少陽加少陰之上三之客氣陽明加少陽之上四之客氣太陽加太陰之上五之客氣厥陰加陽明之上六之客氣少陰加太陽之上辰戌之歲太陽寒水司天丑未太陰濕土在泉初之客氣少陽加厥陰之上二之客氣陽明加少陰之上三之客氣太陽加少陽之上四之客氣厥陰加太陰之上五之客氣少陰加陽明之上六之客氣太陰加太陽之上巳亥之歲厥陰風木司天寅申少陽相火在泉初之客氣陽明加厥陰之上二之客氣太陽加少陰之上三之客氣厥陰加少陽之上四之客氣少陰加太陰之上五之客氣太陰加陽明之上六之客氣少陽加太陽之上司天在泉左右間氣開列於下司天在泉解司天在泉四間氣者乃客氣之六部也凡主歲者為司天位當三之氣司天之下相對者為在泉位當終之氣司天之左為天之左間右為天之右間每歲客氣始於司天前二位乃地之左間是為初氣以至二氣三氣而終於在泉之六氣每氣各主一步然司天主行天之氣令其位在上自大寒節起主上半年在泉主地之氣化其位在下自大暑節起主下半年歲運居上下之中主氣交之化故天氣欲降則運必先之而降地氣欲升則運必先之而升又論曰初之氣二氣三氣盡天氣主之四氣五氣終氣盡地氣主之此即上下卦之義然則三氣四氣是一歲之氣交也天地氣交之時自四月終至八月終共四個月一百廿日之間而歲之旱潦豐儉物之生長收成皆系乎此故曰氣交之分人氣從之萬物由之也岐伯曰上而司天下而在泉中而氣交人之居也言天者求之本言地者求之位言人者求之氣交本者天之六氣風火暑濕燥寒也位者地之六步木火土金水火也言天者求之本即六氣之勝衰而上可知也言地者求之位即六部之終始而下可知也人在天地之中故求於氣交則安危亦可知矣又論曰天氣下降地氣上升一升一降氣交於中人居之則生萬物皆氣交之使然蓋天無地之升則不能降地無天之降則不能升天地互相升降循環之道也天氣不足地氣隨之地氣不足天氣從之運居中而當先也如司天生克中運為順中運生克司天為逆在泉亦然順分生克之殊逆有大小之別此古人舉運氣之端倪耳若其二氣相合象變迥異變化無窮如四時有非常之化常外更有非常四時有高下之殊殊中又分高下百步內晴雨不同千里外寒暄非一故察氣候者必因諸天察方宜者必因諸地圓機之士當因常以察變因此以察彼庶得古人未發之妙歟五運天時民病歲運有餘屬先天為大過之年甲丙戊庚壬五陽剛之年六甲年甲己化土甲為陽剛之土土太過是謂敦厚也阜高也萬物之化無不賴土以克成土本高厚在山川煙埃朦郁土之氣也雨濕流行濕生則燥避土之化濕土勝剋水故腎臟受邪治當以除濕補腎脾屬土甚則土邪有餘脾經自病脾主肌肉外應四肢肌肉痿行善瘈抽掣腳下痛脾太過則令四肢不舉脾虛則腹鳴飧泄不化其德厚重故其政安靜其動柔潤重淖泥濕其變震驚飄聚雷霆暴風崩潰洪水衝突此以土極而兼木復之化其谷稷麻稷土谷麻木谷其果棗李棗土果李木果其畜犬牛牛土畜犬木畜育齊也其蟲倮毛土氣有餘倮毛齊化太谿腎脈也土亢則腎絕故死不治六丙年丙辛化水丙為陽剛之水水太過為流衍之紀水勝則陰氣大行天地閉而萬物封藏歲水太過寒氣流行寒病乃生邪害心火水化寒水勝則剋火故心臟受邪治當以逐寒補心民病身熱煩躁心悸陰厥上下中寒譫妄心痛甚則水邪有餘腎臟自病腎病則腹大脛腫喘咳身重寢汗其德凝慘寒雰雨雪貌其動漂浮於上泄瀉於上沃灌也湧溢也其變非時而有曰變冰雪霜雹其病脹水氣盛其象冬其氣堅其谷豆稷豆水穀稷土谷其果慄棗其畜彘牛彘水畜牛土畜其蟲鱗倮水有餘故鱗倮育神門心脈也水亢則心絕故不治六戊年戊癸化火戊為陽剛之火火太過乃赫曦之紀陽光炎盛也陽盛則萬物俱盛陰氣內化陽氣外榮陰降於下陽升於上也民病火邪傷陰寒熱交爭故為瘧火克肺金令人喘咳火逼血妄行於上故口鼻出血下泄於二便故水泄注下火炎上焦則咽乾耳聾肩背皆痛其動炎灼妄擾火盛之害也其德暄暑鬱蒸熱化所行其應夏也其變炎烈沸騰火氣太過熱極之變也其病笑瘧瘡瘍血流狂妄目赤皆火盛也若火不能務其德暴烈其政甚則雨水霜雹則金氣受傷水必來復之故其為災如此而寒邪反傷心也其穀麥豆其麥火谷其豆水穀其果杏慄杏火果慄水果其畜羊彘羊火畜彘水畜其育齊也其蟲羽鱗羽屬火鱗屬水太淵肺脈也火亢則肺絕救故死不治六庚年乙庚化金庚為陽剛之金金太過乃堅成之紀萬物收引而退避也歲金太過燥氣流行燥病乃生肝木受邪治當清燥補肝民病兩脅下少腹痛目赤觜瘍耳無所聞皆肝膽經病金氣太過則肅殺甚故傷及肝經若肝不及則令人胸痛引背下則兩脅胠脹甚則不可反側金傷於肝也金邪有餘肺經自病故喘咳氣逆肩背痛金病不能生水以致腎陰亦病故尻陰股膝髀腨胻足皆痛其德霧露蕭飋清肅之化也其變肅殺凋零殺令行也其動暴折金氣有餘瘍疰皮膚之疾金不務德而暴害乎木火必報復而金反受傷其病喘喝胸臆仰息火乘肺金故其病咳其谷稻黍其果桃杏其畜雞馬其蟲介羽太衝者肝脈也金亢則肝絕故死不治六壬年丁壬化木壬為陽剛之木布散陽和發生萬物之象也木和相生則陽和布化陽氣日進而陰氣日退歲木太過木之化風風氣流行風病乃生木勝則克脾土故脾臟受邪治當平肝木以補脾土木太過侮土則金必復之故乘秋令而為災如此至其為病則邪反傷肝矣民病飧瀉食減體重煩冤腸鳴腹脅支滿皆脾虛氣衰所致木勝肝強故善怒眩冒巔疾甚則反脅痛而吐甚木邪傷胃其動掉眩巔疾風木太過其德鳴風木聲靡散也啟拆即發陳之義其變振怒拉敗拆摧拔其谷麻稻麻木谷稻金谷其果桃李李木果桃金果其畜雞犬雞金畜犬木畜其蟲毛介衝陽胃脈也木亢則胃絕故死不治歲運不及屬後天為不及之年乙丁己辛癸五陰年六丁年丁壬化木丁為陰柔之木木氣不及是謂委和之紀陽和委屈發生少也木氣衰土氣無制也火無所生故長自平木衰金勝故收氣乃早歲木不及燥乃大行木不及則金乘之燥病乃生生氣不政物秀而實草木晚榮涼雨時降風雲並興民病中清胠脅滿少腹痛金氣乘木乃肝之病也腸鳴溏泄木不生火乃脾之寒也其病肢廢癰腫瘡瘍木被金傷肝筋受病風淫末疾故為肢廢癰腫瘡瘍所由生也其主飛蠹蛆雉蛆化為蠅其性喜暖火運之年尤多雉火禽凡此皆火復之理也其氣斂其用聚木兼金化收氣勝也其谷稷稻稷土谷稻金谷木不及二谷當成其果棗桃棗土果桃金果木不及則二果盛其畜犬雞犬木畜雞金畜其蟲毛介毛木蟲介金蟲草木晚榮木不及蒼干凋落金盛之物秀而實膚肉內充生氣雖晚化氣速成故也陽明上臨金氣清肅故為白露早降金勝火必衰火衰土必弱蟲蝕甘黃甘黃屬土而陰氣蝕之故蟲生焉觀曬能除蛀則蟲為陰物可知勝復皆因於木故災眚在三東方震宮也六乙年乙庚化金乙為陰柔之金金氣不及是謂從革之紀歲金不及而火氣乘旺故災乃大行熱病乃生治當清肺降火民病肩背瞀悶重鼽嚏鼻流清涕血便注下金受火邪故為此諸症金衰火亢水來復之故寒雨暴至乃令冰雹霜雪災傷萬物寒之變也是謂無根之火故為頭腦戶痛延及腦項發熱口瘡心痛等症炎光赫烈則冰雪霜雹乃火盛金也其病咳喘鼽衄火有餘而病及肺也其谷麻麥麻木谷麥火谷二谷成其果杏李李木果杏火果金不及故二果成其畜雞羊雞金畜當衰羊火畜當盛其蟲介羽介金蟲羽火蟲勝復皆因於金故災眚在七西方兌宮也六己年甲己化土己為陰柔之土土氣不及是為卑監之紀則木氣乘旺故風氣盛行治當以益脾平肝化氣失令木專其政則草木榮美發生在木而成實在土土氣不沖故秀而不實成而粃也土德衰故雨愆期金無所生故收氣平也民病飧泄霍亂體重腹痛筋骨繇搖也復搖動反復肌肉瞤酸善怒蟄蟲早附凡此飧泄等症皆脾弱肝強所致土衰木旺金乃復之子復母仇其為胸脅暴痛下引少腹者肝膽病也其土臟病則為湧漚肉理病則為瘡瘍潰爛癰腫其病胸滿痞塞土氣不足而脾不運也其病飧泄土衰風勝也其谷豆麻豆水穀麻木谷二谷成其果李慄李木果慄水果土不及故二果成其畜牛犬牛為土畜當衰犬為木畜當盛其蟲倮毛倮屬土毛屬木勝復皆因於土故災眚見於四維土位中宮而寄旺於四隅辰戌丑未土也六辛年丙辛化水辛為陰柔之水水氣不及是為涸流之紀則源流乾涸也六辛陰水之年陽反用事水不及而濕土乘之故濕病乃生治當補腎除濕水衰則火土同化故氣反用其化乃速暑雨數至民病腹滿身重濡泄寒瘍流水腰股痛足痿清厥寒厥腳下痛甚則附腫附同浮臟氣水氣不收腎氣不衡平也不收不衡水氣衰也火無所畏故蟄蟲不藏也草木條茂榮秀滿盛長化之氣豐而厚也埃昬驟雨土勝水則振拉摧拔木復土其病癃閉腎氣不化也水不及故邪傷腎也其谷黍稷黍火谷稷土谷二谷當成黍火谷而本經作麥其果棗杏棗土果杏火果水不及則二果成其畜彘牛彘水畜當衰牛土畜當旺其蟲鱗倮鱗水蟲倮土蟲盛衰亦然勝復皆因於水故災眚在一北方坎宮也六癸年戊癸化火癸為陰柔之火火氣不及是謂伏明之紀陽德不彰光明伏也歲火不及而金乘之故寒乃大行寒病乃生治當補心逐寒火不及生物不長成實而稚遇化已老物之成實者惟稚而短及遇土化之令而氣已老矣陽氣屈伏蟄蟲早藏陽不施於物也民病胸中痛脅支滿兩脅痛脊背肩胛間及兩臂內痛凝慘慄烈水勝火暴雨霪霖土覆水雷霆震驚火鬱達之沉陰淫雨此皆濕復之變其主冰雪霜寒水反勝也其病昏惑悲忘乃火不足而心神潰也其谷豆稻豆水穀稻金谷二谷成其果慄桃慄水果桃金果火不及故二果成其畜馬彘馬火畜當衰彘水畜當旺其蟲羽鱗羽屬火鱗屬水有盛衰盛復皆因於火故災眚在九南方離宮也六氣天時民病子午之歲壬子壬午戊子戊午甲子庚子庚午丙子丙午甲午少陰君火司天歲氣熱化之候司天者天之氣也陽明燥金在泉在泉者地之氣侯也君火者手少陰心經也心者君主之官神明出焉君火乃人身之主宰陽氣之本余象主土乃發生萬物之源少陰司天其化以熱凡炎蒸鬱燠庶類蕃茂皆君火之化而陽光明耀溫養萬物熱淫於上故火行其政君火之下陰精承之故大雨且至民病胸中煩熱嗌乾等症皆君火上炎肺金受傷也金氣主右故右脅滿按經脈篇以溺色變肩臂背臑及缺盆中痛肺脹滿膨膨而喘咳為手太陰肺經病鼽衄肩前臑痛為手陽明大腸經病蓋肺與大腸為表裡金被火傷故諸病皆主於肺也尺澤穴手太陰肺脈也在肘內廉大紋中動脈應手金不勝火則肺氣竭而尺澤絕故死不治羽蟲屬火同天之氣故安靜介蟲屬金同地之氣故育金氣在地則木衰故毛蟲胎孕不成陽明燥金在泉地之氣候也金氣燥淫勝於下霿霧清暝民病喜嘔嘔而苦善太息心脅痛不能轉側甚則嗌乾面塵身無膏澤足外反熱為足少陽膽經病嗌乾面塵為厥陰肝經病此以金邪淫勝故肝膽受傷為病如此介蟲屬金同其氣故育毛蟲屬木受其制故耗金火之氣不相合故羽蟲不成燥金在泉燥在地中故濕毒之物不生子午之歲壬子壬午上少陰君火司天中太角木運下陽明燥金在泉運生天氣曰小逆木上生火也故病亦微子午之歲當少陰君火遷正司天而太陰濕土以上年在泉之右間當升新歲司天之左間故畏天衝木星勝之也遇壬子壬午木運之年壬為陽木有餘其氣先天而至歲運遇木乃能勝土故太陰濕土昇天不前則為土鬱木之勝也人病在脾土鬱之發必待其得位之時而後作壬午年剛柔失守微甚如見三年化疫微至乙酉甚在甲申土疫發也藥宜瀉黃散煎湯量冷研五瘟丹不拘時空心送下木強民病則脾胃受抑為黃疸滿閉等症其運風鼓其化鳴紊啟拆其變振拉摧拔其病支滿肝木強也戊子天符戊午太乙天符上少陰君火司天中太徵火運下陽明燥金在泉運於司天之氣相同曰天符運與氣皆火戊午年運臨本氣之位曰歲會火運臨之午火位也其運炎暑其化暄曜鬱燠遇太陽司天曰熱少陽司天曰暑少陰司天曰炎暑皆兼司天之氣而言運也其變炎烈沸騰太徵之變也其病上熱血溢陽火盛也此二年多熱症而無瘟疫甲子甲午上少陰君火司天中太宮土運下陽明燥金在泉天氣生運曰順化火下生土也當年少病其運陰雨其化柔潤時雨其變振驚飄驟太宮之變也其病中滿身重土濕之滯也子午之年陽明燥金當遷正在泉而太陽寒水以上年司天之右間當降為新歲在泉之左間故畏地阜土勝窒之也水運降地而土運抑之遇土運太過先天而至甲子甲午年陽土有餘之歲土運承之降而不入即天彰黑氣暝暗悽慘才施黃埃而布濕寒化令氣蒸濕復令久而不降伏之化郁寒鬱於上而濕制之則脾腎受邪故民病寒厥四肢重怠陰痿少力天布沉陰蒸濕間作也甲子甲午剛柔失守如此三年變而為大疫也水氣被抑至三年後必發為水疫甲子至丙寅三年首也至丁卯三年後也藥宜澤瀉知母青黛元參連翹童便各一錢煎湯量冷研化五瘟丹並青黛末調服庚子庚午天刑之年俱同天符上少陰君火司天中太商金運下陽明燥金在泉庚子庚午年運同司地曰燥金太過之運加地氣曰同天符天刑之年火下剋金也故曰不相得則病雖有雜症而無瘟疫本年金運太過而君火司天制之則金得其平所謂堅成之紀其運涼勁其化霧露蕭飋其變肅殺凋零其病下清謂二便清泄及下體清冷金氣之病也丙子歲會丙午天氣不和之年上少陰君火司天中太羽水運下陽明燥金在泉丙子年運臨本氣之位曰歲會子水位也運克天氣曰不和水上剋火故病甚也雜病雖多而無瘟疫其運寒其化凝慘慄冽其變冰雪霜雹云馳雨府濕化乃行時雨乃降此即陽明司地燥極而澤之義民病咳喘血溢血泄鼽嚏目赤眥瘍寒厥入胃心痛腰痛腹大嗌乾腫痛等症初之氣客氣太陽寒水加厥陰用事地氣遷熱將去上年乙亥少陽終之氣至此已盡寒乃始蟄復藏水乃冰霜復降風乃至陽氣鬱寒水之氣客於春前故其為候如此民反周密關節禁固腰脽音誰尻骨痛炎暑將起中外瘡瘍寒氣為病然少陰君火司天又值二之主氣故炎暑將起中外瘡瘍二之氣陽氣布風乃行春氣以正萬物應榮寒氣時至民乃和風木之客加於君火之主故陽氣風行春氣萬物榮也司天君火未盛故寒氣時至水火應時故民氣和其病淋目赤氣鬱於上而熱君火為病也三之氣客氣君火司天加於相火之主故大火行庶類蕃鮮火極水復熱極寒生故寒氣時至民病氣厥心痛寒熱更作咳喘目赤二火交熾四之氣客主之氣皆濕土用事故為溽暑大雨時至寒熱互作民病寒熱嗌乾黃癉鼽衄渴飲濕熱之病也五之氣畏火臨暑反至陽乃化萬物乃生乃長乃榮民乃康畏火相火當秋而陽化故物榮民康終之氣燥令行燥金之客加於寒水之主金氣收故五之氣餘火內格而為病咳喘甚則血溢寒氣數舉則霧霿翳皆金水之化也丑未之歲丁丑丁未辛丑辛未癸丑己丑己未乙丑乙未癸未太陰濕土司天歲氣濕化之候司天者天之氣也太陽寒水在泉在泉者地之氣也濕土者足太陰脾經也脾主中央戊己土每季寄旺十八日合為七十二日以應一歲六六三百六十之數太陰司天土氣在天為濕化凡雲雨滋潤津液充實皆土之化濕淫於上故沉陰雨變浸漬為傷故物枯槁民病胕腫痛等症皆土旺剋水腎經病也按經脈篇云以腰脊頭項痛為足太陽膀胱病以飢不欲食咳唾則有血心如懸為足少陰腎經病腎與膀胱為表裡水為土克故諸病皆本於腎太谿足少陰腎經脈也在足內踝後跟骨上動脈應手水不勝土則腎氣竭而太谿絕死不治丑未之歲倮蟲屬土同天之氣故安靜無損麟蟲屬水同地之氣故育在泉水盛則火衰故羽蟲胎孕不成太陽寒水在泉寒淫勝於下則凝肅慘慄民病少腹控睪引腰脊上衝心痛嗌痛頷腫血見寒淫於下自傷其類則膀胱與腎受之膀胱居腹故少腹痛腎主陰丸故控睪太陽之脈挾脊抵腰中故引腰脊腎脈絡心故上衝心痛心主血而寒逼之故見血嗌痛頷腫為小腸經病亦水邪侮火而然麟蟲屬水同其氣故育羽蟲屬火受其制故耗水土之氣不相合故倮蟲不育太陽寒水在泉寒在地中故熱毒之物不生丑未之歲丁丑丁未上太陰濕土司天中少角木運下太陽寒水在泉運克天氣曰不和木上剋土也故病甚災三宮三者東方震宮也木氣不及故災及之二年雜症甚多而有微疫作雜症治之癸丑癸未上太陰濕土司天中少徵火運下太陽寒水在泉運生天氣曰小逆火上生土也故病亦微火運不及之年熱病亦微而無瘟疫災九宮九南方離宮也火運不及故災及之己丑己未俱太乙天符凡此日得病主危上太陰濕土司天中少宮土運下太陽寒水在泉運臨本氣之位曰歲會土運臨之辰戌丑未土也其病危運與氣相同曰天符災五宮五中宮也土運不及故災及之土運不及而有司天之助其病亦少乙丑乙未上太陰濕土司天中少商金運下太陽寒水在泉天氣生運曰順化土下生金也民舒無病災七宮西方兌宮也金運不及故災及之丑未之歲太陽當遷正在泉而厥陰風木以上年司天之右間當降為今歲在泉之左間故畏地皛金氣窒之也以上年子午歲氣有餘司天少陰不退位則右間厥陰亦不能降下也金運承之降之不下抑之變郁鬱而為病木鬱金勝故蒼埃見而殺令行此二年厥陰風木當降在泉遇金運承之降而不下則木鬱於上發為木疫藥宜龍膽泄肝湯加羌防研化五瘟丹送下辛丑辛未天刑之年上太陰濕土司天中少羽水運下太陽寒水在泉辛年水運不及而濕土司天勝之所謂流涸之紀天刑之年土下剋水故曰不相得則病災一宮一北方坎宮也水運不及故災及之丑未年太陰濕土當遷正司天而少陽相火以上年在泉之右間當升新歲司天之左間故畏天蓬水勝之也丑未陰年不及故太陰司天未遷正則少陽左間亦不得其位遇辛丑辛未天蓬之年則少陽相火被抑故昇天不前則為火鬱水之勝也火鬱不升則人病在心包絡天時則寒雰反布凜冽如冬水復涸冰再結寒暄不時民病伏陽在內煩熱於中心神驚駭寒熱間爭火鬱既久暴熱乃生郁癘乃化伏熱內煩痹而生厥甚則血溢此相火鬱發為病此二歲少陽相火當升司天遇水運升之不前則為火鬱藥宜涼膈散加知母煎湯量冷研化五瘟丹服之陽氣退避大風時起司天之氣乃濕氣下降地氣乃寒氣上升故原野昬霿白埃四起司天主南而太陰居之故云奔南極雨濕多見於南方夏盡入秋謂之差夏民病寒熱腹滿身脹滿胕腫痞逆寒厥拘急皆寒濕所化之病陰凝於上寒積於下寒水勝火則為冰雹陽光不治殺氣乃行本年寒政太過故穀氣有餘者宜高宜晚以其能勝寒也不及者宜下宜早以其不能勝寒也民之強弱其氣亦然初之氣地氣遷寒乃去春氣至風乃來生布萬物以榮民氣條舒風濕相薄雨乃後民病血溢風勝於肝筋絡拘強關節不利身重筋痿風病在筋濕病在肉故為此病二之氣大火氣正物承化民乃和客主之氣皆少陰君火用事其病瘟癘大行遠近咸若濕蒸相薄雨乃時降三之氣天政布太陰濕土司天故濕氣降地氣騰而為雨三氣之後則太陽在泉主之故寒乃隨之感於寒濕則民病身重胕腫胸腹滿寒凝濕滯四之氣少陽相火用事其氣尤烈故曰畏火皆相火也客以相火主以濕土火土合氣溽蒸上騰故天氣痞膈然太陽在泉寒風發於朝暮濕蒸相薄以濕遇火故濕化不流白露布陰以成秋令民病腠理熱血暴溢瘧痢心腹滿熱臚脹甚則胕同浮腫濕熱並行故為是病五之氣慘令已行寒露下霜乃早降草木黃落客主之氣皆陽明燥金用事故其政令如此民舒無病終之氣寒大舉濕大化霜乃積陰乃凝水堅冰陽光不治在泉客主之氣皆太陽寒水用事故其政令如此感於寒則病令人關節禁固腰脽痛腰脽與膀胱皆寒水同類為病以上十年上濕下寒故寒濕持於氣交然太陰司天則水鬱太陽在泉則火鬱寅申之歲戊寅戊申甲寅甲申庚寅庚申丙寅丙申壬寅壬申少陽相火司天歲氣火化之候司天者天之氣也厥陰風木在泉地之氣也少陽相火炎上克肺金金受克則腎水失母上盛下虛上攻變生諸疾其化以火少陽屬相火亦曰畏火凡炎暑赫烈陽氣盛極皆相火之化而為炎光赫烈燔灼焦然相火淫勝則金受其制故溫氣流行金政不平民病頭痛發熱惡寒而瘧熱上皮膚痛色變黃赤傳而為水身面浮腫腹滿仰息泄注赤白瘡瘍咳唾血煩心胸中熱甚則鼽衄病本於肺火克肺金相火用事金氣受傷客熱內燔水不能制故現諸疾天府手太陰肺脈也在臂臑內廉腋下三寸動脈應手金不勝火則肺氣竭而天府絕死不治羽蟲同天之氣故靜毛蟲同地之氣故育在泉木勝則土衰故倮蟲不成厥陰風木在泉風淫於地則木勝土風勝濕塵埃飛揚故地氣不明平野昏昧木氣有餘故草乃早秀民病洒洒振寒數欠為陽明胃病自食則嘔身體皆重為太陰脾病且厥陰肝脈貫膈布脅肋故又為心痛支滿等症皆木邪淫勝脾胃受傷毛蟲屬木同其氣故育木剋土故倮蟲耗風木在泉風行地中故清毒之物不生寅申之歲壬寅壬申運同司地曰同天符上少陽相火司天中太角木運下厥陰風木在泉運生天氣曰小逆木上生火也故病亦微運於四孟月同曰支德符壬寅年木運臨之寅屬木春孟月也太過之運加地氣曰同天符壬寅壬申二年運同司地曰風木其運風鼓其化鳴紊啟拆其變振拉摧拔其病掉眩支脅驚駭二年病少無瘟戊寅戊申上少陽相火司天中太徵火運下厥陰風木在泉運與司天之氣相同曰天符其運暑其化暄囂鬱燠此戊年太徵之政化其變炎烈沸騰太徵之變其病上熱鬱血溢血泄心痛火之為病內應於心寅申年少陽相火當遷正司天而陽明燥金以上年在泉之右間當升新歲司天之左間故畏天英火星勝之也遇戊寅戊申戊為中運陽火有餘其氣先天而至金欲昇天火運抑之故升之不前金鬱不升人病在肺金鬱欲發必須待德位之時而後作戊申年剛柔失守如此天運失時三年之中金疫發也速在庚戌遲則辛亥即瘟疫熱症藥宜瀉白散煎湯量冷研化五瘟丹服天氣時雨不降燥金鬱於地西風數舉鹼滷燥生民病上熱喘嗽血溢火盛於上肺金受傷金鬱之發肅殺氣行民病脅滿悲傷金邪伐肝金氣寒斂而燥故為嗌乾手足拆皮膚燥等症甲寅甲申上少陽相火司天中太宮土運下厥陰風木在泉天氣生運火下生土也曰順化其運陰雨其化柔潤重澤其變振驚飄驟其病體重浮腫痞飲順化之年而民無病庚寅庚申上少陽相火司天中太商金運下厥陰風木在泉天刑之年火下剋金故曰不相得則病運於四孟月同曰支德符庚申年金運臨之申屬金秋孟月其運涼其化霧露清切此庚年太商之正化其德霧露蕭飋其變肅殺凋零其病肩背胸中痛火邪在肺丙寅丙申上少陽相火司天中太羽水運下厥陰風木在泉運克天氣曰不和水上剋火故病甚其運寒肅其化凝慘慄冽其變冰霜雪雹其病寒浮腫丙寅剛柔失守寅申之歲少陰降地厥陰當遷正在泉而少陰君火以上年司天之右間當降為今歲在泉之左間故畏地玄水勝窒之也遇丙寅丙申水運太過先天而至亦能制抑君火使之不降君火欲降水運承之降而不下即彤雲才見黑氣反生暄暖如舒寒常布雪凜冽復作天云慘淒皆寒水勝火之化久而不降熱鬱於上伏之化郁寒勝復熱赤風化疫民病面赤心煩頭痛目眩多溫熱症丙寅年剛柔失守天運失時二年之中火疫發也早至戊辰晚至己巳氣微則疫小氣甚則疫大故至有遲速丙寅丙申二年少陰君火當降在泉遇水運承之降而不下人病在心則為火鬱火鬱欲發必待得位之時故當因其勢而解之散之揚之藥宜五瘟丹之類解利之竹葉導赤散煎湯研送民病寒中火盛於外外發瘡瘍外熱內為泄滿內寒其病寒熱瘧泄聾瞑嘔吐上怫音佛不舒腫色變熱盛寒復則水火交爭故為諸病初之氣地氣遷風勝乃搖寒去大溫草木早榮寒來不殺初氣君火正用事而兼相火司故大溫溫病乃起其症氣怫於上血溢目赤咳逆頭痛血崩脅滿膚腠生瘡君相二火合氣故為病如此二之氣火反郁白埃四起云趨雨府風不勝濕雨乃零民乃康其病熱鬱於上咳逆嘔吐瘡發於中胸嗌不利頭痛身熱昏憒膿瘡皆濕熱所化之病三之氣天政布炎暑至少陽上臨相火專令故炎暑至雨乃際民病熱中聾瞑血溢膿瘡咳嘔鼽衄渴嚏欠喉痹目赤善暴死主客之火交熾故為熱病如此四之氣涼乃至燥金之客加於濕土之主故涼風至而炎暑間時作時止化土金相生故民和平其病胸滿燥盛者肺自病身腫濕勝者脾自病五之氣寒水之客加於燥金之主水寒金斂暑去寒來雨乃降氣門腠理空竅所以發泄榮衛之氣故曰氣門乃閉剛木早調民避寒邪君子周密金肅水寒當畏避也終之氣厥陰在泉風木用事主氣以寒水生之地得正氣而風乃至萬物反生霿地氣不應霧以行其病關閉不禁心痛陽氣不藏而咳時當閉藏而風木動之風為陽故為病如此卯酉之歲丁卯丁酉癸卯癸酉己卯乙卯乙酉辛卯辛酉己酉陽明燥金司天歲氣燥化之候天之氣也少陰君火在泉地之氣也陽明燥金者手陽明大腸之氣象庚辛金也其化以燥凡清明干肅萬物堅剛皆金之化而為清涼勁切霧露蕭瑟燥金淫勝於上則木受其克故草生榮俱晚在於人則肝血受傷不能榮養筋骨故生內變且金氣太涼能革發生之氣故草生之應如此然陽明燥金在上則少陰君火在下故蟄蟲來見陽明司天介蟲同司天之氣故靜羽蟲同在泉之氣故育民病左脅胠痛等症皆肝病肝木主左也按經脈篇云以心脅痛不能轉側面微有塵為足少陽膽經病腰痛不可俯仰丈夫㿉疝婦人少腹痛嗌乾面塵飧泄為足厥陰肝經病此以肝與膽為表裡木被金傷故諸病本於肝也太衝足厥陰肝脈在足大指本節後二寸動脈應手木不勝金則肝氣竭而太衝絕死不治少陰君火在泉地之氣也君火淫勝於下故焰浮川澤陰處反明蟄蟲不藏民病腹中常鳴者火氣奔動也氣上衝胸者火性炎上也喘不能久立寒熱皮膚痛者火邪乘肺也目瞑者熱甚陰虛畏陽光也齒痛䪼腫熱乘陽明經也寒熱如瘧金水受傷陰陽交爭也熱在下焦故少腹痛熱在中焦故腹脹大燥結不通則邪實於內以苦下之宜承氣湯羽蟲屬火同其氣故育介蟲屬金受其制故耗少陰在泉熱在地中寒毒之物不生卯酉之歲丁卯丁酉上陽明燥金司天中少角木運下少陰君火在泉天刑之年金下剋木也故曰不相得則病歲運不及而司天燥金勝之則金兼木化反得其政所謂委和之紀陽和委屈發生少也丁卯年運臨本氣之位曰歲會木運臨之卯木位也其病不死但執遲而緩卯酉之年太陰降地少陰當遷正在泉而太陰濕土以上年司天之右間當降為今歲在泉之左間故畏地倉木勝窒之也如上年寅申歲氣有餘司天少陽不退位則右間太陰亦不能降下遇木運以至丁卯丁酉年木運承之降而不下即黃云見而青霞彰鬱蒸作而大風霧翳埃盛折損乃作皆風木勝土之化久而不降土氣鬱久故天為黃氣地為濕蒸人病在脾胃故為四肢不舉昏眩肢節痛胸腹作滿填臆等症木運不及故本方受災丁卯丁酉二年太陰濕土當降在泉歲運遇木則太陰濕土降而不下則為土鬱人病在脾土鬱欲發必待得位之時而後作藥宜泄黃散煎湯量冷研服五瘟丹癸卯癸酉上陽明燥金司天中少徵火運下少陰君火在泉癸年陰火不及上見燥金則金得其政所謂伏明之紀運克天氣曰不和火上剋金也故病甚雖雜病多無瘟疫症不及之年加地氣曰同歲會此二年運臨司地曰君火己卯己酉上陽明燥金司天中少宮土運下少陰君火在泉二年金與土運雖相得然子臨父位為逆運生天氣曰小逆土上生金也故病亦微卯酉年陽明燥金當遷正司天而太陽寒水以上年在泉之右間當升新歲司天之左間故畏天芮土勝之也卯酉陰年氣有不及司天陽明未得遷正而左間太陽亦不得其位水欲昇天土運抑之己卯己酉皆土運為天芮之年亦能制抑太陽寒水升之不前水鬱不升人病在腎水鬱為害待得位之時而發升之不前濕為熱蒸寒生兩間民病注下食不及化濕勝於上寒勝於下故氣令民病如此久而成郁冷來克熱冰雹卒至藥宜連翹青黛飲煎湯研化五瘟丹服乙卯乙酉歲會太乙天符上陽明燥金司天中為少商金運下少陰君火在泉運同天氣曰天符運與司天皆金卯酉年運臨本氣之位曰歲會金運臨之酉金位也其病危乙年金運不及得陽明司天之助所謂從革之紀辛卯辛酉上陽明燥金司天中少羽水運下少陰君火在泉天氣生運曰順化金下生水也順化之年民舒病少初之氣太陰用事時寒氣濕故陰凝燥金司天故氣肅水冰者氣肅所成寒雨者濕土所化民病中熱脹面目浮腫善眠鼽衄嚏欠嘔小便黃赤甚則淋主氣風木客氣濕土風為陽濕為陰風濕為患脾腎受傷故為此諸症二之氣陽乃布民乃舒物乃生榮少陽相火用事於春分之後故其應如此癘大至民乃暴死主君火客相火二火交熾臣位於君故爾三之氣天政布司天陽明燥金用事也故涼乃行然主氣相火當令故燥熱交合至三氣之末以交四氣則主以太陰客以太陽故燥極而澤民病寒熱以陽勝之時行金涼之氣故爾四之氣寒雨降太陽用事於濕土之時民病暴僕振慄譫妄少氣嗌乾引飲及為心痛癰腫瘡瘍寒瘧骨痿便血四氣之後在泉君火所主而太陽寒水臨之水火相犯故為暴僕戰慄心痛等症五之氣春令反行草乃生榮厥陰風木用事而得在泉君火之溫民氣和終之氣陽氣布候反溫蟄蟲來見流水不冰少陰君火用事故氣候如此民乃康平其病溫君火之化然燥金司天則歲半之前氣過於斂故宜汗之散之君火在泉則歲半之後氣過於熱故宜清之辰戌之歲壬辰壬戌戊辰戊戌甲辰庚辰庚戌丙辰丙戌甲戌太陽寒水司天歲氣寒化之候天之氣也太陰濕土在泉地之氣也太陽與少陰為表裡屬北方壬癸水主冬旺七十二日寒水勝則邪乘心太陽屬水其化以寒凡陰凝冽慄萬物閉藏皆水之化寒淫勝於上故寒反至水且冰若乘火運則水火相激故雨暴乃雹民病寒水勝則邪乘心水剋火故為血變於中心主血發為癰瘍瘡癤等症按經脈篇云以手心熱臂肘攣急腋腫胸脅支滿心中澹澹大動面赤目黃為心包絡病蓋火受寒傷故諸病皆本於心神門手少陰心脈也在手掌後銳骨之端動脈應手火不勝水則心氣竭而神門絕死不治諸動氣者知其臟也察動脈之有無則臟氣之存亡可知鱗蟲同天之氣故靜倮蟲同地之化故育太陰濕土在泉地之氣也草乃早榮濕淫所勝埃昬岩谷黃反見黑黃土色黑水色土勝濕淫也民病積飲心痛寒濕乘心耳聾渾渾焞焞嗌腫喉痹三焦病陰病見血少腹腫痛不得小便以邪濕下流為陰虛腎病病沖頭痛目似脫項似拔腰似折髀不可以屈膕如結腨如別為膀胱經病此以土邪淫勝剋水故腎合三焦膀胱病及焉倮蟲屬土同其氣故育鱗蟲屬水受其制故不成濕在地中土得位也故其化淳厚燥毒之物不生辰戌之歲壬辰壬戌上太陽寒水司天中太角木運下太陰濕土在泉司天生運曰順化水生木也此年民舒病少其變振拉摧拔壬為陽木風運太過則金令承之故有此變其運風其化風為木化鳴風木聲紊繁盛啟拆萌芽其病眩掉頭搖目瞑木運太過戊辰戊戌上太陽寒水司天中太徵火運下太陰濕土在泉火運太過得司天寒水制之則火得其平所謂赫曦之紀其運熱其化暄暑鬱燠其變炎烈沸騰火氣薰蒸火運太過則寒承之其病熱鬱雖生熱症而瘟疫少甲辰甲戌上太陽寒水司天中太宮土運下太陰濕土在泉運克天氣曰不和土上剋水故病甚也雖雜病甚而瘟疫微太過之運加地氣曰同天符甲辰甲戌運同司地曰濕土甲辰甲戌運臨本氣之位曰歲會辰戌丑未土位也其運陰埃其化柔潤重澤皆中運濕土之化其變振驚飄驟土運太過風木乘之其病下重土濕之病庚辰庚戌上太陽寒水司天中太商金運下太陰濕土在泉運生天氣曰小逆金上生水也故病亦微中金運太過又能勝水其運涼其化霧露蕭飋其變金運肅殺萬物凋零火氣承金即陽殺之象金氣太過其病燥肺金受傷故背悶瞀而胸脹滿庚辰剛柔失守天運化疫三年之後發而為疫微則徐三年後甚則速三年首也速至壬午徐至癸未木疫發也藥宜羌活紫蘇薄荷滑石煎湯量冷研五瘟丹服辰戌之年太陽寒水當遷正司天而厥陰風木以上年在泉之右間當升新歲司天之左間故畏天柱金星勝之也遇庚辰庚戌庚為陽金其氣先天而至中運勝之忽然不前木運升之金乃抑之木不能前暴郁為害金能勝木也木鬱不升人病在肝木鬱欲發必待其得位之時而後作升之不前清生風少肅殺於春露霜復降草木乃萎民病瘟疫早發咽嗌乃干四肢滿肢節皆痛金勝木衰之也金氣肅殺於春陰勝抑陽故病瘟疫節痛木鬱既久其極必發故大風摧拉等變民病為卒中偏痹手足不仁丙辰丙戌上太陽寒水司天中太羽水運下太陰濕土在泉運氣相同曰天符運與氣皆水其運寒其化凝慘凓冽此丙年水運之正化也其變冰雪霜雹水太過土氣承之其病大寒留於溪谷筋骨肢節之會水運太過寒甚氣凝辰戌歲少陽降地太陰當遷正在泉而少陽相火以上年司天之右間當降為今歲在泉之左間故畏地玄水勝窒之也遇水運太過先天而至丙辰丙戌年水運承之降而不下彤雲才見黑氣反生暄暖欲生冷氣卒至甚即冰雹皆寒水勝火之化與丙申歲少陰不降同義丙辰丙戌歲少陽相火當降今歲在泉遇此二年水運承之降而不下則為火鬱變為瘟疫藥宜涼膈散兼導赤散加知母五瘟丹服之久而不降伏之化郁冷氣復熱赤風化疫民病面赤心煩頭痛目眩赤氣彰而熱病欲作少陽火鬱為病太陽寒水司天太陰濕土在泉故天氣肅地氣靜水土合德民病寒濕肌肉痿足痿不行濡泄血溢火鬱之病寒濕使然歲半之後地氣主之自三之氣止極雨散之後交於四氣則在泉用事而太陰居之故又雨朝北極濕化布焉澤流萬物土之德也雷動於下火鬱發也太陽寒水司天之客氣加於主氣之上本年初之氣加於主氣之上本年初之氣少陽用事上年在泉之氣至此遷移故曰地氣遷後放此初之氣少陽相火用事地氣遷氣乃大溫草乃早榮上年終之氣君火今歲初氣相火二火之交故氣溫草榮民溫病乃作身熱頭痛嘔吐肌腠瘡瘍客氣相火主氣風木風火相搏故為此病二之氣陽明燥金用事民乃慘草遇寒故大涼至而火氣抑民病氣鬱中滿寒乃始清寒滯於中陽氣不行也三之氣太陽寒水用事天政布寒氣行雨乃降民病寒反為熱中癰疽注下心熱瞀悶不治者死若人傷於寒而為病熱太陽寒水司天寒氣下臨心氣上從寒侮陽則火無不應若不治之則陽絕而死按六氣司天皆無不治者死之說唯此太陽寒水言之可見人以陽氣為生之本不可不顧也四之氣厥陰風木客氣用事而加於太陰濕土主氣故風濕交爭而風化為雨木得土化故乃長乃化乃成民病厥陰風木之氣值大暑時木能生火故民病大熱以客勝主脾土受傷故為少氣肉痿足痿注下赤白等症五之氣少陰君火用事歲半之後地氣主之以太陰在泉而得君火之化陽復化草乃長乃化乃成萬物能長能成民亦舒而無病終之氣太陰濕土在泉地氣正也故濕令行陰凝太虛埃昬郊野民情喜陽而惡陰故慘淒以濕令而寒風至風能勝濕故曰反反者孕乃死所以然者人為倮蟲從上化也風木非時相加故土化者當不育也以上十年皆寒水司天濕土在泉濕宜燥之寒宜溫之味苦者苦從火化治寒以熱也寒水司天則火氣鬱濕土在泉則水氣鬱故必折去其致郁之氣則鬱者舒矣寒水司天則心火不勝太陰在泉則腎水不勝諸太過者抑之不勝者扶之則氣無暴過而疾不生矣巳亥之歲丁巳丁亥癸巳癸亥己巳己亥乙巳乙亥辛巳辛亥厥陰風木司天歲氣風化之候天之氣也少陽相火在泉地之氣也厥陰風木乃足厥陰肝經屬東方木春旺七十二日木邪乘土故諸病皆主於脾其化以風凡發生萬物皆風之化而飄怒搖動雲物飛揚風淫於上故太虛埃昏雲物擾亂寒生春氣而流水不冰然風勝則金令乘之清肅氣行故蟄蟲不出民病胃痛上支兩脅隔咽不通飲食不下舌本強食則嘔腹脹食不下溏泄瘕水閉病本於脾此以木邪乘土故諸病皆本於脾也衝陽足陽明胃脈在足胕上動脈應手土不勝木則脾胃氣竭而衝陽絕死不治少陽相火在泉火淫所勝相火淫勝於下故焰明郊野熱極生寒故寒熱更至民病注泄赤白熱在下焦故少腹痛溺赤便血其餘諸症皆與少陰在泉同候羽蟲屬火同其氣故育介蟲屬金受其制故耗火在泉則木為退氣故毛蟲屬木亦不育少陽相火在泉火在地中則寒毒之物不生巳亥之歲丁巳丁亥俱天符上厥陰風木司天中少角木運下少陽相火在泉運與氣相同曰天符運與氣皆木災三宮三宮者東方震宮也木氣不及故災及之癸巳癸亥俱同歲會上厥陰風木司天中少徵火運下少陽相火在泉天氣生運曰順化木下生火也順化之年民舒病少癸巳癸亥二年陽明燥金欲降火運承之降而不下久則成金鬱發而為疫藥宜泄白散煎湯量冷五瘟丹送下災九宮九為離宮火運不及故災及之巳亥之歲陽明降地少陽當遷正在泉而陽明燥金以上年司天之右間當降為今歲在泉之左間故畏地彤火氣勝之也如上年辰戌歲氣有餘司天太陽不退位則右間陽明亦不能降下遇火運以至癸巳癸亥年火運承之降而不下金欲降而火承之故清肅行而熱反作也熱傷肺氣故民病昏倦夜臥不安咽乾引飲等症金氣久鬱於上故寒白氣起民病肝木受邪故為掉眩手足直而不仁兩脅作痛滿目䀮䀮等症己巳己亥天刑之年上厥陰風木司天中少宮土運下少陽相火在泉天刑之年木下刻土故曰不相得則病雖病無瘟本年土運不及風木司天勝之則木兼土化所謂卑監之紀災五宮五中宮也土運不及故災及之乙巳乙亥上厥陰風木司天中少商金運下少陽相火在泉運克天氣曰不和金上剋木雖病甚而瘟少災七宮七兌宮也金運不及故災及之辛巳辛亥上厥陰風木司天中少羽水運下少陽相火在泉運生天氣曰小逆水上生木也故病亦微幸巳辛亥年君火欲升而水運承之則為火鬱發為火疫藥宜涼膈散導赤散加竹葉煎化五瘟丹服此年受瘟必待火得位之年而發災一宮一坎宮也水運不及故災及之巳亥之年厥陰風木當遷正司天而少陰君火以上年在泉之右間當升新歲司天之左間故畏天蓬水星勝之也巳亥陰年氣多不及司天厥陰不得遷正而左間少陰亦不得其位而陽年則不然也遇辛巳辛亥陰年水運不及君火欲昇天而中水運抑之不及之年以能制抑君火則弱能制弱而中水運天蓬窒之則水勝而君火不前也火鬱不升而為害火鬱之發必待其得位之時而後作癸未年火鬱瘟疫發也君火相火同火鬱不升人病在心包絡升之不前清寒復作冷生旦暮民病伏陽而內生煩熱心神驚悸寒熱間作天蓬水勝火升不前故氣候清寒民病熱鬱不散火鬱之發故暴熱至而為癘疫溫瘧等症泄去其火熱病可止天氣擾風木司天地氣正相火在泉土得溫養木在上故風生高遠火在下故炎熱從之土氣得溫故云雨作濕化乃行風燥火熱勝復更作蟄蟲來見流水不冰初之氣寒始肅殺氣方至陽明燥金用事也民病寒於右之下金位西方金旺則傷肝故寒於右之下二之氣寒不去華雪水冰殺氣施行霜乃降名草上焦寒雨數至陽乃化太陽寒水用事故其氣候如此然以寒水之客加於君火之主其氣必應故陽復化民病熱於中火應則熱於中客寒外加三之氣天政布風乃時舉厥陰風木司天之氣用事也厥陰加於少陽相火風火交加民病泣出耳鳴掉眩風木之氣見症也四之氣溽暑濕熱相薄爭左之上以君火之客加於太陰之主四氣為天之左間故濕熱爭於左之上民病黃癉而為浮腫濕熱之病五之氣燥濕更勝沉陰乃布寒氣及體風雨乃行客以濕土主以燥金燥濕更勝其候若此終之氣畏火司令陽乃大化蟄蟲出見流水不冰地氣大發草乃生人乃舒少陽在泉故候如此其病溫癘時寒氣熱故病溫癘本年厥陰司天則土鬱少陽在泉則金鬱鬱氣化源義見前章五運五郁天時民病詳解天地五運之郁人身有五臟之應結聚而不行當升不升當降不降當化不化而鬱病作矣故或鬱於氣或鬱於血或鬱於表或鬱於里或因鬱而成病或因病而生郁鬱而太過者宜裁之抑之鬱而不及者宜培之助之諸病多有兼郁者故治有不同也土鬱之發天時岩谷震驚雷殷氣交升降之中以三氣四氣之間埃昏黃黑化為白氣川流漫衍田牧土駒洪水之後群駒散牧于田野云奔雨府太陰濕聚之處霞擁朝陽山澤埃昏其乃發也土氣被郁所化皆遲然土鬱之發必在三氣四氣之時故猶能生長化成不失其時也民病濕土為病濕在中焦故心腹脹濕在下焦故數後下利心為濕乘故痛肝為濕侮故脅脹嘔吐者霍亂者注下浮腫身重者皆土發濕邪之症治法土鬱奪之奪者直取之也土鬱之病濕滯之屬也其臟應脾胃其主在肌肉四肢其傷在胸腹土畏壅滯凡滯在上者奪其上吐之可也滯在中者奪其中伐之可也滯在下者奪其下瀉之可也凡此皆謂之奪非獨止於下也金鬱之發天時天潔地明風清氣切大涼乃舉草樹浮煙燥氣以行霿霧數起殺氣來至草木蒼干金乃有聲山澤焦枯土凝霜滷怫乃發也金旺五之氣主秋分八月中後凡六十日有奇民病咳逆嗌乾肺病而燥也心脅滿引少腹善暴痛不可反側金氣勝而傷肝也金氣肅殺故面色陳而惡也治法金鬱泄之泄者疏利也凡金鬱之病為斂為閉為燥為塞之屬也其臟應肺與大腸其主在皮毛聲息其傷在氣分或解其表或破其氣或通其便凡在表在下在上皆為之泄也水鬱之發天時陽氣乃避陰氣暴舉大寒乃至川澤嚴凝寒雰結為霜雪甚則黃黑昏翳流行氣交乃為霜殺水乃見祥陽光不治空積沉陰白埃昏暝而乃發也其氣二火前後君火二之氣相火三之氣自春分二月中而盡於小暑六月節凡一百廿日皆二火之所主水本旺於冬其氣鬱故發於火令之時陰乘陽也民病寒客心痛心火畏水腰脽痛寒入腎關節不利屈伸不便寒則氣血滯筋脈急善厥逆痞堅腹滿陰氣盛陽不得行治法水鬱折之折者調製也凡水鬱之病為寒為水之屬也水之本在腎水之標在肺其傷在陽分其反克在脾胃水性善流宜防泛溢凡折之法如養氣可以化水治在肺也實土可以制水治在脾也壯火可以勝水治在命門也自強可以帥水治在腎也分水可泄水治在膀胱也凡此皆謂之折豈獨折之而已哉木鬱之發天時太虛埃昏雲物以擾大風乃至髮屋折木太虛蒼埃天山一色或為濁氣黃黑郁若橫云不起雨云雖橫而不致雨其氣無常變動不定長川草偃柔葉呈陰松吟高山虎嘯岩岫怫之先兆也民病胃脘當心而痛厥陰之脈挾胃貫膈上支兩脅肝氣逆咽膈不通飲食不下甚則耳鳴眩轉目不識人善暴僵仆皆風木肝邪之病治法木鬱達之達者暢達也凡木鬱之病風之屬也其臟應肝膽其經在脅肋其主在筋爪其傷在脾胃在血分然木喜調暢故在表者當疏其經在裡者當疏其臟但使氣得通行皆謂之達諸家以吐為達者又安足以盡之火鬱之發天時太虛曛翳大明不彰炎火行大暑至山澤燔燎材木流津廣廈騰煙土浮霜滷止水乃減蔓草焦黃風行惑言風熱交熾人言亂惑濕化乃後火本旺於夏其氣鬱故發於申未之四氣四氣者陽極之餘也民病少氣壯火食氣瘡瘍癰腫火能腐物脅腹胸背頭面四肢䐜憤臚脹瘍疿陽邪有餘嘔逆火氣衝上瘛瘲火傷筋骨痛火傷骨節乃有動火伏於節注下火在腸胃溫瘧火在少陽腹暴痛火實於腹血溢流注火入血分精液乃少火爍陰分目赤火入肝心熱火入心甚則瞀悶火炎上焦懊憹火鬱膻中善暴死火性急速敗絕真陰此皆火盛之為病也治法火鬱發之發者發越也凡火鬱之病為陽為熱其臟應心與小腸三焦其主在脈絡其傷在陰凡火所居有結聚斂伏者不宜蔽遏故因其勢而解之散之升之揚之如開其窗如揭其被皆謂之發非僅發汗也連翹解毒飲治水鬱為疫乃脾腎受傷以致斑黃面赤體重煩渴口燥面腫咽喉不利大小便澀滯青黛八分元參一錢澤瀉一錢鹽炒知母一錢連翹一錢去隔童便一大盅水二盅煎一盅冷研五瘟丹服竹葉導赤散治君火鬱為疫乃心與小腸受病以致斑淋吐衄血錯語不眠狂躁煩嘔一切火邪等症生地二錢木通一錢連翹一錢去隔大黃一錢梔子一錢黃芩一錢黃連八分薄荷八分水煎研化五瘟丹服五瘟丹見前諸方其餘瀉黃瀉肝涼膈瀉白等散習見方書茲不錄錦按臨症而不洞悉三才不足以言醫而唯疫癘之疾其於天時也猶不可以不講焉觀世俗之言瘟疫者動曰時症可以知之矣夫醫而系之以時明乎實天作之孽而非人力之所能為也故其來也無方其去也無跡迅若飄風疾若掣電雖富貴怡養之人深堂大廈息偃在床而亦有莫能免者焉夫人之肢體氣血時時與天地相通故天地之沴氣感於人之身而病成焉矣倘療之不得其法生死即在目前豈可苟焉而已哉治疫者必先明乎化水化火之微客氣主氣之異司天在泉之殊致五郁六氣之分途既已胸有成竹矣及遇疫氣之來而復觀天時之雨暘寒燠地理之高下燥濕人身之老幼虛實病之或在表或在裡或在半表半裡或在經絡或在臟腑或在上或在中或在下或日數之多寡與病勢之淺深或致病之由與得病之日或既病而曾否服藥或服藥而有無差誤更參以望聞問切一一詳審於胸中而後再稽諸運氣以濟其變而治疫之能事始畢焉已不然者若遇表症而止知蘇散遇里症而止知攻擊非不時亦弋獲終屬偶然之會而非若窺見垣一方者之百發百中也彼夫陰陽術數之家遇冠昏喪葬出行修造之事其於孤虛王相尚且擇焉而必精核焉而必詳況醫道乃人命攸關而顧可置運氣而不講乎所慮者執於一偏而膠柱鼓瑟耳若能不離乎此而不泥乎此方為善言運氣者也其言某年應用某藥不過言其大概治疫者仍當審症以投劑豈可盡恃乎此而不知變通乎至於星宿之分野九州之方域在瘟疫發源書中多雜引經以盡其致茲一概不錄以其談理過於玄杳正無須乎若是之鉤深索隱也
