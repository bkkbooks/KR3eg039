body:
  text: 卷之二論治瘟疫名義論古人言諸瘟病者多作溫熱之溫夫言溫而不言瘟似為二症第所言與瘟病相同則溫瘟為一病也明矣後人加以疒字變溫為瘟是就病之名目而言豈可以溫瘟為兩症乎其曰春溫夏溫秋溫冬溫總屬強立名色其實皆因四時感瘟氣而成病耳其曰風溫濕溫溫瘧溫暑者即瘟病而兼風濕暑瘧也其曰瘟毒者言瘟病之甚者也曰熱病者就瘟病之發於夏者而言耳至於晚發之説更屬不經夫冬月寒癘之氣感之即病那容藏於肌膚半年無恙至來歲春夏而始發者乎此必無之理也而顧可習而不察歟至於疫字傳以民皆疾解之以其為病延門闔戶皆同如徭役然去彳而加疒不過取其與疾字相關耳是則瘟疫二字乃串講之辭若曰瘟病之為癘疫如是也須知疫病所該甚廣瘟字原對疫字不過瘟疫者不過疫中之一症耳始終感溫熱之癘氣而發故以瘟疫別之此外尚有寒疫雜疫之殊而瘟疫書中卻遺此二條竟將瘟疫二字平看故強分瘟病疫病又各立方施冶及細按之其方論又謾無差別殊少情理斷不可從也籲瘟疫二字尚不明其義意又奚以治瘟疫哉疫病有三種論傳曰疫者民皆疾也又曰疫癘也中去聲人如磨礪傷物也夫曰民皆疾而不言何疾則疾之所該也廣矣蓋受天地之癘氣城市鄉井以及山陬海澨所患皆同如徭役之役故以疫名耳其病千變萬化約言之則有三焉一曰瘟疫夫瘟者熱之始熱者溫之終始終屬熱症初得之即發熱自汗而渴不惡寒其表裡分傳也在表則現三陽經症入里則現三陰經症入腑則有應下之症其愈也總以汗解而患者多在熱時其與傷寒不同者初不因感寒而得癘氣自口鼻入始終一於為熱熱者溫之終故名之曰瘟疫耳二曰寒疫不論春夏秋冬天氣忽熱衆人毛竅方開倏而暴寒被冷氣所逼即頭痛身熱脊強感於風者有汗感於寒者無汗此病亦與太陽傷寒傷風相似但系天作之孽衆人所病皆同且間有冬月而發疹者故亦得以疫稱焉其治法則有發散解肌之殊其輕者或喘嗽氣壅或鼻塞聲重雖不治亦自愈又有病發於夏秋之間其症亦與瘟疫相似而不受涼藥未能一汗即解纏綿多日而始愈者此皆所謂寒疫也三曰雜疫其症則千奇百怪其病則寒熱皆有除諸瘟諸掙諸痧瘴等暴怪之病外如瘧痢泄瀉脹滿嘔吐喘嗽厥痙諸痛諸見血諸癰腫淋濁霍亂等疾衆人所患皆同者皆有癘氣以行乎其間故往往有以平素治法治之不應必洞悉三才之蘊而深究脈症之微者細心入理一一體察方能奏效較之瘟疫更難揣摩蓋治瘟疫尚有一定之法而治雜疫竟無一定之方也且其病有寒者有熱者有上寒而下熱者有上熱而下寒者有表寒而裡熱者有表熱而裡寒者種種變態不可枚舉世有瘟疫之名而未解其義亦知寒疫之説而未得其情至於雜疫往往皆視為本病而不知為疫者多矣故特表而出之用黨參宜求真者論疫病所用補藥總以人參為最以其能大補元氣加入解表藥中而汗易出加入攻裡藥中而陰不亡而耆術不能也則年高虛怯而患疫者有賴於人參為孔亟矣第參非素豐家莫能致無已則以黨參代之夫古之所謂人參即今之所謂黨參也故古有上黨人參之號上黨者何即山西之潞安府也今日上黨所出者力雖薄弱而參性自在其質堅硬而不甚粗大味之甘與苦俱而頗有參意第較之遼參色白耳憶四十年前此物盛行價亦不昂一兩不過價銀二錢厥後有防黨把黨者出止二錢一斤而藥肆利於其價之賤隨專一售此而真黨參總格而不行久之且並不知真者為何物而直以把黨防黨為黨參矣豈知今之所謂把黨防黨者以其捆作把故以把名以其形類防風故以防名也將此物加入瘟疫藥中又焉能扶正而除邪也哉用黨參者必當向潞安求其真者而用之方能奏效但真者不行已久聞之濟寧藥肆中尚有而他處則鮮矣此外又有明黨洋參二種明黨形類天冬而兩頭俱鋭洋參形似白芨而其性頗涼總不知其為何物皆不敢用至於藥肆中又有所謂廣黨者云出自廣東夫黨者地名也不曰廣參而曰廣黨其命名先已不通又安敢服食歟真可發一笑也余閲本草云葳蕤可代人參又閲醫書云少用無濟吾鄉山中頗有此物因掘取如法炮製而重用之冀其補益不意竟為其所誤服之頭痛噁心尚意其偶然非藥之故後竟屢用皆然因知可代人參之説斷不足信也治瘟疫慎用古方大寒劑論夫古之黃連解毒三黃涼膈瀉心等劑非古人之好用涼藥也以其所秉者厚故用之無寒中之患而獲敗火之功今人所秉者薄既不逮古而又兼之以鑿喪若用大苦大寒之劑其何以當之況瘟疫之火因邪而生邪散而火自退矣若用大寒之劑直折其火未有驅邪之能而先受寒涼之禍受寒則表裡凝滯欲求其邪之解也難矣總之如黃連黃柏龍膽草苦參大苦大寒等藥皆當慎用以有生地二冬元參丹皮梔子黃芩銀花犀角茅根竹瀝童便葛根石膏人中黃輩加減出入足以瀉火而有餘矣如果有真知灼見非黃連等藥不可少者分計多者錢計而止不可多用用大黃石膏芒硝論或曰大苦大寒之劑既在禁例而治瘟疫顧用三承氣白虎何也答曰石膏雖大寒但陰中有陽其性雖涼而能散辛能出汗解肌最逐溫暑煩熱生津止渴甘能緩脾善祛肺與三焦之火而尤為陽明經之要藥凡陽狂斑黃火逼血升熱深便祕等症皆其所宜唯當或煅或生視病之輕重而用之耳大黃雖大寒有毒然能推陳致新走而不守瘟疫陽狂斑黃譫語燥結血鬱非此不除生恐峻猛熟用為佳至於芒硝雖屬劫劑但本草尚稱其有卻熱疫之長而軟堅破結非此不可但較諸石膏大黃用之便當審慎矣夫以大黃石膏之功能彰彰若是較之只有寒涼凝滯之性者其宜否不大相徑庭也哉此治瘟疫者之所不可闕也歟立方用藥論雜病用藥品過多或無大害即如健脾者多用白朮固已再加山藥可也再加扁豆亦可也再加蓮肉棗肉亦無不可也即如補腎者多用熟地固已再加枸杞可也再加菟絲亦可也再加蓯蓉首烏芡實杜仲亦無不可也補藥固不厭多即雜症藥品過繁亦為害尚淺覺其不善速為減去或可挽回而瘟疫不能也即如葛根治瘟疫藥中至和平之品若邪在太陽加之太早反足以引邪入陽明矣又如葛根與白芷均屬陽明散劑而白芷溫散葛根涼散白芷散陽明風寒之邪葛根散陽明瘟熱之邪若瘟邪之在陽明用葛根而再用白芷必然掣肘恐不似他症用藥繁多之帖然無事矣所以瘟疫用藥按其脈症真知其邪在某經或表或里並病合病單刀直入批隙導窾多不過五六味而止至於分兩之重輕則在臨時看其人之老少虛實病之淺深進退而酌用之所以書內記載之方大半止有炮製而無分兩欲以變通者俟諸人耳疫症繁多論余於疫症既分三種曰瘟疫曰寒疫曰雜疫三者具而疫症全矣然猶未也憶某年一冬無雪天氣溫和至春不雨入夏大旱春杪即疫癘盛行正瘟疫殊少而雜疫頗多有小兒發疹者有大人發疹者有小兒疹後而患痢患泄瀉者有大人患痢患泄瀉者有先瀉而後痢者有先痢而後瀉者有瀉痢而兼腹脹痛者有脹痛而不瀉痢者有瀉痢既愈遲之又久而復作者有瘟症既愈遲之又久而復作者有復作而與前不同者有腹脹而不痛者有痛而不脹者有不思飲食者有單發熱者有先瘟症而後不語者有腫頭面者有周身長癤者有長疥者有霍亂者有身癢者有患瘟症而兼泄瀉者城市鄉井緣門闔戶皆同此豈達原飲一方所能療歟其治法亦與平常患瀉痢脹痛等疾亦異此皆雜疫之類也要之雜疫無病不有惟無咽膈夢遺之為疫病者耳治疫症最宜變通論世之重疾無逾風勞臌膈而四者之治總有蹊徑可尋如風症止真中類中二條真中殊少治法無多止有類中亦不過氣血虧損而已故張景嶽恐人認作風治特立非風一門究其治法惟大補氣血而止勞症即云難治亦不過陰陽水火氣血先天後天視其何者虧損而補益之臌脹有驅水理氣之殊噎膈止潤燥養血之法惟至於疫變化莫測為症多端如神龍之不可方物臨症施治者最不宜忽也瘟疫尚好治療識其表裡已得大綱即有變現雜症如斑汗發黃之類皆易捉摸即雜疫如所謂諸瘟諸痧諸掙等症各具療法亦易施治唯乙巳年民之所患並非奇疾怪症不過痢疾泄瀉肚腹脹痛等病有何難療孰意用平日治此疾法治之半皆不應或二三人同患一症而治法各異者施之此人而效施之彼人而又不效矣或有一人患是症而愈而復作者其治法又異施之前次而效施之後此而又不效矣若非具慧眼卓識而窺見垣一方者豈能人人而濟之乎蓋必深明乎司天在泉之歲正氣客氣之殊五運六氣之微陰陽四時之異或亢旱而燥熱煩灼或霖雨而寒濕鬱蒸或忽寒而忽暖或倏晴而倏陰或七情之有偏注或六欲之有慝情或老少強弱之異質或富貴貧賤之殊途細心入理再加以望聞問切一一詳參庶病無遁情而矢無妄發至於治法千變萬化隨宜用藥莫可名言故仲景曰瘟疫不可先定方瘟疫之來無方也旨哉斯言疫病一門又豈一百一十三方所能盡哉是在留心此道者神而明之可耳抄復論凡治傷寒瘟疫醫者最重初次得疾至於抄復謂死者蓋寡每視為最輕而謾不經意焉蓋謂抄復之病人身之經絡臟腑皆前次瘟邪所曾經傳遍之所則此番不過由熟路而行故邪氣易出也古人原有此論豈知此第語其常也獨瘟疫盛行之時則不然蓋是時疫氣所積者厚即無氣食勞損之因尚有重感癘氣而復者更有前番餘邪稍有未淨再醞釀滋蔓而抖然自復者是天地之邪與人之氣血膠固充塞鬱勃糾紛故復至三四次尚有隕命者矣慎毋以其復也而忽之僅讀傷寒書不足以治瘟疫不讀傷寒書亦不足以治瘟疫論傷寒者為寒所傷其來也有因故初感總以汗散為主若瘟疫並作因寒而得不可以治傷寒之法治之非惟麻桂不用即羌活十神等湯亦非對症之藥所謂讀傷寒書不足以治瘟疫者此也至於瘟疫變現雜症之多幾與傷寒等吳又可瘟疫論中僅有斑黃汗狂等數條至於傷寒中之諸汗諸痛諸血症以及譫狂渴煩惕瞤瘛瘲不語搖頭大小便等症之方論瘟疫中可以裁取而用之者正復不少也然必斟酌盡善而後可是總在人之學力見解而非口説之所能盡矣所謂不讀傷寒書不足以治瘟疫者如此讀傷寒書當先觀陽症論傷寒書率皆將陰陽二症參錯並舉倏言陽症而用硝黃又倏言陰症而用桂附推作者之意雖相提並論而其中分析原自了然若曰陽症若此而陰症則如彼也讀者不善體會隨將陰陽二症攪作一團故有謂一人之病有忽陰而忽陽者有謂病在陽經為陽症傳入陰經為陰症者有謂陰陽錯雜而難分者種種支離不可枚舉即不出乎此亦視陰症為世所長有與陽症參半故臨症每將陰陽二字交戰於心而迄無定見無怪乎用藥差錯而誤人性命也欲除此弊莫若分讀先習傳經之陽症將直中陰經之陰症暫行緩看蓋陽症明而習陰症自易易耳何者陽症頭緒繁多變現百出至於陰症並無傳變治法無多易學易療當黜之雜症門中與暑濕霍亂諸中等疾為一類則自無陰陽誤治之弊舍病治因論吳又可書中有舍病治藥之論此第知其一耳而抑知瘟疫之有所因者更非一説之所能盡也蓋有因食因酒因痰因驚因郁因氣因思水不與因飲水過多因過服涼藥因誤服溫補因服諸藥錯誤因信巫祝擔擱種種因由未可更僕皆當暫舍其所患之瘟而求其弊以治其因也食宜消之酒宜解之痰宜化之驚宜鎮之郁宜開之氣宜順之水宜行之寒宜溫之熱宜涼之再佐以治瘟疫之藥始得非全拋而舍之之謂也更有兼食兼飲兼痰兼水等症而卒難得汗者治法略同但又當以治瘟疫為主而治兼之藥佐之矣總之務要寒熱溫涼之不差臟腑經絡之不惑方可以起死人而肉白骨也是亦在乎神而明之者瘟疫統治八法解毒凡自古飢饉之後或兵氛師旅之餘及五運之害制六氣之乖違兩間厲氣與人事交併而瘟疫始成焉人觸之輒病症候相同而飢寒辛苦之輩感者居多年高虛怯之人感之偏重是皆有毒氣以行乎間此毒又非方書所載陽毒陰毒之謂未病之先已中毒氣第伏而不覺既病之時毒氣勃發故有變現諸惡候汗下之後餘毒往往未盡故有自復之患是毒氣與瘟疫相為終始者也茲定金豆解毒煎以解其毒勢且能清熱並不用芩連梔柏而熱已殺殺音曬矣金豆解毒煎自定新方金銀花二三錢緑豆皮二錢生甘草一錢陳皮一錢蟬蛻去足翅八分井花水清晨首汲煎或再加殭蠶浸去涎一錢銀花能清熱解毒療風止渴緑豆甘寒亦清熱解毒之品兼行十二經祛逐疫毒無微不入甘草解一切毒入涼劑則能清熱亦能通行十二經以為銀花緑豆之佐陳皮調中理氣使營衛無所凝滯蟬蛻取其性之善退輕浮易透肌膚可散風熱開肌滑竅使毒氣潛消也此方於瘟疫九傳中皆可加減消息用之緑糖飲自定新方五穀皆可入藥如白虎湯之用粳米白朮散之用薏仁牡蠣散之用浮小麥疏鑿飲之用赤豆阿膠散之用糯米以及麥芽黃卷飴醯等項靡不各效其能以見於世甚至於面合曲則稱之曰神黍釀酒則推之曰聖取精用宏未可更僕數矣獨緑豆之功能世鮮有知者何緑豆之蹇於遇乎緑豆性雖清涼而不寒苦且善於解毒退熱除煩止渴利小水獨於治瘟疫為尤宜焉張景嶽有緑豆飲載在新方寒陳中雖極贊其妙但惜加入食鹽以之治瘟反益發渴而緑豆之功能隱矣今易以洋糖則既能解毒且兼涼散瘟疫初終俱可服食乃平易中之最佳最捷方也至於窮鄉僻壤農家者流以及寒士徵人倉卒苦無醫藥用此亦可漸次汗解即服藥者兼服此飲更能添助藥力以成厥功經症未明者服之亦總不犯禁忌誠治瘟疫之良劑幸毋以平淺而忽之也緑豆不拘多少白糖酌加緑豆功全在皮毋去之將緑豆煮釅湯取出加洋糖與飲冷熱隨病者之便以此代茶渴即與飲飢則拌糖並食其豆針刮針法有二用針直入肉中曰刺將針尖斜入皮膚向上一撥隨以手攝出惡血曰挑刮法有四有用蛤殼者有用瓷盅者有用麻蒜者惟刮臂用有用銅錢者凡刮或蘸清水或鹽水或香油余見刮瘟疫者則用小棗蘸燒酒刮之刮出紫疙瘩如熟椹隨用針斜挑破攝出血再另刮出疙瘩挑之刮畢挑止原其用棗蘸酒之意取其以火攻火固已不如易以萆麻油蘸刮如無用麻汁搗萆麻仁稍加水取濃汁更捷余見刮挑者往往待瘟邪入里現譫狂等症方用之初感即用此方當更善也至於瘟疫或有咽喉諸症則刺少商穴刺法穴道並見下蝦蟆瘟或體厥脈厥等症則刺少商穴並十指上薄肉靠指甲邊一韭葉寬處當中刺之血出如血不出可攝出之皆效刮針穴道頸項後當中刮一道兩旁左右大筋上各刮一道左右兩肩軟肉處靠肩井各刮一道兩肩下脊背上軟肉處各刮一道脊骨兩旁豎刮自脖下至腰各兩道脊後脅間肋縫中軟肉處左右各刮數道前俠旁軟肉處斜刮各一道前脅間肋縫中軟肉處左右各刮數道每處如刮出紫疙瘩隨用針挑破攝血湧吐吐法近今多不講而抑知實有奇效也吳又可止言邪在胸膈欲吐不吐者方用此方而抑知瘟疫不論日數忽得大吐甚是吉兆將欲汗解也吳太史德菴宿病胃痛痛極則吐偶感瘟症十餘日正危急間又犯宿疾胃口大痛移時繼以嘔吐困頓不止從皆惶遽莫措求余診視余曰無妨可勿藥有喜不久當汗解矣衆以余言始定至夜果大汗而愈蓋吐中即有發散之意彼觸動沉疴而吐者尚能發瘟疫之汗則湧吐之功又安可沒也耶仙傳吐法治一切瘟疫傷寒傷風傷酒傷食飲百沸湯半碗以手揉肚再飲再揉直至腹無所容用雞翎探吐吐後煎蔥湯飲之覆衣取汗甚捷初得病用之更宜蘿蔔子湯吐法凡邪實上焦或痰食氣逆不通等症皆可吐可代瓜蒂三聖散蘿蔔子搗碎溫湯和攪徐飲之少頃即吐或吐不盡必從下行又法食鹽少許炒紅入滾水寧稍淡勿過咸取半碗漸次加增飲自然發吐以祛病為度治食傷痞悶膈痛手足逆冷尺脈全無兼治冷氣鬼氣蠱毒又法燒鹽對熱童便三飲而三吐之治乾霍亂又法治積食胸悶不宜汗下者淡豉食鹽水煎服取吐罨尉景嶽全書中有罨法止治傷寒結胸一症而抑知此法不第治結胸為然凡瘟疫用藥後弗即汗解俟六七日應汗不汗覺心腹中稍有悶痛等症用罨尉之法往往大汗而愈是亦一瘟疫取汗之良方也蓋內通而外未有不解者且不特此也舉凡瘟疫傷寒諸結胸痞氣支結臟結其有中氣虛弱不任用藥攻擊者以此法治之則滯行邪散其效如神並治雜症不論寒熱胸脅心腹鞕痛版悶皆效罨尉法生蔥生薑生蘿蔔如無以子代之錦按原方云蔥薑各數兩蘿蔔倍之愚意不如隨症加減更妙如有表邪或氣滯者生蔥為君寒多者生薑為君痰食滯者蘿蔔為君泛用各等分或蔥多些亦可上用各數兩共搗微爛過爛則成水難包入鍋炒熱住火用布包出一半尉患處冷則將鍋中熱者再包出尉之輪流更換覺透為度無不開通汗出而愈助汗古有汗吐下三法而汗居其首者以邪之中人非汗莫解也吐雖有散意尚待汗以成厥功下之有急時因難汗而始用此是不論傷寒瘟疫而汗之之功為甚巨矣瘟疫雖不宜強發其汗但有時伏邪中潰欲作汗解或其人秉賦充盛陽氣衝激不能頓開者得取汗之方以接濟之則汗易出而邪易散矣茲謹擇和平無礙數方以備用倘瘟疫之輕者初覺即取而試之又安知不一汗而解乎薑梨飲治久汗不出大梨一個生薑一塊同搗汁入童便一盅重湯頓服取汗方用新青布一塊冷水或黃連水浸過略擠干置胸上良久布熱即易之須臾當汗出或作戰汗而解夏月極熱用此法他時斟酌用之凡瘟症熱在上中焦皆可用之清熱解毒邪解而汗出非能發汗也又取汗方蒼朮羌活白礬等分生薑汁為丸彈子大每用一丸男左女右緊攥對前陰處再吃蔥湯取汗點眼取汗方冰片一分枯礬一錢粉草錢半共為細末蘸無根水點眼角先飲百沸水一二碗點後兩手緊搬兩肩屈膝片時即汗二三次汗透即愈塞鼻手握出汗方譫語循衣摸床形如醉人且如猴像厄逆目赤俗云猴症實陽毒也麝香黃連硃砂各三分斑蝥一分共為細末棗肉為丸銀硃三分為衣作兩丸用絹包一塞鼻內男左女右一握手中出汗即愈松峰按此即俗云猴藥也然此名不見經傳細參其方亦未可厚非故亦能取效麝香以開竅黃連以清熱硃砂以逐邪用斑蝥之毒以攻疫毒棗以和營衛銀硃以發散頗有至理存焉蔥頭粳米粥治時瘟取汗白粳米一碗蔥頭連須二十根加水煮粥煮一滾滾服取汗曾出汗者不用洋糖百解飲治瘟疫並傷寒白糖五錢陰症蔥湯下陽症百沸湯下暑症並中熱中暍暍暑熱也太陽中熱為暍其症汗出惡寒身熱而作渴新汲水下虛症米湯下實症陳皮湯下傷食山楂湯下結胸淡鹽湯下蛔厥烏梅花椒湯下緊沙腹痛新汲水下血崩鍋臍煤湯下掌中金治傷寒瘟疫不論陰陽已傳經與未傳經蒼朮薑瘟病用生者傷寒用乾者白礬飛銀硃原方無此新增入等分為末先飲熱緑豆濃湯次將藥末五分五分可疑男左女右攤手心內搦緊夾腿腕側臥蓋被取汗瘟疫初覺蔥白數根生搗能飲者用黃酒不飲者滾水沖服丹礬取汗方治瘟疫黃丹胡椒白礬各一兩馬蜂窩五錢為末蔥搗成膏手捏男左女右對小便處取汗效桃枝浴法治瘟疫初感發熱惡寒無汗者取東南桃枝煎湯趁熱浴之發汗散治一切瘟疫傷寒雄黃四分辰砂二錢火硝四分麝香一分金箔五張共研極細末收瓷瓶內無令出氣遇時疫男左女右點大眼角蓋被即出汗普救五瘟丹專點傷寒瘟疫用水蘸藥點兩眼角一次不汗再點必汗出冰片六分牛黃一錢麻黃二錢四釐琥珀一錢五釐生甘草三錢五分共為細末瓷瓶收貯又發汗方瘟疫始得一二日頭痛壯熱脈盛硃砂一錢水三盅煎一盅去砂飲之蓋被取汗忌生血物又方硃砂末酒調遍身塗之向火坐得汗即愈又方頭痛壯熱脈盛干艾葉水煎服又方生牛蒡根汁空腹服訖取桑葉一把炙水煎服無葉用枝又方頭痛壯熱生葛根汁一盅豉三錢水一盅共煎一盅服如心煩熱加梔子一二錢又方頭痛煩熱皂角燒研新汲水一盅薑汁蜜各少許共和皂角末二錢服先以熱水浴淋次服藥取汗止汗法瘟病如大汗不止將發入水盆中足露於外宜少蓋用炒麩糯米粉龍骨牡蠣煅共為細末和勻周身撲之汗自止免致亡陽之患療瘟神應丹發瘟汗最速壯年人身汗泥丸緑豆大七粒薑一片黃蒿心七個水一碗煎送一説男病用女女病用男一説純用男人存參除穢凡瘟疫之流行皆有穢惡之氣以鼓鑄其間試觀入瘟疫之鄉是處動有青蠅千百為群夫青蠅乃喜穢之物且其鼻最靈人所不聞而蠅先聞之故人糞一拋而青蠅頓集以是知青蠅所聚之處皆疫邪穢氣之所鍾也更兼人之穢氣又有與之相濟而行者凡凶年飢歲殭尸遍野臭氣騰空人受其熏觸已莫能堪又兼之扶持病疾斂埋道殣則其氣之穢又洋洋而莫可御矣夫人而日與此二氣相習又焉得不病者乎使不思所以除之縱服藥亦不靈即靈矣幸愈此一二人而穢氣之彌淪布濩者且方興而未有艾也可不大畏乎茲定數方開列於下倘瘟疫之鄉果能焚燒佩帶則不覺穢氣之潛消而沉疴之頓起矣除穢靖瘟丹自定新方將藥末裝入絳囊約二三錢毋太少闔家分帶時時聞臭已病易愈未病不染蒼朮降真香川芎大黃各二錢虎頭骨細辛斧頭木系斧柄入斧頭之木鬼箭羽桃梟小桃干在樹者白檀香羊躑躅羌活甘草草烏藁本白芷荊芥乾葛蝟皮山甲羚羊角紅棗乾薑桂枝附子鍛灶灰川椒山奈甘松排草桂皮各一錢共為粗末明雄二錢硃砂二錢乳香一錢沒藥一錢四味另研共和蒼降反魂香自定蒼朮降真香各等分共末揉入艾葉內綿紙捲筒燒之除穢祛疫宜忌治瘟疫雖以用藥為尚而宜忌尤不可以不講也不知所宜不能以速愈不知所忌更足以益疾茲特取所宜所忌者如干條開列於下俾病家醫者有所持循遵守庶投劑有靈而養疴無弊矣房中不可燒諸香只宜焚降真諸香燥烈降香除邪不宜見日光太陽真火不宜見燈光總以火故臥須就地南方即在地塘版上布席臥亦就陰遠熱之意衣被不可太暖寧可稍薄唯足宜常暖不必戴帽風有應避不應避風能解熱清涼有滌疫之功正疫家對症妙藥不必垂簾密室病者言不欲見風避之可也不可惱怒病時病後俱宜戒食莫過飽病時病後皆宜戒尤忌魚肉病時病後忌房事病後忌勞心力病後滌舌散火蜜潤刮之愈後半月不可食韭食即發忌飲燒酒陸路不可坐車震動之病增劇不救當宜靜不宜動愈後浴冷水損心包符咒蓋聞河洛開靈符之源詛祝寄神咒之意載在經典炳若日星至於釋氏仙翁則更以符咒為宗要神而明之可以飛升況以之卻病乎茲取試之有效者敬録數則以佐藥餌所不及皆出自佛經道藏並非邪説之可同日而語也赤靈符抱朴子曰五日朱書赤靈符著心前祛瘟祛百病正月元日佩避瘟神咒唵嘛呢吽音烘殳音畔叱遇疫癘盛行時用朱書黃紙上帶在身邊再不時頌此神咒可避邪疫患瘟疫者汗後如見鬼神妄言不寐用朱書此咒佩之神效御瘟符咒太上淨明御瘟經略曰天地無私陶鑄萬物本無善惡世人自私故生災禍飲食不忌服鏈不時善既無聞過則可述司罰之神得而窺測布此毒氣一及成疾不悟愆尤不能保護反怨道咎師其疾愈甚大凡四時調養務在得中服藥吐納以生正氣我有神符使其佩服合免斯難兼有祕咒每日能齋而誦之神將日夜護衛瘟毒百神皆知其為太上弟子畏而敬之誦至百遍百鬼頭破腦裂而散咒曰唵㫊音訥暮祇混𭉾音馬𭌆音呂𤙖音歆九天高明大使神功妙濟真君驅瘟遣瘟消災真符二十字作一句讀書符以朱書黃素左手五雷訣右手舉筆咒曰洞天赤文丹靈耀虛驅瘟攝毒奉命天書金録玉簡嵬鬼悉驅太上有敕元君安居急急如太虛紫清律令敕送瘟疫時災吉凶詩甲子送神神便去乙丑若送損人凶癸巳送神病不愈甲午損人不須詳丙寅宜向南方送送瘟之後主興隆乙未丙申並丁酉此三日送仍還鄉丁卯戊辰送必凶己巳南方千里通戊戌己亥主半去庚子辛丑西不歸庚午辛未傷人命壬申癸酉不回蹤壬寅送神神不去癸卯亦吉永無危甲戌須教大難當乙亥丙子送西方甲辰乙巳三口虧丙午丁未南行利丁丑戊寅千里外己卯直去不回房戊申送神神又轉己酉庚戌去無疑庚辰辛巳送大吉壬午癸未送西安辛亥壬子並癸丑甲寅乙卯病依舊甲申乙酉與丙戌送瘟去後不回還丙辰丁巳不回還戊午送來病相守丁亥送神仍舊病戊子己丑宜西行己未送瘟損人口莫用庚申並辛酉庚寅辛卯壬辰日送瘟反見不安寧壬戌癸亥總不宜仙人口訣當遵守凡感瘟疫之家按花甲宜送之日有方向者照方向用香楮送之無方向者隨便送之大吉善後瘟疫愈後調養之方往往不講而抑知此乃後一段工夫所關甚巨也即如過飽者曰食復腦怒者曰氣復疲於筋力者曰勞復傷於色欲者曰女勞復載在經書世皆知之尚有時而觸犯此外人所最易忽者猶有三焉不在諸復之條者也雖已愈多日而氣血苟不充足犯之隨有釀成終身之患者焉一曰淫欲凡人房事必撮周身之精華以泄氣血未充七日未能來復欲事頻數勢必積損成勞尫羸損壽一曰勞頓或遠行或作苦疲弊筋力當時不覺將來肢體解㑊未老先衰其苦有莫可名言者一曰忍飢愈後凡有覺餓必得稍食萬毋強耐過時反不欲食強食亦不能化是飢時既傷於前強食又傷於後中州敗而肺金損則勞嗽脾胃之病成矣三者人多忽之故不可不謹瘟疫六經治法太陽經頭痛熱渴太陽以寒水主令手太陽以丙火而化氣於寒水陰勝則壬水司氣而化寒陽勝則丙火違令而化熱故太陽以寒水之經而易於病熱冬不藏精相火升泄傷其寒水閉蟄之氣火旺水虧已久及春夏感病衛閉營郁寒水愈虧故受病即發熱作渴而不惡寒也太陽在六經之表是以感則先病其經自頭下項行身之背故頭項痛而腰脊強肺主衛肝主營而總統於太陽太陽之經在皮毛之部營衛者皆皮毛之所統轄瘟病衛閉而營郁法當清營熱而泄衛閉治宜涼金補水而開皮毛元霜丹主之元霜丹治太陽頭項痛腰脊強發熱作渴浮萍三錢麥冬二錢去心元參二錢丹皮二錢酒洗芍藥一錢甘草一錢生薑三錢切大棗二枚劈水煎熱服覆衣取少汗一方去元參麥冬治同身痛脈緊煩躁無汗瘟疫在太陽脈浮頭痛發熱汗出以風強而氣不能閉也若脈浮而緊發熱惡寒身痛腰疼煩躁無汗而喘促者是寒束而邪不能泄也蓋瘟疫有汗寒疫無汗以風性疏泄而寒性閉藏衛陽過閉邪不能泄營郁莫達則煩躁喘促與傷寒同治宜以浮萍黃芩清散經絡之熱也浮萍黃芩湯浮萍三錢黃芩一錢杏仁二錢泡去皮尖甘草二錢炙生薑三錢大棗二枚劈流水煎大半杯溫服覆衣煩熱燥渴煩熱燥渴與前發熱作渴不同故用白虎而不用元霜矣病在太陽經未入陽明之腑不至遽生煩渴若陽明燥盛之人經熱外遏燥氣內應則見煩渴陽明從燥金化氣腑燥發作故有燥熱便難之症今腑燥未作胸燥先動是以煩渴生焉其太陽表症未解宜浮萍石膏湯清金而解表絶其燥熱入腑之源表症已解第以白虎加元麥湯清燥生津氣虛者加人參以益氣因表解而陽虛恐燥去而陽亡也白虎加元麥湯治太陽經罷煩熱燥渴石膏三錢煅知母一錢甘草一錢粳米一撮元參二錢麥冬三錢去心流水煎至米熟取大半杯熱服人參白虎加元麥湯治太陽經罷氣虛煩渴石膏三錢煅知母錢半酒炒炙草一錢粳米一撮人參一錢元參二錢麥冬三錢去心流水煎至米熟取大半杯熱服陽明經目痛鼻乾陽明以燥金主令足陽明以戊土而化氣於燥金太陰勝則陽明化氣而為濕陽明勝則太陰化氣而為燥故陽明之經易於病燥冬水失藏相火升胃津稿脾精亦亡太陰之濕久化陽明之燥春夏感病衛陽遏閉營熱鬱發土焦金燔燥氣愈盛其經挾鼻絡目行身之前故目痛鼻乾而身熱不臥陽莫勝於陽明燥熱在經不得泄越遲則胃腑積熱臟陰漸枯便伏異日危機於其腑熱未動之時涼泄經絡以清其熱則後患絶矣素雪丹主之素雪丹治陽明身熱目痛鼻乾不臥胸煩口渴浮萍三錢石膏三錢研麥冬二錢去心元參二錢葛根二錢丹皮二錢酒洗白芍一錢生薑三錢甘草一錢流水三杯粳米一撮煎大半杯去渣熱服覆衣取少汗嘔者加製半夏二錢瘟病方傳陽明之經腑熱未作法宜清熱而發表熱甚者必傷肺氣當用人參白虎湯清金泄熱益氣生津乃為妙善人參白虎湯見前目痛鼻乾嘔吐泄利三陽之經陽明為盛足陽明從燥金化氣太陽表邪不解經熱內傳火性就燥必入陽明陰盛於裡而陽盛於表腑燥未作經燥先動膽木逆行而賊胃土胃氣壅遏不能容受故嘔吐而泄利緣經邪郁迫其腑氣故也浮萍葛根湯治陽明經證目痛鼻乾煩渴不臥浮萍三錢葛根二錢石膏二錢煅元參二錢甘草一錢生薑三錢流水煎大半杯熱服浮萍葛根芍藥湯治陽明經泄瀉浮萍三錢葛根三錢石膏一錢煅元參二錢甘草一錢芍藥二錢流水煎大半杯熱服浮萍葛根半夏湯治陽明經嘔吐浮萍三錢葛根二錢石膏二錢元參一錢芍藥一錢生薑三錢半夏二錢制甘草五分流水煎大半杯熱服陽明腑證汗出潮熱譫語腹滿便祕病傳陽明經不得汗解腑陽素旺之人以經熱鬱蒸而腑熱內作開其皮毛則見大汗淋漓第汗愈泄而土愈焦燥愈增而熱愈盛每申酉之交應時發熱如潮汐不爽是謂潮熱燥土消爍心液故譫語燥矢壅遏腑氣故滿痛遲則臟陰耗亡營氣鬱陷生死攸關不可不急下也泄以大小承氣而加養陰涼血之味臟陰續復營郁外達矣調胃承氣加芍藥地黃湯大黃二錢甘草一錢芒硝一錢芍藥二錢生地五錢流水煎一杯去渣入芒硝火化溫服小承氣加芍藥地黃湯大黃二錢厚朴錢半炒枳實一錢炒芍藥二錢生地六錢流水煎一杯溫服大承氣加芍藥地黃湯大黃二錢芒硝一錢厚朴錢半炒枳實一錢麩炒芍藥二錢生地六錢流水煎一杯去渣入芒硝火化溫服不下再服少陽經脅痛耳聾少陽經以相火主令足少陽以甲木而化氣於相火須則下蟄而溫腎水逆則上炎而刑肺金故少陽經最易病火瘟病寒水失藏相火炎蒸已旺於衰廢之時春夏感病衛閉營郁熱盛火發勢當得令之候愈極重赫彼少陽傷寒二陽在表三陰在裡陽盛則熱陰盛則寒少陽居表裡之半是以往來寒熱至於瘟病三陰經氣從陽化熱故但熱而無寒也其經自頭下項絡耳循脅行身之側故胸脅痛而耳聾火曰炎上炎上作苦故咽乾而口苦相火內郁則刑肺金甲木內郁則克胃土外無泄路勢必焦土流金而入陽明當以清涼和解之法散其炎烈紅雨丹主之紅雨丹治少陽胸脅疼耳聾口苦咽乾柴胡二錢黃芩一錢芍藥一錢甘草一錢丹皮一錢元參錢半生薑二錢流水煎大半杯熱服覆衣取微汗三陽經絡皆受其病而未入於腑者法應汗之但瘟病與傷寒傷風寒暄異氣不宜麻桂辛溫滋以清潤之劑涼泄經絡燥熱方是瘟病汗法其傷在衛氣而病在營血營郁發熱故用丹皮芍藥泄熱而涼營也目眩耳聾口苦咽乾胸痛脅痞嘔吐泄利瘟疫陽明經熱不解則入少陽之經少陽在二陽之裡三陰之表陰盛則傳太陰之臟陽盛則傳陽明之腑少陽者入腑入臟之門戶瘟疫營鬱熱盛火旺木枯故但傳胃腑而鮮入脾臟傳胃則木邪逼土腑氣鬱遏而生吐利是宜清散經邪杜其入腑之路也小柴胡加花粉芍藥湯治少陽經目眩耳聾口苦咽乾胸痛柴胡三錢黃芩二錢半夏錢半制甘草一錢生薑二錢芍藥二錢天花粉二錢流水煎大半杯熱服覆衣取微汗大柴胡加元參地黃湯治少陽經傳陽明胃腑嘔吐泄利柴胡三錢黃芩一錢半夏二錢制芍藥二錢枳實一錢麩炒大黃二錢生薑二錢大棗二枚劈元參一錢生地二錢流水煎大半杯溫服三陽傳胃瘟病經熱不解外泄無路斷無但在經絡不傳胃腑之理此自然之層次則宜用攻泄蓋胃土燥熱必爍臟陰其肺脾肝腎精液久為相火煎熬益以燥熱燔蒸臟陰必至枯竭是當滋其臟陰泄其腑熱勿令陽亢而陰亡也白英丹主之白英丹治陽明腑病譫語腹滿潮熱作渴大黃三錢芒硝一錢炙草一錢枳實一錢炒厚朴錢半薑汁炒元參二錢麥冬四錢去心丹皮二錢芍藥二錢生地三錢流水煎大半杯熱服陽明戊土位居三陽之長陽盛之極必皆歸宿陽明而入胃腑瘟疫三陰臟病悉以胃熱為之根本雖曰五臟六腑皆受病而陽明胃腑實其綱領也其裡熱發作不拘在何臟腑總以泄胃為主而兼清本部但腸胃未至燥結則第滋臟陰不須承氣即燥結未甚亦當俟之經盡之後腑邪內實始用泄熱滋陰之法一下而清矣若燥熱隆盛則不拘日數俱可泄下是當用傷寒急下之法不可循傷寒緩攻之條以其內熱鬱伏原與傷寒不同也三陽傳胃發斑瘟疫三陽經病營鬱熱盛勢必內傳胃腑胃陽素旺燥熱感發經腑同氣表裡俱病腑熱內逼而臟陰消爍過經不解則危瘟疫所最忌者營熱不能外泄蓋以衛盛而營衰脾陰虛而胃陽旺也若脾陰不衰胃陽不旺六經既遍邪欲內傳而臟氣扞格外御經邪熱無內陷之隙則蒸泄皮毛發為斑點而病輕矣若一入胃腑腑陽日盛則臟陰日枯不得不用泄法緩則泄於經盡之後急則泄於經盡之前腑熱一清則經熱外達而紅斑發矣太陰經腹滿嗌乾太陰以濕土主令手太陰以辛金而化氣於濕土陽明盛則太陰化氣而為燥太陰盛則陽明化氣而為濕故百病之在太陰皆是濕而惟溫病之在太陰則化濕為燥以其冬水失藏相火泄而脾陰爍春夏感病營鬱熱旺濕氣自當愈耗其經自足走胸行身之前布胃絡嗌故病傳太陰則腹滿而嗌乾太陰之濕奪於陽明之燥燥亢濕枯必死是宜清散皮毛泄陽明之燥而滋太陰之濕也黃酥丹主之黃酥丹治太陰腹滿嗌乾發熱作渴浮萍三錢生地四錢炙草一錢丹皮二錢酒洗芍藥二錢生薑三錢流水煎大半杯熱服一方去芍藥加棗名浮萍地黃湯治同少陰經乾燥發渴少陰以君火主令足少陰以癸水而化氣於君火陽盛則丁火司權而化熱陰盛則癸水違令而生寒故百病之在少陰多是寒而惟溫病之在少陰則化寒為熱以其冬不藏精水虧火泄春夏感病更值火旺水虛之候其經貫腎絡肺而系舌本故口燥舌乾而渴腎者主水人身水火對列水枯而火亢則人亡矣是宜清散皮毛泄君火之亢而益腎水之枯也紫玉丹主之紫玉丹治少陰口燥舌乾發熱作渴浮萍三錢生地四錢知母二錢酒洗元參三錢炙草一錢天冬二錢去心生薑三錢流水煎大半杯熱服覆衣一方加丹皮花粉去知母甘草名浮萍天冬湯治同厥陰經煩滿囊縮厥陰以風木主令手厥陰以相火而化氣於風木治則木達而化溫病則火鬱而生熱以厥陰乙木原胎丁火故厥陰之經最易病熱瘟病衛閉而遏營血營郁是以發熱而營藏於肝方隆冬火泄營血已傷騰沸春夏感病衛閉營遏血熱更劇其經自足走胸行身之側循陰器而絡於肝故煩滿而囊縮手厥陰之火扇以足厥陰之風風烈火炎煎迫營血枯稿命殞是宜清散皮毛泄相火之炎而滋風木之燥也蒼霖丹主之蒼霖丹治厥陰煩滿囊縮發熱作渴浮萍二錢生地四錢芍藥二錢當歸二錢酒洗丹皮二錢甘草錢五生薑二錢流水煎大半杯熱服覆衣取汗厥陰發斑瘟病傳至厥陰邪熱斯甚若木榮血暢經臟潤澤營熱不能內傳六經既遍別無出路則鬱極外發而見紅斑若營虛不能透發過時斑見而色帶紫黑營血敗傷多至不救是宜解表涼血使其營熱發達亦蒼霖丹主之吳又可用達原飲治瘟疫善矣但瘟之愈終由汗解往往有下後而仍自解以汗者是瘟疫之需汗也恐急矣因思能發瘟疫之汗者莫過於浮萍其性涼散入肺經達皮膚發汗甚於麻黃本草載之詳矣間嘗以之治瘟疫輒效後又質諸北海老醫黃玉楸頗與余意合用之數年歷有成效始敢筆之於書並添三陰經治法以補又可之所未及第醫者意也茲不過規矩焉已耳但有是方未必有是病神而明之則又在存乎其人矣瘟症雜症治略蓋聞粗舉其凡曰略瘟疫中雜症亦復不少而略之可乎是蓋有説焉吳又可瘟疫論中已言者不載傷寒雜症門中治法可以裁取通融者不載未曾經驗與抄襲他人者不載除此四者雖欲不略而不能矣蓋未敢師心也無庸多贅也若諱言略而詳之是為畫蛇添足衄血衄血症治多端傷寒書中亦詳哉其言之矣瘟疫衄血治法凡可以取用傷寒門者皆不採入茲第論汗散一條仲景治太陽風寒在表而致衄者用麻桂以汗之然又論曰衄家不可發汗二者似乎相反而海藏解之則謂衄家不可發汗者蓋為脈微也若脈不微而浮緊浮緩者又當發散之矣蓋衄家之發散散其經中之邪使不得壅盛於經迫而妄行是麻桂原非止衄之藥而其邪得散則不治衄而衄自止矣至於瘟邪在表而致衄者不唯麻桂不可服即蘇芷防風亦無所可用羌柴性升衄時似亦不宜惟服緑糖飲見前往往取效或加鮮薑數片紅棗數枚去核更妙蓋緑豆清涼而非苦寒之品洋糖發散而無升舉之虞再加薑棗以調和營衛而表豈有不解者哉且散而不升而亦豈有稍防於衄者哉或服不即汗於煮豆時再加浮萍二三錢吐血衄出於肺行清道吐出於胃行濁道衄血之熱在經主表吐血之熱在腑主裡血之存於胃中者為守營之血守而不走諸陽受熱當汗不汗熱毒深入於中其血為火所逼而上逆隨從肺竅出於咽而為吐矣亦有蓄血上焦而吐者瘟疫患此始終一於為熱實者犀角地黃湯稍虛者黃芩芍藥等湯加減出入便可奏效仲景治壞病篇麻黃升麻湯雖治陰陽錯雜之唾血但不善用之反致害事至金匱之升麻鱉甲湯雖李彣云此方治疫癘時症但亦用升麻似非吐血者所宜愚意凡吐衄等症藥性之升者總在所禁也蓄血血症應分為三等衄唾吐嘔為上部血結胸為中部蓄血下焦為下部夫血何以能蓄也吳氏曰病在太陽當汗不汗則瘀血在裡必血結也活人云失汗而熱蓄在裡熱化為血其人善忘而如狂血上逆則善忘血下蓄則內急吳又可曰瘟疫失下邪熱久羈不泄血為熱搏留於經絡敗為紫血溢於腸胃腐為黑血便色如漆大便反易合此三説而蓄血之義始盡蓋病在太陽失汗熱蘊於中血為熱所摶始流經絡繼溢腸胃則當下矣斯時又失於下邪熱久羈不泄瘀於下焦故少腹鞕滿急脹皮見青紫筋則蓄血之症成矣其見症則有喜忘如狂發狂小便自利大便色黑譫妄燥渴脈沉實結皆蓄血之候醫者診視便當揣其少腹鞕滿而痛即問其小便若小便不利是津液留結可利小便此層倍若小便自利者即是蓄血矣若太陽病有熱結膀胱太陽本經而如狂者症之輕者也宜桃仁承氣湯此層又倍若陽明病有蓄血而喜忘者病之甚者也抵當湯難用可代以承氣之類加桃仁紅花歸尾等破血之物或兼虛者以玉燭散之類下之則蓄血去而病痊矣上所言者道其常也余有一孫名河方十四五歲感瘟疫二十餘日不解診其脈空虛而弱不任尋按亦並無喜忘如狂等症但終日昏睡不清醒按其腹雖覺微痛亦無鞕滿急脹等候醫有議補者餘力持其不可伊時余方料理兒病未暇及孫亦未服藥靜候數日突欲大便隨下紫血數斗頓然清醒此時方知其為蓄血若當時一用補劑則立斃矣足見治瘟疫者只知其常而不知其變猶作文看書之死於句下也可不慎哉筆之以俟高明者斑疹斑疹二字非以色言以形言也故發斑有紅紫黑色之殊而皆以斑名點與皮平絶不高起其曰蚊迹者狀紅斑之成點者也曰錦紋者狀紅斑之成片者也疹則其形高出皮膚之上大者若北方之高糧米小者若小米亦有紅紫二色而黑者殊少較之發斑稍輕又有白疹發於衛分形如莧種色白破之中有清水凡發此者最吉是邪從疹散也斑疹形色已盡於斯先以斑論總因邪毒不解留於血分所致如當汗不汗則表邪不解當下不下則里邪不解下之早則邪陷不解當清不清則火盛不解當補不補則無力不解瘟疫少見或陽症而誤溫補則陽亢不解陰症而誤寒涼則陰凝不解瘟疫無此不解則直入陰分鬱而成熱以致液涸血枯而發乃營衛俱劇之症凡汗下溫清俱不解及足冷耳聾煩悶咳嘔者便是發斑之候鮮紅者吉紫者五死一生黑則十死一生並忌稠密成片凡斑既出脈洪數有力身溫足暖者易治脈沉小足冷元氣弱者難治凡已出未出時切忌妄投寒劑並忌飲冷恐傷胃氣作嘔吐又忌香臭薰觸又不可妄發汗妄攻下虛其表裡之氣其害尤甚若脈弱者或先有房事要在審問之凡治瘟斑必細審人之虛實症之表裡脈之有神無神為要吳又可發斑條只有下之一法奚足以盡其變哉成氏言發斑者戒發汗而張景嶽則以邪自外入者仍自內出凡脈數無汗表症俱在者必須仍從汗解以犀角地黃湯為治斑要藥而以成氏不可汗之説為非愚意成氏之所謂不可汗者指麻桂紫蘇而言非指犀角地黃湯也發黃瘟疫發黃惟陽明與太陰兩經有之黃者土之正色二經俱屬土故發黃蓋外不能汗內不得小便脾胃之土為熱所蒸如合曲然故發外為黃若小便利則熱不內蓄故不能變黃其有別經發黃者亦由脾胃之土受邪也但黃色不一寒濕之黃身如薰黃色暗而不明熱盛之黃如橘色黃柏而明汗出染衣此其辨也而其致黃之由亦不一有蓄血在下焦發黃者有濕熱鬱積於內發黃者有因寒濕發黃者有因下之太過變成陰黃者有不因下而太陰經中去聲濕之陰黃者惟瘟疫之黃止濕熱蓄血兩條瘀熱發黃脈浮滑堅數其症則頭汗際頸而還腹微滿小便不利而渴者是也瘀血發黃脈微而沉或結其人如狂小腹急結鞕滿小便自利大便黑者是也至於發黃而體如薰直視搖頭鼻出冷氣環口黧黑皆不治斑黃併發凡傷寒瘟疫變現諸症相兼者多惟斑黃二症少見同時而發者從兄秉欽病發黃旋即發斑余往診視甚覺駭異以其素虛隨用托裡舉斑湯茵陳五苓散二方中採擇加減服之斑黃並治冀可奏效服一劑次早戰汗後斑黃並退其病豁然隨名其方曰斑黃雙解散茲録於下以備採擇因擴而充之或斑甚而黃輕者則以治斑為重而以治黃為輕或黃甚而斑輕者則以治黃為重而以治斑為輕又或有先斑而後黃者有先黃而後斑者有發黃而兼發疹者斑黃之症不一巧妙之治各殊參伍以盡其變錯綜以盡其神左右逢源是在業醫者因時以制宜耳斑黃雙解散自定新方茵陳豬苓茯苓澤瀉鹽水洗焙炒梔生地甘草白芍當歸酒洗善怒凡病人恆多焦躁此其常也惟瘟疫之怒與凡病之焦躁不同其症或因人語言之稍有拂逆或細事之偶然不諧在平時可以嬉笑處之而茲則入耳便怒不可解心中暗惱不休至昏憒時返將所怒之事從譫語説出而弗自覺也又或有靡所觸忤偶憶往事可惱者亦時時發怒能令心腹鬱悶脹塞與懊憹相似而實不同蓋懊憹方書中解之謂鬱郁然不舒憒憒然無奈比之煩悶而甚者是也系下後之症且無所忤而自生者茲善怒則不論曾否汗下日日如斯甚有瘟病已愈而此症仍在者必俟能起坐如平時方止將謂此症不由肝膽而肝膽實司怒之經將謂其怒盡由肝膽而肝膽不任其疚何者肝膽之瘟邪退而其怒仍在也惟投以理氣之劑而鬱悶稍舒然雖舒或有所觸而其病復發矣有似於陽厥而又非也書言陽厥怒病發狂者因陽氣暴折而難決故善怒病名陽厥蓋陽氣暴折故鬱而多怒治以鐵落飲加辰砂少許取金能生水之意且鐵性沉重最能墜熱開結云云夫曰陽厥者必有四肢厥逆之症方可以厥名曰怒病發狂者是狂而不僅於怒矣而茲則不厥不狂心中暗惱而不自禁也因名之曰善怒雖心腹鬱結難支然未見有以此殞命者惟專治其瘟瘟愈而怒自已矣或投以鐵落飲視其兼症而加減出入之庶可奏效也狂狂之為病有三而陰症不與焉經曰重陽則狂又曰邪入於陽則狂諸經之狂總陽盛也一曰發狂蓋陽明多氣多血陽邪入胃腑熱結不解因而發狂其症則妄起行妄笑語登高而歌棄衣而走逾垣上屋呼號罵詈不避親疏數日不食皆因陽明邪熱上乘心肺故令神志昏亂如此是為邪熱已極非峻逐火邪不能自已故但察其面赤咽痛潮熱噎氣五心煩熱唇腫口噦發黃脈實形如醉人大便鞕結或腹滿而堅有可攻等症則宜以大承氣六一順氣等湯涼膈散消息出入下之再甚則為陽毒斟酌施治如無脹滿實堅等症而惟胃火致然則但以白虎湯抽薪飲等泄去火邪自愈一曰如狂或當汗不汗或覆蓋不周而不汗太陽之邪無從而出故隨經入腑小腹鞕滿小便自利下焦蓄血經所謂熱結膀胱其人如狂是特如狂而未至於狂耳宜桃仁承氣下之則愈一曰火邪驚狂其或薰尉迫汗灼艾燒針等治不如法令人煩躁起臥不安是也此傷寒中事瘟疫門原無薰灼治法故無此變症至於狂亂而兼小便自遺直視汗出輒復熱不能食舌卷囊縮皆難治抽薪飲黃芩石斛木通炒梔黃柏枳殼麩炒澤瀉鹽水炒甘草水煎冷服熱在經絡者加連翹花粉在血分大小腸者加槐花黃連在陽明頭面或煩躁便實者加石膏在下焦加膽草車前在陰分津液少者加二冬生地白芍便結加硝黃循衣摸床瘟疫而至循摸勢亦危矣而治之得法亦有生者其一由陽明裡熱之極者蓋陽明胃也肝有邪熱而移於胃故現此症胃主四肢而風木乃動搖之象是循摸乃肝與胃腑邪熱所致也脈滑者生澀者死如有下症宜用承氣等湯其一由用火劫汗而然者小便利者生不利者死利則肺氣猶降膀胱猶能化氣而腎水未枯也余曾見一人患瘟疫不時循摸詢之謂曾用火罐將胃口亂拔冀其作汗變現此症遂用寒涼和解之藥而愈蓋未現下症第因火劫所致清之即愈亦有不因火劫不因吐下後而有是症者總宜清涼和解傷寒書中亦有指循摸為虛極而用微補峻補者瘟疫未曾經過譫語讝語傷寒譫語讝語解者紛紛考其字義譫語者不論寤寐亂言獨語如見鬼狀因胃熱上乘於心心為熱冒則神識昏亂錯妄如此俗謂之説糊話者是也熱之輕者也甚則狂語不休罵詈喊叫昏不識人而熱則深矣讝語者乃合目自言寤而自止較之譫語則更輕矣此譫讝二字之分也譫語向入陽明門以余之所閲歷三陽皆有而陽明居多耳亦有初得病而即譫語者更兼昏不識人及不能食其病必重若無此症或睡則讝語而寤則清醒或寤時偶為讝語而有時止歇其病則輕矣譫讝之由又自不同有邪在表者有邪入里者有邪在半表半裡者有表虛里實者有汗後者有下後者有蓄血者有燥屎者有邪入心經者有合病並病者有過經者有亡陽者當察其兼症與脈與色與聲與人之虛實始得其病情也此專講邪熱之症亦間有汗下後用補者而陰寒不在此例也脈和易愈短則死身微熱脈浮大洪者生逆冷脈沉微弱細急者死或氣上逆而喘滿或氣下奪而自利皆為逆候二便不通二便雖出於二腸莫非皆腎之開竅也有因熱結大小腸以致津液不行熱無以泄者由此而譫妄發狂發黃發斑等症隨焉宜苦寒下之有因過汗亡陰熱耗津液以致小便祕澀而大便燥結者宜潤劑通之若止小便閉者行大便則小便通徒利小便無益再者瘟疫利小水冀邪熱由之而泄但利之太過反致大便燥結者有之不可不知休息瀉自古痢以休息名罕聞瀉而休息者也有之自余閲歷始此則不繫之以瘟而系之以疫矣蓋因發時無少長皆同也其病自長夏至秋皆有且有自夏徂秋而不愈者始終並無瘟疫表裡等症有兼脹者有不脹者食則不減而最惡飲水意其為濕也而其時甚旱經歲不雨不知濕從何來瀉時日數十行不治終不遽止長夏炎熱爍石流金投以健脾溫補之藥始痊閲數日而復作矣間或痊可再閲數日而又作矣纏綿不已有至數月者詢其復作之由半因吃生冷與飽食所致戒以只食七八分飽服藥月餘則不復作患此絶少不起者然病體支離莫可當矣下利即泄瀉瘟疫而見下利病亦不輕矣大抵屬寒者三熱者七濕則其僅見者也而吳又可瘟疫論中協熱下利等説單以熱論不亦偏乎第瘟病下利之屬寒者輕淺自不得與冬月感寒與直中陰經者同日而語也其屬寒者有三一則感原無大熱之瘟病而過用涼藥因致瘟不除而瀉又作此時宜舍病治藥只得先溫其里里溫瀉止而瘟病不除也再解其表瘟病原無汗法斯時仍用和解疏利視其邪在某經細心施治治之而邪仍不解必其先此下利時有傷元氣陰虧營枯不能作汗此時又宜平補滋陰用熟地當歸白芍炙草再佐以白朮山藥蓮肉氣滯者加陳皮有寒者加煨薑不寐者加製半夏茯神嘔惡者加藿香調理施治則自然汗解而愈矣或見其大便不實恐下利復作於前藥中再重用茯苓制首烏白扁豆等藥消息施治無不獲效一則因大下後而泄瀉者亦因元氣虧損氣血傷敗或宜健脾或宜補腎或宜補氣血或宜淡滲或宜固澀視其病之輕重人之虛實而調治之一則有不因服涼藥與攻下而自利者或因歲氣之偏時氣之戾司天在泉之殊致飢饉旱潦之觸忤感而成病初覺亦頭痛身痛身熱發熱自汗微惡寒繼則突然泄瀉卻無譫語鄭聲昏冒舌苔燥渴斑黃等症其脈既不洪數亦不細微投以達原飲而利益甚投以元霜素雪等丹而利不除此症原無大熱乃瘟疫中之變局問其渴則惡飲水視其舌並無黃苔知其非熱利無疑總以健脾補腎為主而以利水佐之此之補腎卻不用熟地又恐其滑腸尤忌當歸惟用大首烏菟絲山藥茯苓白朮蒼朮白扁豆人參陳皮炙草等藥消息施治此時反以下利為本而瘟疫為標蓋泄瀉不止則元氣日虧表邪益不能解若下利止縱有表邪再於補藥中帶和解施治況經此大泄瘟邪亦不能逗留矣再者下利雖有表症不可發汗恐走津液而胃益虛必成脹滿當先治利利止內實正氣復邪自解得微汗而愈蓋下利為內虛若發其汗則內外皆虛變症出矣仲景傷寒論三陽合病皆能自利有發表和解攻裡之殊瘟病原無發表之説至於攻裡則用涼藥夫涼所以除熱也則試言下利之屬熱者熱下利必有兼症或有口苦咽乾唇焦舌燥譫語煩渴尿赤目赤潮熱等症則或用寒涼或用攻下通因通用在在所必施總之下利不過寒熱兩端視其兼症皎若列眉其因於寒者口無燥渴甚則惡飲水惡寒小便清白臍下多寒身雖熱手足逆冷此症寒熱皆有糞色白或淡黃完穀不化有如鶩溏澄徹清冷腥臭脈不洪硬且無力至於蜷臥閉目向壁臥引衣自蓋出言微細不欲見明面如刀刮等症則系冬月嚴寒直中陰經之候瘟疫下利雖寒亦無此矣其因於熱者發熱煩躁欲飲水口燥渴小便黃赤寒症亦有更兼澀而不利寒症則無臍下熱泄出作聲所下如垢膩奇臭其色青黃赤醬色黑色後重得涼藥則止得熱藥則增其脈則洪數浮滑弦大盛強以此辨寒熱萬不失一治各不同醫者宜審頭汗頭汗總為邪熱上壅而陽氣內脫者間或有之頭為諸陽之會三陰經不上頭故無頭汗所以頭汗屬陽經凡遍身有汗謂之熱越若熱不得越而上蒸陽分陽氣上衝津液上湊故但頭汗出也其兼症如太陽之熱結在裡陽明之被火劫與邪在半表半裡之往來寒熱及熱入血室與虛煩水結胸發黃蓄血等症俱是熱不得越治法或散或和解或清或下除其邪而病自愈至氣脫頭汗則多以妄下傷陰或克伐太過或泄瀉不止以致陰竭於下陽脫於上小水不通而上見頭汗則大危矣活人以頭汗出者慎下而張景嶽治頭汗條有用承氣者始閲之疑其相背細看始知其皆是也活人之慎下指五臟乾枯胞中空虛津液少者而言景嶽則以便結腹脹痛而頭汗者宜承氣以下之也視頭汗之兼症而下與否殊施耳至於有表邪脈緊數而頭汗當散者宜小柴胡及諸柴胡飲見景嶽全書新方散陳中有火邪脈洪滑內多煩熱而頭汗當清者宜白虎湯益元散之類此治頭汗之大概也盜汗睡則衛氣行於里內有伏熱其在表之陽氣不密故津液得泄熱蒸於外腠理開而盜汗出醒則氣行於表而盜汗止矣雜病盜汗責在陰虛瘟疫盜汗總邪在三陽所致三陽經俱有盜汗而邪在半表半裡者居多故總以和解為治觀仲景論三陽合病之盜汗而歸重於但欲眠睡熱在膽經可知矣小柴胡湯主之自汗衛氣護衛皮毛禁固津液不得妄泄邪氣干之則不能固衛於外由是津液妄泄而自汗出焉瘟疫之自汗與他症異多有感而即患自汗者則自汗竟屬瘟疫中常事較之頭汗盜汗等反輕矣當專治瘟邪邪退而汗自止但亦有表裡虛實之異有邪在經而汗在皮毛者非真汗也有汗後邪雖稍減猶未盡痊者又未可因汗而謂其必無表邪也須因脈症而詳察之其在表者當於達原飲中加三陽經表藥以疏利和解之在裡者下之瀉之清之至於雜症亦多有自汗者各有本門茲不贅汗下後虛極表邪盡去而自汗者方可用補稍有表邪輒誤補則大害無聲方書多將失音與不能言合為一症豈知失音者舌仍能轉運而喉中則寂然無聲也不能言者或舌強不能轉運或喉中格格難出而其聲自在也余以無聲解之自難與不能言者混呼矣瘟病無聲十不救一所謂熱病喑啞不言三四日不得汗出者死也此症總由瘟邪入臟熱氣衝塞燔灼所致然析之仍有數條有因邪熱衝心心氣耗損而然者宜清心降火用生地麥冬川貝花粉連翹竹瀝天竹黃竹葉黃連犀角之屬有因火爍肺金不能宣布者宜清肺降火用黃芩川貝牛子梔子柿霜之屬有因熱痰壅塞而氣閉者宜清痰降火清痰則川貝蔞仁膽星之屬降火則診視其火在何經擇用本經涼藥並加入本經化痰之品而兼用枳殼陳皮橘紅佛手等理氣之劑有因失於解散邪伏肺中者當解散之蓋肺形如鍾懸而叩之則鳴倘臥鍾而實以泥土斷無鳴理肺之窒塞亦猶是也邪窒既散則空靈而響發矣宜前胡防風水萍蘇葉桑白皮陳皮淡豉生薑蔥白之屬此症系失音之輕者此皆失音之類也至於不能言亦有數條有因風熱壅盛咳嗽聲啞者以消風降痰之劑治之用前胡防風陳皮兜鈴薑蔥之屬此症之最輕者又有太陽發汗已身猶灼熱名風溫脈寸尺俱浮自汗身重多眠鼻塞語言難出宜葳蕤湯又有狐惑症唇上生瘡咽乾聲啞者又有少陰症咽中生瘡者又痙症口噤不能言者當於傷寒與雜症門中求之是皆不能言之類也又經曰人之猝有憂恚而言無音者何道之故曰會厭者音聲之戶也會厭乃氣喉之蔽以掩飲食使不錯入氣喉寒氣客於厭則厭不能發發不能下至其開闔不致故無音云云此又以寒客經絡而致不語者熱邪流入經絡亦或有此理然不經見姑筆之以俟高明者二瀝湯竹瀝荊瀝梨汁如無梨汁即以西瓜汁代之如無荊瀝止用竹瀝亦可等分和勻病急不拘時服此治瘥後失音者未瘥前服之總效囊縮囊縮為足厥陰肝經受病因熱極筋枯而燥縮也再看其大小便結發熱引飲者急用大承氣下之若無下症而脈浮者宜汗緩者宜和六七日脈微浮微緩是有胃氣胃不受邪將作寒熱則大汗解矣陰症而囊縮者不在此例結胸吳又可瘟疫論中止有胸脅腹滿一症而抑知結胸痞氣瘟疫中皆有之且不因誤下而成者更多也論曰太陽病表未解醫反下之膈內拒痛心下因鞕則為結胸又曰從心下至少腹鞕滿而痛不可近為結胸皆大陷胸湯主之夫曰膈內拒痛是胸脅間事曰心下鞕則兼胃之上脘而言也曰從心下至少腹則又兼滿腹而言矣蓋表邪傳裡必先胸以至心腹耳第大結胸最重小結胸次之痞氣則又其次也經又曰病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞而成氏釋曰發熱惡寒發於陽無熱惡寒發於陰夫無熱惡寒似指寒邪直中陰經之症隨來陶張二氏之駁駁之誠是也而陰陽二字總未得真解故有謂傷風屬陽而傷寒屬陰者有謂在表屬陽在裡屬陰者紛紛聚訟隨成千古之疑團愚意以為何必盡推敲陰陽二字於間處錯意不論大小結胸以及痞氣支結皆屬於郁鬱而未有不結者總以開鬱為主而痞結自散矣又當審其兼症診其脈理氣鬱者順之調之血鬱者行之破之痰鬱者化之吐之表郁者散之和之里郁者攻之下之熱鬱者清之寒鬱者溫之瘟疫無寒或過服寒涼藥或汗下後食鬱者消之水鬱者利之而治痞結之能事盡矣至於仲景用大陷胸湯治誤下之結胸想古人所秉者厚故誤下而復用陷胸不至為害至陶氏則心知其未穩故有上焦乃清道至高之分過下則傷元氣之論然尚未敢深駁惟張景嶽則云傷寒本病有不因誤下而實邪傳裡心下鞕滿痛連少腹而不可近者此大陷胸湯所宜也至於太陽少陽表邪未解因下早而成結胸者若再用大陷胸是既因誤下而復下之可乎不若以痞滿門諸法酌輕重而從雙解或用蔥尉法以解散胸中實邪此余屢用而屢效等語雖大翻仲景之案然明白洞達有至理存焉真長沙之功臣結胸之寶筏最穩最捷者也且外尉法不特治結胸為然遇瘟疫用藥弗效俟六七日應汗不汗之期覺心腹稍有痞悶疼痛用蔥尉法見前罨尉往往大汗而解至於陷胸等湯一概不録厄逆瘟疫厄逆不止者大是凶候余在長安治賀水部蓮友患瘟發黃而兼厄逆用承氣輩加茵陳與服大便行而黃漸退惟厄逆不止更兼喘而痰壅衆皆謂不治適得鮮花粉數枚大如臂搗爛少加水濾汁數碗外用前胡枳殼橘紅香圓柿蒂煎出兌花粉汁頻服一晝夜服盡厄逆稍止瞬息復作又令其仍將前藥再作一劑入碗內用箸一雙十字加於碗上令病者自持碗於箸之四空處每空吸藥一口圓轉挨次吸之持碗不得換手一順吸去此泛常飲水治厄良方以以之服藥冀其獲效服後覺漸輕然時作止又遲二三日始愈若諉之不治不幾誤人性命乎再者瘟疫打厄皆熱症丁香四逆輩斷不可用搖頭頭為諸陽之會陽脈有乘則頭為之動搖經曰諸風掉眩皆屬肝木多因風火上乘所致風木動搖之象也古人治此有灸百會風府等穴者吾終不以為然頭之所以搖以熱極生風故耳清其邪熱其搖自定何必用火攻耶又有心絶而搖頭者心絶則神去而陰竭陽獨無根不能自主所以搖頭瘛瘲音熾縱瘛與瘈字異瘈音記狂也瘋狗曰瘈狗筋急而縮為瘛筋緩而伸為瘲或縮或伸而不止者為瘛瘲與小兒之發搐相似亦有嘴眼歪邪角弓反張有類於發痙與中風者皆瘛瘲之類此症多屬於風風主動搖也而致此之由不一有瘟病熱極而生風者有其人本虛因汗下後血虛而然者有因汗後冒風而然者有汗下後因驚惱而然者有風溫被火而然者此症絶少大抵此症熱極生風只一條而虛者有數端虛者投以寒劑立見危殆若未經汗下只因風火相扇者當平肝木降心火佐以和血之藥蓋心屬火主脈肝屬木主筋火為熱木生風故耳藥則用羌活防風全蠍殭蠶柴胡天麻生地麥冬白芍丹皮當歸川芎之類如熱甚黃連梔子膽草黃芩俱可酌用有痰者加蔞仁膽星竹瀝若汗下後稍涉虛弱或冒風或因驚因氣惱而瘛瘲者斷不可用寒劑養血祛風湯主之至於汗下後多日傳變而為瘛瘲以及出汗露風汗出不透與被火劫等瘛瘲俱載傷寒門中茲不贅養血祛風湯自定新方熟地當歸酒洗白芍酒炒川芎酒洗半夏制殭蠶泡去涎焙天麻酒蒸生薑大棗為引若虛甚者加人參有風者酌加羌活白芷柴胡防風渴瘟疫鮮有不渴者故弗可以不講也邪在表則不渴在裡則渴三陽雖亦有渴症但不如三陰之甚也故太陰腹滿嗌乾少陰口燥舌乾而渴厥陰則消渴矣飲水多而小便少熱能消水故也瘟病之渴一於為熱初傳則熱微而渴微傳深則熱甚而渴甚但未有不見兼症而獨渴者施治當先問其所飲欲冷欲熱欲多欲寡飲多飲冷屬熱更須審其表裡經臟曾否汗下於瘟疫初起及九傳與六經治法中細尋症脈斟酌用藥第治其瘟邪而渴自除矣倘不應當於傷寒發渴條中採取施治所最要者飲水常使不足毋令有餘不甚渴而多飲則悸動支結喘咳䭇同噎噦腫滿泄瀉小便不利諸症起矣然又不可禁飲凡瘟症有欲愈而思飲者蓋得水則能和胃氣而汗解也禁飲多致悶亂不救腹痛瘟疫雖屬熱症而腹痛則有寒熱之殊但熱則其常而寒則其變也寒痛多有所因或服涼藥過多或不宜用涼藥而妄投或恣意大食生冷物或汗下後正氣虛而感寒皆能致痛或因病中惱怒氣滯積食者亦有之無故而痛者絶少即有之亦必因腹素有積因瘟病而觸發之者也凡腹痛但將涼水與飲而試之若飲水痛稍可者屬熱痛劇者屬寒若繞臍鞕痛大便結實煩滿而渴氣粗噎氣者皆屬燥屎與實熱痛也急用承氣等下之因食積痛者更有惡食噁心噫氣腐臭等症治亦同若小腹鞕痛小水自利大便黑身目黃者屬蓄血亦用寒劑加行血藥下盡黑物自愈凡實熱痛必脈來沉實有力若微弱者仍當詳審從緩治之若飲水愈痛或時綿綿微痛不甚亦不止重按則愈腸鳴泄利澄徹清冷口吐苦涎此為寒痛當用溫藥和之和之不已而或四肢厥冷嘔吐瀉利者急用熱藥救之瘟病殊少此症如有必因過服涼藥生冷感寒但須詳脈之有力無力如腹痛而兼身大發熱惡飲水嘔惡腸鳴如流水聲此表熱邪熱內寒也先溫其里次解其表短氣短氣者氣急短促不能相續似喘非喘似呻吟而無聲也有實者虛者在表者在裡者水停心下者或失於汗下或汗下後虛極皆能令人短氣補瀉誤用甚於操刃當詳察脈症而治之又有素虛人汗下後失於調補以致忽然似喘出言微弱少氣脈僅二三至沉細如髮甚至無脈此虛極短氣非真喘也急宜溫補緩則不救作喘治必死汗下後過用刻消之劑而見此者治亦同總之短氣者表裡虛實寒熱皆有但虛者較多當合脈與兼症而細參之瘟疫兼暑瘟疫兼暑最難分晰蓋暑病之在表者有頭痛煩躁肌體大熱脈浮氣喘口乾面垢自汗手足逆冷名暑厥搐攝名暑風昏不知人為中暑其症最易與瘟疫表症相混暑病之在裡者有嘔逆泄瀉心腹痞悶或兼脹痛又最易與瘟疫之在裡者相混惟於少氣倦怠大渴三症辨其為暑第瘟疫亦發渴但瘟症在表雖渴亦不甚必至傳裡方甚至暑症不論表裡皆渴而在表時其渴較瘟疫之表者更凶猛殊甚也以此為辨庶得其情如果系瘟兼暑症即當用解瘟卻暑之劑亦不必拘於日期見表治表見里治里又宜先治其瘟瘟解而暑熱亦從而退矣馬卯麟以五瘟丹治瘟暑但中無治暑之劑不過涼散方亦未盡可用倘遇此症仍當於達原飲中將祛暑之藥加減出入之至於五瘟丹每歲冬間預先修和備用亦可至祛暑等方載在暑門茲不贅瘟症發熱無休時暑症發熱有作止以此為辨若瘟與暑兼亦難以此作準仍當詳參脈症瘟疫兼濕活人曰其人傷濕又中於暑名曰濕溫兩脛逆冷腹滿頭目痛妄言多汗其脈陽浮而弱陰小而急茯苓白朮湯白虎加蒼朮湯切勿發汗汗之名中暍必死而吳氏引活人書曰宜朮附湯加人參香薷扁豆主之金鑑曰溫病復傷於濕名曰濕溫其症兩脛逆冷妄言多汗頭痛身重胸滿宜白虎加蒼朮茯苓溫濕兩治若脈大有力自汗煩渴者人參白虎湯加白朮主之輕者十味香薷飲清暑益氣湯增損用之按古人治法不過如斯但金鑑曰溫病復傷於濕曰濕溫而活人則曰傷濕而又中暑曰濕溫味其義意當遵金鑑為是蓋傷濕而又傷暑只可謂之傷暑濕而不可謂之濕溫也夫曰濕溫者是濕而兼瘟也或先瘟而中濕或先濕而患瘟與暑何涉焉第瘟疫兼濕又最難辨唯於一身盡痛痛極且不能轉側惡飲湯水目中視物皆紅黃身目色微黃而無譫妄等症者辨之始得而濕症之中又有濕熱寒濕之分總宜白朮茯苓湯濕熱者小便赤澀如馬溺渾濁色白且有煩熱大便祕結諸症宜人參白虎湯加白朮主之或四苓散大小分清飲茵陳飲之類皆可擇用若天久陰雨濕氣過勝其人臟腑虛大便滑小便清乃是寒濕宜朮附湯但瘟疫發在熱時且兼濕熱者多而兼寒濕者少朮附湯不可用若服茯苓白朮等湯不應則用除濕達原飲分治瘟與濕誠一舉而兩得也北方風高土燥患此者少惟南方水鄉卑濕天氣炎熱患者恆多春冬感者恆少而夏秋患者恆多所宜隨其時地而變通之至於前所引活人云濕溫切勿發汗而金匱要略則云濕家身煩痛可與麻黃加白朮湯發其汗為宜景嶽全書又曰凡濕從外入者汗散之將謂止中濕者宜汗而兼溫者不宜汗何以準繩濕溫門中既引活人云不宜汗又引金匱曰宜汗更引成氏云濕家發汗則愈是濕溫一門前後又自相矛盾殊不可解愚意瘟疫始終不宜發汗雖兼之中濕而尚有瘟疫作祟是又當以瘟疫為重而中濕為輕自不宜發汗當用和解疏利之法先治其瘟俟其自然汗出則濕隨其汗而與瘟並解矣或瘟解而濕仍在者當於濕證門中求之故治濕諸方俱不開列除濕達原飲自定新方檳榔二錢草果仁五分研厚朴一錢薑汁炒白芍一錢甘草一錢梔子五分研黃柏五分酒炒茯苓三錢如兼三陽經症仍酌加柴葛羌活瘟而兼濕故去知母而換黃柏以燥濕且能救水而利膀胱去黃芩換梔子瀉三焦火而下行利水加茯苓利小便而兼益脾胃三者備而濕熱除矣再加羌活等藥風藥亦能勝濕濕除溫散一舉兩得此方分兩不過大概臨症加減用之石草散治濕瘟多汗妄言煩渴石膏煅炙草等分共末漿水調服二錢瘟疫兼痢吳又可用檳芍湯系治瘟疫之裡症而兼痢者若有外症仍當解表必如喻嘉言分三次治法始足以盡其變至表裡俱病者又當表裡分治總宜活變不可膠執惟松花散治瘟毒熱痢頗著奇效未可以易而忽之又按傷寒便膿血有誤發淋家汗而然者用豬苓湯有病在少陰者治以桃花湯諸説於瘟痢總不宜用蓋痢由瘟而作者始終一於為熱也惟雜疫中痢疾原無瘟疫之頭痛身熱發熱自汗以及心腹痞滿不食譫語等表裡諸症而沿門闔戶止患痢疾者則有虛實寒熱之殊其治法亦因之各異矣凡痢身熱脈大者難治身熱脈小者易治松花散治瘟毒熱痢松花二三錢煎薄荷滾湯入蜜調服以愈為度無不效者取松花法於四月初看松梢所抽黃穗如麥穗者趁硬摘取攤在布被單上曬乾即有面落下如蒲黃瓷器收貯伏天必曬否則穿發取黃穗不可早早則嫩而少黃面又不可遲遲則花蕊飛而穗成空殼矣看其穗硬而帶黃色大如稻粒則取之又松花和入米粉中入白糖可蒸糕食甚香美呼為松花餅大黃酒便膿血裡急後重腹痛晝夜煩不止大黃五錢好黃酒一兩盅浸一宿次日溫飲瘟瘧凡瘧寒熱如期而發余時脈靜身涼常也以瘧法治之設傳胃者必現里症應下之症名為瘟瘧以瘧法治者死當以瘟疫法治之此症下後里症除寒熱獨存者是瘟減瘧在瘧邪未去者宜疏清脾飲邪去而瘧勢在者宜截不二飲勢在挾虛者宜補四君子湯三方見瘧門不附載丹蒿散治瘟瘧不止黃丹五錢炒青蒿童便浸曬乾二兩為末每劑服二錢寒多酒服熱多茶服鶴齡棗治瘟疫邪瘧取紅棗一枚咒曰華表柱一氣念七遍望西北方取氣一口吹棗上令病者吃之便蜜飲瘴癘諸瘧無問新久童便一盅白蜜二匙共攪去白沫頓服取吐碧緑痰出為妙不然終不除妊娠瘟疫吳又可治孕婦瘟疫用三承氣興利除害於反掌之間固已但方中定當減去芒硝蓋芒硝乃軟堅之物用之能使胎化為水倘痞滿燥實堅皆俱極數用生大黃而止否則止用熟軍為妥胎與腸胃絶不相關大黃蕩腸胃而破堅燥未聞能下胞孕者服之何害至云大黃為安胎之聖藥是專為里症應下者言之若邪尚在表者當速散其表邪毋使內陷為上乘也𦋐胎散孕婦瘟疫恐傷胎氣嫩卷荷葉曬乾宜平時收貯臨時急用則烘乾五錢蚌粉二錢五分上共為末每用新汲水入蜜調服三錢再作一劑塗腹上又方井底泥塗足心治孕娠時症令子不安又方用灶底中對鍋臍土研細水調服仍塗臍干再換塗臍散井底泥青黛伏龍肝共末調勻塗臍上干再換黃豆煎大黃豆六十粒水二盅煎一盅取汗病重再一服妊娠熱病車轄脂黃酒和服青羊屎研爛塗臍安胎又方雞子十枚納井中令冷取出打破吞之令胎不動妊娠時行並感寒大鯽魚一尾燒存性研黃酒沖服如無汗腹中熱痛醋和服取汗熱病葛根汁頻服小兒瘟疫瘟疫盛行之時小兒如有發熱等症或可斷其為疫倘瘟疫不行之年而小兒忽感瘟疫於何辨之哉亦辨之於抖然身熱而已第傷寒瘟疫皆身熱又當細問乳母曾否突然脫衣洗浴入水當風而寢等事果實無感冒方可向瘟疫上找尋又必驗其有目赤便赤舌乾苔黃黑日晡潮熱譫語斑黃或大便祕結或挾熱下利赤膠等症方可斷其為瘟疫若妄意雜症為瘟疫則又失之矣吳又可專言俗醫妄意小兒瘟疫為雜症者是隻見一邊矣總之辨小兒瘟疫是極難的事桃葉浴法桃葉三四兩熬水日五六遍澆淋之再用雄鼠屎微燒取二枚研水和服二香散天行壯熱木香末三分檀香末三分清水和服仍用溫水調塗囟門瘟疫雜症簡方鼻衄茅花湯治衄不止茅花尖一把水三盅煎一盅服無花根代止血歌石榴花瓣可以塞蘿白藕汁可以滴火煅龍骨可以吹龍骨能治九竅出血水煎茅花可以吃牆頭苔蘚可以塞車前草汁可以滴火燒蓮房可以吹水調鍋煤可以吃尉法治衄如湧泉用草紙疊十餘張井水濕透分開發貼頂心尉之即止炒梔吹鼻山梔炒黑為末吹鼻外用濕草紙搭於鼻上即止成流久不止者方可用此法如點滴不成流者其邪在經未除不必用之又方韭汁磨墨服並治吐衄無韭用根愈後鼻衄不止用青綿線將兩手中指第一節屈伸處緊扎再用綿紙剪成一二指許寬條疊數十層新汲水濕透搭於兩肩頭上熱則另換又用好黃酒四五壺令兩足浸其中立止滑石丸滑石末飯丸梧子大每取十丸微嚼破新汲水送下立止此治衄通劑齒衄椒礬飲川椒四十九粒開口白礬少許醋煎服吐血生葛汁取生葛根切碎搗爛少加水擰取汁頻頻飲之治吐衄血神效並治陽明瘟熱之毒大效不獨止吐衄逐疫七寶丹治時疫熱毒口鼻出血等症神效毋以其易也而忽之兼治諸熱毒並蠱毒人糞尖七枚約棗栗大燒紅色取出即入冷水中研細再頓服蓄血生地黃湯抵當湯丸今總難用以此代之甚覺和平生地二三錢乾漆一錢炒煙盡生藕汁一小盅如無以大薊一二錢代之藍葉錢半大黃一二錢生熟酌用桃仁一錢去皮研歸尾二錢酒洗紅花六分酒洗水與藕汁同煎原方水蛭虻蟲今改為歸尾紅花蓄血有上中下之殊上焦胸中手不可近而痛者犀角地黃湯中脘手不可近桃仁承氣臍下小腹手不可近抵當嫌峻猛此湯主之或再加枳實蘇木用者酌之發斑黑膏治瘟毒發斑如錦紋生地二兩淡豆豉三兩以豬油半斤合煎之至濃汁次入雄黃末五分麝香六分丸彈子大白湯化一丸未見效再服青黛一物湯通治發斑青黛水和服歸葛飲治陽明瘟暑大熱渴當歸葛根鮮者更好水煎冷水浸涼徐服得汗即愈又方只用鮮葛根一味銼碎搗汁濾出任意飲大治陽明瘟疫玉泉散治陽明內熱煩渴頭痛二便閉結發斑發黃及熱痰喘嗽等症此益元散之變方也其功倍之石膏六兩生用粉草一兩生用硃砂三錢共為細末每酌服一二三錢新汲水對滾水服治赤斑方獨腳烏桕根研酒服甚效治出斑方暑月昏沉未明症候恐是出丹以生黃豆數顆食之如不覺腥即以生黃豆水泡研汁一小盅和水服治發斑困篤蟾蜍旱地蝦蟆去腸宜去皮與頭恐有酥生搗食一二枚效如不效再帶皮與頭搗服鮎魚頭骨灰散治傷寒瘟疫癮疹不能發服此即發鮎魚頭骨燒灰存性研細熱黃酒調服二三分青木香煎治發斑疹青木香一兩水煎服效若腹滿不得小便用雄黃細末蜜丸棗核大納溺孔中發斑怪症目赤鼻張大喘渾身出斑毛髮如銅鐵乃熱毒氣結於下焦也白礬滑石各一兩共末水三盅煎減半不住服盡效麥奴丸麥奴麥穗烏黴也治陽毒溫毒熱極發斑為救急良藥麥奴梁上塵釜底煤灶突墨麻黃黃芩大黃朴硝等分為末蜜丸彈子大每服一丸水下發斑赤黑青木香一兩水三杯煎一盅服斑疹出不快鉤藤鉤紫草茸等分末溫黃酒服一錢發斑取汁豬膽汁醋等分雞子一枚合煎服汗出愈不愈再服發黃生薑退黃法生薑搗爛周身擦之即退又茵陳羹茵陳煮食生食亦可並治黃黃賓江方治發黃目不識人生蔥煨熟去粗皮用心扭汁蘸香油點二目大小眥劉尚書方治濕熱發黃昏悶不省死在須臾白毛烏骨雞一隻干撏去毛破開去腸雜搗鋪心頭少傾即活治發黃法用麻油半盅水半盅蛋清一枚攪和服吹鼻法瘟疫三日外心腹脹滿堅硬手心熱遍身發黃苦瓜蒂七個末以少許吹兩鼻令黃水出余末水調服蔞汁硝蜜飲治發黃心狂煩熱大栝蔞一個黃的新汲水淘浸取汁入蜜半合朴硝八分和令勻待硝化盡服之竹麥飲治黃竹葉小麥石膏分兩臨時酌定水煎細服盡劑又方醋浸雞子數枚一宿去殼吞其清又方發髲燒研水服日三狂凡狂熱不可掩閉床帳務揭開放入爽氣病人如覺惡風則不必矣三白飲治熱極狂亂及熱不退雞子清一枚白蜜一大匙生者更良芒硝酌用共和一處再用涼水和服如心不寧加珍珠末五分靛青飲治天行瘟疫時氣熱毒煩躁狂言尚未至發狂之甚者亦皆可服靛青一大匙以新汲井水和服獨參丸治發狂不避水火苦參不拘多少為末蜜丸梧子大薄荷湯下二錢水亦可治狂走雞子殼出過小雞者泡滾水服即安渾圓丸治舌黃煩躁狂言發熱生雞子吞一二枚又方蚯蚓治瘟病大熱狂言蚓糞新汲水和服亦妙鵲石散治發狂逾牆上屋黃連寒水石等分為末每服二錢濃煎甘草湯候冷調服鐵膽飲陽毒在臟譫妄狂走鐵粉一兩膽草五錢共末磨刀水調服二錢小兒五分元砂丹治發狂元明粉二錢硃砂一錢共末冷水服又方膽草末二錢雞子清一個白蜜一匙涼水化服黃雪膏大黃不拘多少炒黃為末雪水熬如膏冷水和服亦治發黃又方狂走見鬼蚯蚓數條去淨泥人尿煮汁飲或生絞汁亦可又方治狂走瓜蒂末井水服一錢取吐即愈又方人糞入罐內泥封煅半日蓋地下出火毒研新汲水服二三錢未退再服又方大熱狂渴干陳人糞為末於陰地淨黃土中作小坑將糞末入坑中新汲水和勻良久澄清細細與飲即解醋治狂法陰狂陽狂皆治瘟疫無陰狂於病人室中生旺火一盆將好醋一大碗傾於火上病人聞之即安兼燥渴者入硝半斤於冷水內用青布一塊浸硝水中取出搭胸上布熱再浸換如得睡汗出即愈一法用鏡按身上亦得如兼舌出不收將麻黃水洗淨舌用冰片牛黃麝香研末點舌即收或止用冰片亦可結胸苦參飲滿痛壯熱苦參一兩末醋三盅煎一盅飲取吐牽白飲心腹鞕痛牽牛子末一錢白糖湯調服地龍飲按之痛極或通而復結喘促狂亂生地龍四條洗淨研如泥入生薑汁少許蜜一匙薄荷汁少許新汲水調服若熱熾加片腦少許服揉心下片時自然汗出而解不應再服神效厄逆枳香散枳殼五錢木香一錢共末滾水調服一錢不應再服又方四花青皮全者末滾白水服一二錢又方黃蠟燒煙熏二三次即止痢霜連散治挾熱下利膿血百草霜川連等分共末黃酒下二錢日三連梅丸噤口川連五錢烏梅肉三錢焙共末蠟蜜丸桐子大服二十丸日三連艾煎治同上川連一錢熟艾二錢煎服豉薤湯暴痢豉一兩薤白一握冬用根水三盅煮熟納豉更煮色黑去豉分二服龍骨湯毒痢大煩渴作熱三焦瘡𧈟張口吐舌生瘡不識人目爛龍骨半升水一斗煮四升用器裝蠟封固口沉井底過夜取出徐徐飲又方下痢欲死龍骨半斤研水一斗煮取五升候冷稍飲得汗愈煩躁苦參散治狂躁並結胸苦參末黃酒調服三錢已汗未汗者皆可服花粉煎煩渴花粉煮濃汁飲先以竹瀝和水入銀同煮取水冷飲然後服此又方生藕汁一盅酌加生蜜和勻細飲竹瀝飲煩躁竹瀝微溫時時少飲厚蓋取汗又方治口乾生藕汁生地汁童便各等分和頻飲浮腫靖康異人方靖康二年京師大疫有異人書此方治瘟疫浮腫亦治大頭瘟黑豆二合炒熟炙草二寸水二盅時時呷之錦按此即甘草黑豆湯也古稱大豆解百藥毒甘草亦解毒之品瘟疫乃毒氣所鍾故用此方取效方用炙草愚意不如易以生草更妙炙則帶補矣有一人吃菌垂死用生草半斤黑豆數把濃煎大灌得生足徵其解毒之功大矣一云冷飲方效頭面腫銀花二兩生甘草一兩煎服少加入黃酒亦可青黛飲治兩腮腫發頤青黛五分甘草二錢銀花五錢栝蔞半個水酒煎服時疾陰腫囊莖發熱羊屎黃柏煮水洗之咽痛干脂膏喉閉腫痛射干豬脂各一兩合煎焦去渣冷噙化棗大又方熱病咽痛含童便即止噦飲水多者枇杷茅根煎枇杷葉去淨毛炙香茅根各五錢煎稍稍頻飲腹脹陰陽不和者桔梗半夏湯桔梗半夏制陳皮各等分薑煎心悸脈結代甘草湯甘草二兩生水煎服已汗不解新生雞子五枚傾碗內攪渾以水一升先燎滾將子投入少納醬啜之汗出愈熱病生𧈟下部有瘡鹽尉將鹽熬過俟干包尉三次即愈天時熱毒攻手足腫痛欲斷豬蹄湯豬蹄一具去毛蔥一握水煮汁入鹽少許漬之熱病餘毒漬方毒攻手足疼痛欲脫稻秸燒灰存性煮水頻漬患處豉酒毒攻手足遍身虛腫豉一握微炒入黃酒中同煎服又方治手足腫痛欲斷掘坑深二尺燒熱灌以黃酒有熱氣騰出速赤足穿木屐踏坑中坑口用衣密壅毋令泄氣又方治同前黃柏數兩煮水漬之又方肢痛欲脫羊屎燒水漬瘥乃止或和豬脂塗諸復勞復食復欲死並以蘆根煮濃汁飲人糞燒灰酒服勞復抱出雞卵殼炒黃為末熱湯和服取汗即愈勞復取頭垢棗核大唅之又方頭垢燒研丸桐子大水服一丸初愈預防勞復法勞復食復危篤蘇葉煎服入生薑淡豉亦可女勞復卵腫或縮白礬一分硝三分大麥湯調日三服熱毒從二便出又方腹痛卵腫蔥白搗爛醋一盅和服或酒又方卵腫股痛竹皮三錢水煎服亦治勞復又方女勞復發動欲死不語梔子一二錢炒煎服令微汗亦治食復又方肚痛卵腫蔥白搗爛和熱黃酒服再以蔥搗爛炒熱入醋敷腎囊陰陽易少腹急痛熱酒吞豚卵二枚又方治小腸急痛腎縮面黑喘不救即死大蔥連根七枝蔥小加倍生薑二兩共切黃酒煎服仍炒蔥尉氣海穴毋令冷又方治熱氣上衝胸煩悶手足攣搐搦如風者花粉竹茹水煎調燒褌散服見傷寒治婦人勞復赤衣散女勞陰陽易並治室女經布燒灰存性研熱水調服或兌藥服又陰陽易拘急手足拳小腹急頭痛不能舉雄鼠屎十四個韭根一大握水二盅煎七分去渣又煎二沸溫服取汗未汗再服又方乾薑末三錢白湯調服蓋被取汗手足即伸又方手足甲草片中衣襠一片燒灰存性分三服溫酒下男用女女用男勞復馬屎燒末冷酒服又方雄鼠屎草枚豉酌加水煎服瘟病食勞杏仁五錢去皮尖湯泡雙仁者不用酢二升煎一升服取汗愈又勞復食復柑皮濃煎汁飲瘟瘧痰甚但熱不寒用常麥竹葉煎專治瘟瘧熱多常山一錢小麥三錢淡竹葉一錢水煎五更服不愈再服山果酒治瘴瘧寒熱常山一寸草果一枚熱黃酒一碗浸一夜五更往東服之蓋臥酒醒即愈又方常山檳榔甘草各三錢黑豆百粒水煎服名常檳草豆煎目暗熱病瘥後食五辛所致鯽魚臛用鯽魚作臛食以明為度瘟症挾驚萍犀散紫背浮萍曬乾一錢犀角屑五分鉤藤鉤三七個共末每服錢半蜜水調下連進三服出汗為度如要多和藥味加倍熱病口瘡成𧈟音匿小蟲桃枝煎用桃枝煮濃汁含之下部有瘡納入之熱瘴昏迷煩悶飲水不止兼治瘟疫地荷煎生地無鮮用干薄荷等分研爛乾者入水取汁入麝少許井華水調服覺心下清涼毋再服病篤一劑見效妊娠時疾赤斑變黑尿血蔥白一把水三盅煮熟服汁食蔥令盡取汗熱病胎死及下胎衣紅花酒紅花入黃酒煮飲二三盞寒疫世之言疫者將瘟疫二字讀滑隨曰疫止有瘟而無寒也豈知疫有三而瘟其一焉尚有寒疫雜疫二者而人自不體認耳茲專説寒疫吳又可言春夏秋三時偶感暴寒但可謂感冒不當另立寒疫之名固已但感訓觸冒訓犯系人不慎風寒自取之至於當天氣方溫熱之時而悽風苦雨驟至毛竅正開為寒氣所束衆人同病乃天實為之故亦得以疫名也其症則頭痛身痛身熱脊強惡寒拘急無汗感冒所有或則往來寒熱氣壅痰喘咳嗽胸痛鼻塞聲重涕唾稠黏咽痛齒痛俗云寒逼生火感冒所無蘇羌飲主之自定新方蘇羌飲治四時寒疫歷有奇效屢試屢驗並治傷寒傷風可代麻桂青龍羌活十神等湯誠諸路之應兵也紫蘇三錢羌活二錢防風一錢陳皮一錢淡豉二錢蔥白數段水煎服不應再服初覺速服必愈遲則生變此足太陽藥也紫蘇溫中達表解散風寒羌活直入本經治太陽諸症淡豉解肌發汗兼治疫瘴防風能防禦外風隨所引而至陳皮利氣而寒鬱易解薑可驅邪蔥能發汗輔佐諸藥以成厥功四時風寒皆能治療甚毋以藥味平淺而忽之惟不治瘟疫如兼陽明症者加白芷一錢兼食積者加炒麥芽神麯各一錢肉積者加山楂一錢風痰氣壅涕唾稠黏加前胡一二錢咳嗽喘急加杏仁一錢泡去皮尖研心腹膨脹加薑炒厚朴一錢胸臆悶寒加炒枳殼五六分嘔逆噁心酌加藿香製半夏生薑一錢年高者虛怯者加人參一錢陰虛血虛者加熟地三錢當歸一錢脾虛者中氣不足者加參術各一錢此汗散之方故不入柴胡若現少陽症當另作主張用和解之劑錦志瘟疫應用藥發表浮萍葛根柴胡羌活豆豉蔥白蒼朮升麻生薑洋糖防風杏仁荊芥薄荷青蒿蟬蛻香薷前胡赤柳柳一名河西柳一名觀音柳攻裡大黃芒硝枳實檳榔厚朴草果鐵落山甲栝蔞寒涼生地麥冬元參梔子黃芩銀花石膏丹皮知母緑豆竹瀝童便人中黃大青青黛花粉天冬桔梗山豆根犀角竹葉竹茹白芍生連翹牛蒡子柿霜梨西瓜荸薺甘草生茅根雪水冰水蚯蚓蚓糞黃柏膽草苦參射干黃連馬勃板藍根利水車前澤瀉木通秦艽茵陳茯苓赤白赤芍燈心瞿麥萹蓄石韋豬苓淡竹葉滑石理氣枳殼陳皮橘紅蘇子青皮佛手柿蒂香圓皮金棗皮香附理血歸尾桃仁紅花川芎撫芎側柏葉紫草京墨蟅蟲蘇木發灰百草霜化痰蔞仁川貝殭蠶半夏膽星桃花牙皂冰糖白芥子亦發表逐邪藿香雄黃硃砂龍齒大蒜桃梟樹上干桃檀香鬼箭羽降真香斧頭木系斧柄入鐵處虎頭骨消導穀芽麥芽神麯山楂蘿蔔子食物灰所積者何物即將何物燒灰存性研或入藥水酒沖服溫補熟地當歸白朮炙草大棗阿膠蓮子山藥蜂蜜生熟粳米糯米倉米荷葉百合茯神首烏葳蕤藕黃酒人參松峰曰瘟疫原無用麻桂蘇葉等藥之理故一概不録即瘟疫變症所用之藥亦不開載
