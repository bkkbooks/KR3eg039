body:
  text: 卷之一述古刺法論帝曰余聞五疫之至皆相染易無問大小病狀相似不施救療如何可得不相移易者岐伯曰不相染者正氣存內邪不可干避其毒氣天牝天牝鼻也老子謂玄牝之門毒氣從鼻來可嚏之從鼻而出從來復得其往氣出於腦即不幹邪氣出於腦即先想心如日欲將入疫室先想青氣自肝而出左行於東化作林木次想白氣自肺而出右行於西化作戈甲次想赤氣自心而出南行於上化作焰明次想黑氣自腎而出北行於下化作水次想黃氣自脾而出存於中央化作土五氣護身之畢以想頭上如北斗之煌煌然後可入疫室陽明脈解篇帝曰病甚則棄衣而走登高而歌或至不食數日逾垣上屋所上之處皆非其素所能也病反能者何也岐伯曰四肢者諸陽之本也陽盛則四肢實實則能登高也帝曰棄衣而走者何也岐伯曰熱盛於身故棄衣而走也帝曰其妄言罵詈不避親疏而歌者何也岐伯曰陽盛則使人妄言罵詈不避親疏而不欲食不欲食故妄走也此言胃病皆邪氣之盛也邪盛故熱盛熱盛故陽盛陽盛故三者之病由此矣熱論篇帝曰熱病已愈時有所遺者何也岐伯曰諸遺者熱甚而強食之故有所遺也若此者皆病已衰而熱有所藏因其穀氣相薄兩熱相合故有所遺也帝曰治遺奈何岐伯曰視其虛實調其逆從可使必已也帝曰病熱當何禁之岐伯曰病熱少愈食肉則復多食則遺此其禁也此言病之所以遺者由於強食而有治之之方復有禁之之要也遺者病已愈而邪氣未盡衰若有所遺而在也禁者禁於未遺之先也肉性熱而難化尤當禁也評熱病論帝曰有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名為何岐伯曰病名陰陽交陰陽之氣不分別也交者死也帝曰願聞其說岐伯曰人所以汗出者皆生於穀穀生於精今邪氣交爭於骨肉而得汗者是邪卻而精勝也精勝則當能食而不復熱復熱者邪氣也汗者精氣也今汗出而輒復熱者是邪盛也不能食者精無俾也精氣不能使之食也病而留者其壽可立而傾也且夫熱病曰汗出而脈尚躁盛者死今脈不與汗相應脈躁疾不為汗衰此不勝其病也其死明矣狂言者是失志失志者死今見三死身熱不能食一也脈躁盛者二也狂言者三也不見一生雖愈必死也靈樞熱病篇曰熱病已得汗出而脈尚躁喘且復熱勿刺喘甚者死又曰熱病已得汗而脈尚躁盛此陰脈之極也死刺熱篇曰肝熱病者小便先黃腹痛多臥肝經之脈環陰器抵少腹而上故有是症身熱熱爭邪與正爭則狂言及驚脅滿痛手足躁不得安臥肝經之脈從少腹上挾胃貫膈布脅肋循喉嚨之後絡舌本故見此症肝之病發為驚駭故病則驚胃不和則臥不安木來乘土故不得安臥庚辛甚金剋木也甲乙大汗本經氣旺之日氣逆則庚辛死以其氣逆甚也上三句總言其甚其死必以克我之日得汗而愈必以自得其位之日後四段放此刺足厥陰少陽其逆則頭痛員員脈引沖頭也肝經脈自舌本循喉嚨之後上出額與督脈會於巔故病氣逆則如是也員員者靡定也松峰曰此專引經義刺法不贅心熱病者先不樂數日邪入經絡則神不安故不樂乃熱熱爭則卒心痛煩悶善嘔頭痛面赤無汗心脈起於心中其支別者從心系上挾咽小腸之脈直行者循咽下膈抵胃其支別者從缺盆循頸上頰至目外眥故兼見諸症心在液為汗今病熱故無汗以出耳壬癸甚克丙丁大汗氣旺氣逆則壬癸死刺手少陰太陽脾熱病者先頭重頰痛煩心顏青欲嘔胃脈起於鼻交頞中下循鼻外入上齒中還出挾口環唇下交承漿卻循頤後下廉出大迎過客主人循髮際至額顱故先頭重頰痛顏青也脾之脈其支別者復從胃別上膈注心中其直行者上膈挾咽故煩心欲嘔也身熱熱爭則腰痛不可用俯仰腹滿泄兩頷痛胃脈支別者起胃下口循腹裡下至氣街中而合以下髀關氣街者腰之前故腰痛也脾脈入腹屬脾絡胃入胃之脈自交承漿卻循頤後下廉出大迎循頰車故腹滿泄而兩頷痛也甲乙甚戊己大汗氣逆則甲乙死刺足太陰陽明肺熱病者先淅然厥起毫毛惡風寒舌上黃肺主皮毛熱中之則先淅然惡風起毫毛也肺脈起於中焦下絡大腸還循胃口今肺熱入胃胃熱上升故舌上黃身熱熱爭則喘咳痛走胸膺背不得太息頭痛不堪汗出而寒肺居膈上氣主胸膺在變動為咳背為胸中之府故喘咳痛走胸膺不得太息肺之絡脈上會耳中今熱氣上薰故頭痛不堪汗出而寒丙丁甚庚辛大汗氣逆則丙丁死刺手太陰陽明出血如豆立已腎熱病者先腰痛膀胱脈循肩髆內挾脊抵腰中又腰為腎之府故痛䯒䯒脊梁後骨痠苦渴數飲䯒音行痠音酸痠痛也腎脈自循內踝之後上腨內出膕內廉又直行者從腎上貫肝膈入肺中循喉嚨挾舌本身熱熱爭則項痛而強䯒寒且酸足下熱不欲言膀胱脈從腦出別下項腎脈起於小指之下斜趨足心出於然骨之下循內踝之後別入跟中以上踹內又其直行者從腎上貫肝膈入肺中循喉嚨挾舌本故見諸症其逆則項痛員員淡淡然戊己甚壬癸大汗氣逆則戊己死刺足少陰太陽員員靡定也淡淡無意味也又曰肝熱病者左頰先赤心熱病者顏先赤脾熱病者鼻先亦肺熱病者右頰先赤腎熱病者頤先赤病雖未發見赤色者刺之名曰治未病以面之部位應五臟又曰治諸熱病以飲之寒水乃刺之必寒衣之居止寒處身寒熱退身涼也而止也乃可以止針余曾見一小兒患瘟熱邪深重棄衣而走晝夜靡寧手足不閒翻動器皿掏撥什物尋得涼水一甕且浴且飲一日後隨熱退身涼而愈松峰記刺法自有專門以此數段中義蘊有關於瘟疫故採録之非講刺法也熱論篇帝曰今夫熱病者皆傷寒之類也或愈或死其死皆以六七日間其愈皆以十日以上者何也岐伯曰巨陽者諸陽之屬也太陽六經之長總攝諸陽其脈連於風府故為諸陽主氣也人之傷於寒也則為病熱熱雖盛不死其兩感於寒而病者必不免於死一日巨陽受之巨陽太陽也故頭項痛腰脊強二日陽明受之陽明主肉其脈挾鼻絡於目故身熱目痛而鼻乾不得臥也三日少陽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾三陽經絡皆受病而未入於臟者故可汗而已四日太陰受之太陰脈循布胃中絡於嗌故腹滿而嗌乾五日少陰受之少陰脈貫腎絡於肺系舌本故口燥舌乾而渴六日厥陰受之厥陰脈循陰器而絡於肝故煩滿而囊縮三陰三陽五臟六腑皆受病榮衛不行五臟不通則死矣其未滿三日者可汗而已其滿三日者可下而已松峰曰此內經傷寒傳經之正例也瘟疫雖與傷寒不同但邪在膜原正當經胃交關之所半表半裡其熱淫之氣浮越於某經即顯某經之症專門瘟疫者又不可不知也汗下又不可泥定三日經曰其冬有非節之暖者名曰冬溫冬溫之毒與傷寒大異冬溫復有先後更相重沓亦有輕重為治不同松峰曰冬暖來年入夏必病當時病者卻少陰陽應象大論曰冬傷於寒春必溫病松峰曰雲笈七籤中引作冬傷於汗甚妙蓋言冬時過暖以致汗出則來年必病溫余細體驗之良然冬日嚴寒來春並無瘟疫以其應寒而寒得時令之正故耳且人傷於寒豈能稽留在身俟逾年而後病耶金匱真言論曰夫精者身之本也故藏於精者春不病溫松峰曰藏精者百病不生豈第不病溫而已哉論疾診尺篇曰尺膚熱甚脈盛躁者病溫也其脈盛而滑者病且出也松峰曰出字謂邪不入里將解散也張仲景溫病篇曰太陽病發熱而渴不惡寒者為溫病發汗已身灼熱者名風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾音旱鼻息如雷語言難出自發汗已至此言大發其汗之害若被下者小便不利直視失溲臟氣不固故失溲此四句言誤下之害若被火者微發黃色劇則如驚癇時瘛瘲癇音閒俗云羊羔風其聲如羊瘛瘲音熾縱抽拉發搐此四句言用火逼汗劫取之害若火薰之一逆尚引日再逆促命期表熱無寒故不宜汗裡熱無實故不宜下表裡俱熱尤不宜火若誤汗下火劫則逆一逆尚可延引時日再逆第二次則陰立亡而死經曰春應暖而復大寒夏應熱而反大涼秋應涼而反大熱冬應寒而反大溫此非其時而有其氣是以一歲之中長幼之病多相似者此則時行之氣也劉南瑛曰四時氣候不正為病謂之時症與傷寒溫暑寒疫等症不同唯秋從未見有病者素問四時不節則生大疫傷寒論曰陽脈洪數陰脈實大遇溫熱變為溫毒陽主表陰主裡洪數實大皆熱也兩熱相合變為溫毒又曰溫病之脈行在諸經不知何經之動也各隨其經所在而取之瘟病由不正之氣散行諸經難別何經所受必審其病之屬於何經而後可以施治熱病須得脈浮洪細小徒自費神功陽病當得陽脈細小陰脈也屬死症不治汗後脈靜當便瘥喘熱脈亂命應終汗後邪退即生邪盛即死松峰曰熱病而脈細小雖云不治然有脈厥者不在此例陽毒健亂四肢煩面赤生花作點斑狂言妄語見神鬼下痢頻多喉不安汗出遍身應大瘥魚口開張命欲翻有藥不辜負也但與服能過七日始能安陽症宜汗解如失汗則邪傳入臟故有健亂等危症病傳在裡不當汗又加之遍身自汗口如魚口開張者死能過七日乃過經陽熱退方有可救之理松峰曰七日能安之說不過言方有可救之理非云愈也總不可泥熱病未汗脈須浮洪既汗脈當安靜倘有散漫之脈或不汗而愈不汗而愈謂之干瘥其平復未可全許也瘟疫衆人一般病者是又謂之天行時疫治法有三宜補宜散宜降熱甚者宜服童便松峰曰補者如四損不可正治及老幼與本來虛弱者是也四損解見諸論中散者清涼解散是也瘟症不宜溫散降者從大小便驅逐其邪是也瘟家之脈散難名隨其脈狀分諸經若浮而大按無力補中帶表隨時寧松峰曰浮大無力本虛怯脈何以知其為瘟疫乎必應以瘟脈洪數而浮瘟症參之方為無弊脈狀狀字指病症與色與聲而言疫症關係全在虛實二字實者易治虛者難治以元氣本虛邪不易解若治挾虛者而不知托散但知攻邪愈攻則愈虛愈虛則斷無有不死者松峰曰虛實二字三種疫病皆有之即瘟中亦有虛實但熱多而無寒耳瘟疫之來無方然召之亦有其故或人事之錯亂天時之乖違尸氣之纏染毒氣之變蒸皆能成病症既不同治難畫一瘟疫多火熱之氣蘊蓄於房戶則一傢俱病蘊蓄於村落則一鄉俱病蘊蓄於市廛則一城俱病蘊蓄於道路則千里皆病故症雖多但去其火熱之氣而少加祛邪逐穢之品未有不可奏效者也凡治瘟疫宜清利者非只一端蓋火實者宜清氣實者宜行食滯者宜消痰甚者宜化皆所謂清利也凡此數者滯去則氣行而表邪自解然宜用於實邪等證而本非虛證之所宜其有虛中挾實者不妨少為清解凡瘟疫宜下者必陽明邪實於腑而祕結腹滿或元氣素強胃氣素實者方可下若大便雖數日不行而腹無脹滿及大便無壅滯不通之狀或連日不食而臍腹坦然軟而無礙此陽明胃腑本無實邪切不可妄下以泄中氣蓋諸誤之害下為尤甚不可忽也周翰光曰與急症急攻並注意逐邪等論當合看務要因時制宜變通不拘也雖古法云瘟病在三陽者多三陰者少然亦不可拘泥瘟疫六七日不解以致熱入血室發黃身如煙燻目如金色口燥熱結以砭針刺曲池出惡血仍以通聖散兼散兼下得汗如黃水糞如黑膏即愈此即北方之所謂打寒也其法用手捋兩膊使血聚於臂以帛縛定乃用箸夾瓷鋒擊刺肘中曲澤旁之大絡使邪毒隨惡血而出亦最捷之法窮人用之極效然非曲池穴也松峰曰瘟症傳裡者熱毒深重其症譫語發狂循衣摸床撮空理線目赤如火如醉如癡或登高而歌棄衣而走齊俗謂之猴兒病用小棗蘸燒酒遍身刮痧痧出其色紫赤其高起者狀如棗栗遂用針出惡血往往取效此亦一刺法也治瘟疫大抵不宜發汗經曰不惡寒而反渴者溫病也明其熱自內達外也疫有傷氣傷血傷胃之殊故見證不同治亦稍異若入臟者則不知人而死矣大法以症為則毋專以脈為據也松峰曰入臟不知人亦不必即死不過較在經者難施治耳此兼三疫而言人在氣交之中如魚在水一毫渣滓混雜不得設川澤潑灰池溏入油魚鮮有得生者人受疫氣何以異此疫者民皆病也癘鬼為災斯名疫耳松峰曰疫如徭役之役沿門闔戶皆病之謂齊俗謂小兒生痘為當差亦即徭役之義天地以生物為心寒熱溫涼四氣遞運萬古不易人生其間觸之而病者皆因起居無時飲食不節氣虛體弱自行犯之非寒暑之過若以寒暑為殺厲之氣觸之即病則人無噍類久矣豈天地生物之心哉至於非其時而有其氣謂之不正之氣則可謂之疫氣則非也何者不正之氣人感之者有病有不病未可一概論也若夫疫氣則不論貴賤貧富老幼男女強弱虛實沿門闔境傳染相同人無得免者此唯兵荒饑饉之年有之瘟病之治宜從涼散固也然必表裡俱有熱症方可用若表邪未解雖外熱如火而內無熱症可據者不得概用涼藥松峰曰誤投熱藥猶或可解若誤投涼藥殺人等於操刃語曰薑桂投之不瘥芩連用之必當其不曰芩連投之不瘥薑桂用之必當者明乎傷寒妄投涼藥則不可救矣瘟疫雖屬邪熱其有不宜用涼藥之時投劑仍當審慎冬有非時之暖或君相客熱之令而病熱者名曰冬溫與冬月正傷寒大異法宜涼解此舍時從症也若夏有寒者其宜溫亦然松峰曰冬溫之說吳又可曾非之然謂冬時絶無溫熱則又不然故宜舍時從症寒疫乃天時之暴寒較冬時之嚴寒又有輕重之異時氣自是天行疫癘之氣又非寒比也瘟病多山澤蒸氣松峰曰冬時亦有熱疫餘子秉錦於深冬時忽患四肢走注疼痛余以治周痹之法治之不應遂自用銀花草節羌防荊芥薄荷桑枝黃芩梔子生地涼散敗毒之品加減出入服三四十帖始愈後聞其時患此症者甚多始知此亦疫症也時氣者乃天行暴癘之氣不因寒而得治法當闢散疫氣扶正氣為主若多日不解邪熱傳變雜症宜從傷寒變症條內採擇用之經曰冬不藏精者春必病瘟十月屬亥十一月屬子火氣潛伏當養其真而為來春發生之本此時若恣意戕賊至春陽氣輕浮必有瘟疫此兩個月為一年之虛若上弦前下弦後月廓月空為一月之虛風霾霆電大寒熱日月蝕愁怒驚悲醉飽勞倦為一日之虛當此時可不養天和遠房室哉溫熱病因外感內傷觸動鬱火自內而發之於外初則表裡俱熱宜用涼散之劑兩除表裡之熱久則表熱微而裡熱甚又宜承氣苦寒之劑以瀉之則熱退身涼而病自已倘認作即病傷寒之症用麻黃辛溫之劑以發表則內熱愈甚而斑黃狂亂之症起矣或未用辛涼之劑以解表便用承氣苦寒之劑以攻裡則表熱未去而結胸虛痞之症見矣松峰曰瘟疫不可認作即病之傷寒便用麻黃固已余曾經瘟症盛行之時衆人所病略同大概宜用涼散攻下之劑中有一人得病詢其症不過身熱身痛頭痛拘急等症診其脈卻遲而緊竟與冬月正傷寒無異因投麻黃髮表之劑乃得汗解始悟治病最宜變通不可拘執瘟疫固爾雜病亦然凡傷寒瘟疫其不可治及難治者必屬下元虛症松峰按間亦有之亦不必然如家中傳染者緣家有病人旦夕憂患飲食少進則氣餒感其病氣從口鼻入故宜清陽明舒鬱結兼理勞傷為要松峰按此句不可泥兼字宜重讀松峰云余家曾有患瘟症者十餘人互相傳染餘日與病人伍飲食少進旦夕憂患所不待言而竟免傳染偶一日一入疫家即時而病求其故不得因憶伊時舉家患病余忙亂終日夜來獨居一室閉門焚降真香一塊想以此得力耶瘟疫不可先定方瘟疫之來無方也傷寒瘟疫三陽症中往往多帶陽明者手陽明經屬大腸與肺為表裡同開竅於鼻足陽明經屬胃與脾為表裡同開竅於口凡邪氣之入必從口鼻故兼陽明症者獨多邪在三陽法宜速逐遲則胃爛發斑或傳入里則屬三陰邪熱熾者令陰水枯竭於法不治此治之後時之過也陰陽失位寒暑錯時故生疫瘟疫之來多因人事之相召而天時之氣運適相感也故氣機相侵而地氣又復相應合天地人之毒氣而瘟疫成焉治溫熱疫癘不可用辛熱藥宜清涼辛甘苦寒仲景書王叔和得散亡之餘詮次間有穿鑿成氏因注釋致將冬時傷寒之方通解溫暑遺禍至今溫暑別自有方今失無徵宋龍門所以嘆傷寒無全書也夫病瘟而強之食病暍而飲之寒此衆人之所以為養也而良醫之所以為病也時疫感之必先入胃故多用陽明胃藥濕熱時毒感於口鼻傳入陽明邪正交爭陰勝則憎寒陽勝則壯熱流入百節則一身盡痛上行頭面則為腫大名大頭瘟暑濕熱三氣門中推人參敗毒散方為第一三氣合邪豈易當哉其氣互傳則為疫矣方中所用皆辛平更有人參大力者荷正以祛邪病者日服二三劑使疫邪不復留詎不快哉奈何俗醫減去人參曾與他方有別耶疫癘也病氣流行中人如磨礪傷物也疫役也有鬼行役役不住也凡治瘟疫須先觀病人兩目次看口舌以後以兩手按其心胸至小腹有無痛處再問其大小便通否渴與不渴服過何藥或久或新並察其脈之端的脈症相同方可以言吉凶庶用藥無差此數者最為緊要醫家之心法治暑月溫病熱病疫癘病不可用辛溫熱藥宜辛涼清甘苦寒升麻柴胡葛根薄荷石膏芩連梔柏甘草芍藥之類癘疫痘疹發斑熱毒等症但臥陰土濕地則解涼拔毒能減其半土之妙用如此智者類而推之疫病當分天時寒暑燥濕因時制宜如久旱而熱疫忌用燥劑久雨而寒疫脾土受濕忌用潤藥疫邪自外而入唯虛人感之必深如用祛邪藥汗下必先顧元氣則溫散溫補反治從治諸法何可不知每見治溫熱病誤攻其里尚無大害誤發其表變不可言此足明其熱自內達外矣衛遜亭曰此足見瘟病斷無發散之理至云攻裡尚無大害當重看大字天地疫癘之氣俗人謂之橫病多不解治皆曰日滿則瘥致夭枉者多矣凡覺病即治折其毒氣自瘥切莫令其病氣自在恣意攻人拱手待斃世人誤認瘟疫為傷寒云傷寒是雅士之詞天行瘟疫是田舍間俗語誤亦甚矣疫氣邪正混合倘邪勝正衰則危藥之苦寒者傷胃溫補者助邪如人中黃之類最為合法瘟疫乃天地之邪氣人身正氣固則邪不能幹故避之在節欲節勞仍毋忍飢以受其氣至於卻邪之法如經所云天牝從來復得其往氣出於腦即不幹邪是也蓋天牝者鼻也鼻受天之氣故曰天牝瘟邪之氣自空虛而來亦欲其由空虛而去即下句氣出於腦之謂也蓋邪氣自鼻通於腦則流布諸經令人病瘟氣出於腦謂嚏之或張鼻以泄之或受氣於室速泄於外而大吸清氣以易之則邪從鼻出而毒氣自散此卻邪於外之法也又想心如日等法見前蓋膽屬少陽中正之官其氣壯則臟氣賴以俱壯而邪不能入此強中御邪之法也凡探病診疾知此諸法雖入穢地可保無虞男病邪氣出於口女病邪氣出於前陰其相對坐立之間必須知其向背行動從容察位而入方妙治瘟疫須分上中下三焦蓋人之鼻氣通於天故中霧露之邪為清邪從鼻息而上入於陽入則發熱頭痛項強頸攣正與俗稱大頭瘟蝦蟆瘟之說符也口氣通於地故中水土之邪者為飲食濁味從口舌而下入於陰入則必先內栗足膝逆冷便溺妄出清便下重疑即後重臍築向外掙築湫痛正如俗稱絞腸瘟軟腳瘟之說符也然口鼻所入之邪必先注中焦以次分布上下不治則胃中為濁營衛阻而血凝其釀變即現中焦俗稱瓜瓤瘟疙瘩瘟等症則又陽毒癰膿陰毒遍身青紫之類也此三焦定位之邪也若三焦邪混為一內外不通臟氣熏蒸上焦怫鬱則口爛食齦矣若衛氣前通者因熱作使遊行經絡臟腑則為癰膿營氣前通者因召客邪嚏出聲嗢咽塞熱壅不行則下血如豚肝然此幸而營衛漸通故非危侯若上焦之陽下焦之陰兩不相接則脾氣於中難以獨運斯五液注下下焦不闔而命難全矣治法於未病前預飲芳香正氣藥則邪不能入倘邪入則以逐邪為要上焦如霧升而逐之兼以解毒中焦如漚疏而逐之兼以解毒下焦如瀆決而逐之兼以解毒營衛既通乘勢追拔勿使潛滋方為盡善瘟邪直行中道流布三焦上焦為清陽故清邪從之上入下焦為濁陰故濁邪從之下入中焦為陰陽交界凡清濁之邪必從此分區甚者三焦相混上行極而下下行極而上故聲嗢咽塞口爛食齦者上焦之症亦復下血如豚肝下焦之症是上下焦症齊見矣非定中上不及下中下不及上也臧盧溪曰二節當參看夫寒中所以清火亦能解表蓋陽亢陰衰則火盛水虧水涸於經安得作汗譬之乾鍋赤裂潤自何來但加以水則鬱蒸沛然而熱氣上騰矣汗自水生亦復如是用涼藥以救水水生而汗有不出者乎補中亦能散表夫氣虛於內安能達表非補其氣肌能解乎凡脈之微弱無力或兩寸短小者即其症也血虛於裡焉能化液非補其精汗能生乎凡脈之浮芤不實或兩尺無根者即其症也然補則補矣更當斟酌盡善用得其宜妄補住邪則大害矣瘟疫來路兩條去路三條治法五條盡矣何為來路兩條有在天者如春應暖而反寒云云此非其時而有其氣人受之從經絡入則為頭痛發熱咳嗽發頤大頭之類其在人有互相傳染者其邪則從口鼻入憎寒壯熱胸膈滿悶口吐黃涎之類所謂來路兩條者此也何如去路三條在天之疫從經絡而入者宜分寒熱用辛溫辛涼之藥以散邪如香蘇散普濟消毒飲之類俾其仍從經絡而出也在人之疫從口鼻而入者宜芳香之藥以解穢如神術正氣等散之類俾其仍從口鼻而出也至於經絡口鼻所受之邪傳入臟腑漸至潮熱譫語腹滿脹痛是毒氣歸內疏通腸胃始解其毒法當下之其大便行者則清之下後而餘熱不盡者亦清之所謂去路三條者此也何為治法五條曰發散曰解穢曰清中曰攻下曰酌補所謂治法五條者此也松峰曰此段亦頗為近理故録之唯於補法中而改一酌字以瘟疫用補法必如吳又可所謂四損不可正治者方議補倘不應補而冒然用之補住其邪其害不可勝言矣又曰余凡閲書並有所見聞關於疫症者率皆採録久而成帙然其出處當時亦或不載故除引經論外皆不著其書名姓字以免罣漏之誚且只圖有俾醫學非欲博古也以上記精言以下載故實桐鄉醫生趙某偶赴病家請歸已暝又將雨中途見矮屋有燈明滅時已下雨遂叩門求宿內有婦人應曰男子不在不便相留醫懇棲檐下許之將更余婦開門延入醫謝不敢婦引之甚力且求合醫視其燈青黯且手冷如冰知遇鬼亟欲奔避婦雙手挽其頸以口就醫之口既而大噦曰此人食燒酒生蒜臭穢何可近也遂入醫覆冒雨而走抵家十餘日後經矮屋則一孤冢也松峰曰足見燒酒大蒜於疫癘盛行所不可闕陳宜中夢神人語曰天災流行人多死於疫癘唯服大黃得生因遍以示人時果疫因服大黃得生者甚衆松峰曰大黃瘟疫症尚在表總不宜服唯入里宜服蘇耽最孝謂母曰後三年郴人大疫宜穿井植橘病人食橘葉水一盞自愈黃德環家烹鱉用箬笠蓋其釜揭見一鱉仰把其笠背皆蒸爛然頭足猶能伸縮家人憫之潛放河中後此人患熱病垂危因徙於河邊將養夜有一物徐徐上身其人頓覺涼爽及曉視胸臆間悉塗淤泥其鱉在身上三曳三顧而去即日病瘥臧盧溪曰熱病者胸腹煩熱用井底泥塗之亦此意也又足見放生之報范文正公所居之宅浚井先必納青術數斤於中以避瘟張鳳逵司空著傷暑全書力辨仲景傷寒論中寒毒藏於肌膚至春變為瘟病至夏變為暑病與內經溫根於寒之說以為此屬上古之論與今風氣不合太古時洪水懷山草木閉塞天地矇昧陰靄拂鬱陽明未舒以故寒氣盛行元和令少即當盛夏亦無燥金之患後世文明漸開五行分布水火之氣各司其權以此隨定暑為火氣一以涼劑投之卓哉司空之見不唯醫理入微亦可謂善讀古人書者矣趙逵好吹笛為戲是年瘟疫盛行一日吹笛至茶肆有老嫗與逵言近有五人來店吃茶見吹笛者過各回避自後疫遂止人疑即五瘟使者後一秀士貌類炳靈公入茶店囑老嫗云趙逵有濟貧之心必獲善果言訖不見後老嫗以語逵逵赴廟謝神聞空中雲來年必魁天下三年後當入相後果為獄府尚書一說部載岷俗畏疫一人病闔家避之病者多死刺史辛公義命皆輿置廳事暑月病人填廊廡公義晝夜處其間省問施治病者愈乃召其親戚諭遣之歸皆慚謝而去風俗隨變松峰曰辛公之不染疫乃清正仁愛存心得報世之作吏者不可不知也昔時山東一家有五百餘口從無傷寒疫症因每歲三伏日取葶藶一束陰乾至冬至日為末收貯俟元旦五更蜜調人各一匙黃酒和服飲時先從少始呂復字元膺號滄洲呂東萊之後河東人治一人患三陽合病脈長弦以方涉海受驚遂吐血升許兩脅痛煩渴譫語遂投小柴胡去參加生地半劑後俟其胃實以承氣下之得利而愈又治一人時症逾月既下而熱不已脅及小腹偏左滿肌肉色不變俚醫以為風浹四旬其毒循宗筋流入睪丸赤腫若瓠瘍醫刺潰之兩脅腫痛如故呂診其尺中皆數滑乃以雲母膏作丸衣以乳香硝黃煎湯送下下膿五碗明日再下余膿而愈松峰云余用小柴胡往往減參且瘟疫原不宜於參參之價又貴權作世間原無此藥何如余見一人患瘟疫甫愈外腎忽腫若瓠想系瘟毒未盡循宗筋流入睪丸若急服清熱解毒之劑或可潛消且其人尚能動履亦被瘍醫刺潰數日而沒葛乾孫字可久平江吳人治時症不得汗發狂循河而走公就控置水中使禁不得出良久出之裹以厚被得汗而解劉南瑛曰系實法昔有一重囚於獄中患疫而沒獄卒報明病故時方薄暮出尸委棄溝壑適值天氣暴寒裸凍一夜而蘇匍匐覓道返里隨免刑戮之難孫鳳亨曰與水浸汗解其理略同蓋瘟疫無非熱症火盛悶絶遇寒而解此囚想必有陰德劉從周韶州曲江人言痢疾以手足和暖為熱嚴冷為寒又言盛夏發熱有進退者為傷暑熱不止者為傷寒瘟疫松峰曰此論痢疾不確論暑與瘟疫發熱至當不易衡州南靈鷓鴣解嶺南野葛諸菌毒及避瘟瘴又名樢多對啼其鳴云但南不北又云鉤輈格磔松峰曰此鳥是處皆有亦隨其方言而命名各殊齊魯間則聽其鳴云光棍奪鋤蓋因其鳴於孟夏伊時正鋤田也余至燕趙聞此鳥鳴詢之土人則云打公罵婆昔有一婦不孝翁姑隨死變此鳥自鳴其惡以警衆也又有云燒香拜佛者余至南中則有云上山看火者有云脫卻硬袴者並見蘇東坡高青邱詩昔耶律文正公下靈武諸將爭掠子女玉帛公獨取書數部大黃兩駝而已既而軍中大疫惟得大黃可愈所活幾萬人晉陵城東遭大疫傳染病者人不敢過問有熊禮妻錢氏歸寧後聞翁姑疫欲趨視父母不許婦曰娶妻原為奉事翁姑今病篤不歸與禽獸何異隨隻身就道既抵舍其翁姑見鬼相語曰諸神皆衛孝婦至矣吾等不速避被譴不小自是翁姑皆愈闔門俱不傳染松峰曰邪不侵正孝可格天真祛疫之良方也吳中秀才劉永清病疫死復蘇云死時見冥卒二人持帖來攝因設飯啖之不異生人食畢便拘清行至一公署令清跪伏階下見堂上坐者冕旒侍從儼如玄妙觀東嶽廟中之儀有冥吏按簿唱名言此人無大罪惡發疾疫司聽勘冥卒即押至一曹司見堂上二大僚偶坐搜視冥簿謂曰汝雖無大惡時有小口孽量罰瘡瘍三年右坐者曰太輕左曰念其祖簿分恕之叱二卒押放回家恍如夢覺清後果患瘡三年宋紹白曰常見一好造口孽者後長對口而死又一人好作詩輕薄罵人亦長舌疔早夭報應不爽如此黃生嘉玉吳縣人患疫復蘇云死後至一城繁華與世無異但黑暗無光忽聞官至儀從甚盛是顧文康公公與玉父有舊玉少時曾識其面便於輿旁呼之文康命潔之行既達公暑宮殿壯麗見文康與一大僚並坐堂上階前罪犯膝行哀啼大僚閲籍注罪諭云某某合與作牛犬等畜冥吏即取諸皮分覆其身悉化畜類玉私詢冥吏雲系生前作孽之報大僚忽問堂下安得有生人氣敕獄卒牽玉文康云吾查渠算雖盡但近行善事可放還陽令吏送出隨冷汗如雨而蘇蜀遭獻忠之亂後瘟疫流行有大頭瘟頭髮腫赤大幾如斗又有馬眼睛瘟雙眸黃大森然挺露又有馬蹄瘟自膝至脛青腫如一狀似馬蹄三病患者皆不救松峰曰大頭瘟方書各有治法至於馬眼瘟似肝脾濕熱所致蓋肝開竅於目而黃色屬脾為濕熱所鬱蒸也馬蹄瘟之青腫似肝腎流毒所致依此立方施治或不甚瘥再正高明休寧趙朝奉泛海回忽熱病死同伴棄之海岸徑返趙某被海風一吹復蘇見海天浩蕩無人乃撥榛莽歷盤曲上至山椒見一大寺入拜衆僧懇求收恤數月趙問僧曰止見衆師早餐至午不見何也僧曰赴施主齊去趙求一攜往觀僧乃令入偏衫大袖中立即騰空移時聞雞犬人煙有一家道場聚衆僧宣疏為已故趙某修齊禮懺乃其子為父周忌追場薦也趙動念欲傳信厥家知其尚在僧已默知因語趙曰我等皆羅漢因汝素積善故帶汝來隨出趙袖中置屋脊上僧忽不見趙家睹屋上有人梯視乃朝奉也舉家驚喜實出意外趙乃依海中寺形創建大廟額曰建初現在休寧城內松峰曰海風寒徑砭人肌骨熱病之清涼散也況與積善湯同服宜其瘳矣杭州鳳仙橋一人以炮鱉為業買鱉生投沸湯中慘死之狀見者無不惻然既熟刮腸剔骨煎和五味香及數家由此獲利多年後忽染瘟疫初則縮頸攢手足伏於床上數日後伸手爬娑宛如鱉形後又爬於房內漸出堂中家人禁之輒欲齧人將死爬至街市盤旋宛轉曲盡鱉態往來觀者皆知炮鱉之報七日身體臭爛而死崑山唐順泉其父已死十三年矣一夕魂忽歸家附其第三媳云余今已為金神寧濟候從者頗知冥間事吾家無大罪止以汝母及童男少女或傾溺器或大小便不洗手輒即上灶灶神上告天曹故特降茲閣家疫症猶幸修醮少解其愆然汙灶之罪俱系汝母承當止有兩月在世矣至期重感疫而沒崑山諸生郟鼎歲飢施粥全活甚衆其夏疫癘大作鼎病劇氣絶恍在萬傾波濤中沉溺下墜忽聞風雨雷電見甲士萬騎擁一神人人首龍形鼎哀懇救援神曰子生平無大罪無恐余當救汝乃振動鱗甲水勢分開鼎少蘇因請問施粥一事神曰俱有案卷已達帝所隨有侍從開卷呈閲神曰子名在內命將士送至新甃大石橋曰從此去即歸家矣及歸聞眷屬悲號言氣絶一晝夜矣病尋愈時妻與子亦垂危而皆瘳昔城中大疫有白髮老人教一富室合藥施城中病者皆愈而富室舉家卒免於疫後有人見二疫鬼過富室之門而相謂曰此人陰德無量吉神擁護我輩何敢入哉松峰曰陰德無量誠祛疫之良方世人所當著眼江西府泰和縣瘟疫大作有醫者視病中夜而歸忽遇神人騎馬導從而來醫拜伏於地神至前叱云汝何人也對曰醫士神曰汝今治病用何藥對曰隨病寒熱輕重用藥治之神曰不然天一類三字疑有錯誤用香蘇散好醫如其言試之皆效神授香蘇散香附去皮炒紫蘇各四兩陳皮甘草各一兩生共為末每用三錢水一盞煎七分去渣熱服日三服戒葷腥酒肉神效松峰曰隨病寒熱輕重用藥誡醫家之要訣不但治瘟疫已也至於此方乃溫中達表解散風寒之劑瘟疫門從無用處但神授如此或更有義蘊耶庾袞字叔褒咸寧中大疫二兄俱亡次兄毗復病癘氣方盛父母諸弟皆出於外袞獨不去父母強之不可親自扶持晝夜不眠其間又扶柩哀號弗輟十餘旬疫漸消歇家人乃返毗疾瘥袞終不染松峰曰孝弟之人天之所以佑之者如此臨川人入山得猿子持歸猿母自後隨至家此人縛猿子於樹上猿母便搏頰向人欲乞哀此人竟不能放將猿子擊殺之老猿悲鳴自擲而死此人破老猿腹視之腸皆斷裂矣未半年其人家疫一時死盡滅門直隸省南皮縣弓手張德平以健勇擒捕有獲然多誣平人因瘟疫死半歲墓中忽有聲人報其子往視則墓已穴露其面破墓欲出之則身變白蛇子驚問曰何為異類父曰我以枉殺平人故獲此報宋縉雲未達時元旦出門遇惡鬼數輩問之曰我輩疫鬼散疫人間云曰吾家有乎鬼曰無曰何也曰君家三世隱惡揚善後當貴顯豫輩何敢入言訖不見太湖居人皆事屠𦊙獨沈文寶舉家好善且買物放生遇瘟疫時行有人見衆瘟鬼執旗一束相語曰除沈家放生行善外余俱插旗未幾一村盡瘟死獨沈闔家獲免江北有五人南渡其舟子素奉關帝甚虔夢帝諭云明晚有五人過江莫渡之我今書三字於汝手心若必欲渡等彼下船時付之一覽舟子如其言將手中三字捻緊向晚果有五人趁船舟子隨將手放開一照五人忽不見遺竹箱一啓視盡往江南行疫冊籍舟子至吳下傳寫其手中三字疒貝足疒月足疒牛足識者知是符讖凡黏三字於門者皆不染瘟疫
